          <div>
            <div className="font-mono text-sm text-[#ff4757]">Remover do treino</div>
            <div className="text-[10px] font-mono text-[#666] mt-0.5">Tira este exercício do treino atual</div>
          </div>
        </button>
      </Modal>
    </div>
  );
};

const SetRow = ({ si, displayNum, set, exDef, onUpdate, onToggle, onRemove }) => {
  const completed = !!set.completed;
  const isWarmup = !!set.warmup;
  const oneRM = exDef.type === 'weight' && set.weight !== '' && set.reps !== '' ? calc1RM(set.weight, set.reps) : 0;
  const isTime = exDef.type === 'time';
  const [confirmDel, setConfirmDel] = useState(false);
  const pressTimer = useRef(null);

  const startPress = (e) => {
    const tag = (e.target.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'button' || tag === 'svg' || tag === 'path') return;
    if (pressTimer.current) clearTimeout(pressTimer.current);
    pressTimer.current = setTimeout(() => {
      vibrate(50);
      setConfirmDel(true);
      pressTimer.current = null;
    }, 600);
  };
  const cancelPress = () => {
    if (pressTimer.current) { clearTimeout(pressTimer.current); pressTimer.current = null; }
  };

  // Toggle aquecimento: desabilita se a série já está marcada como concluída.
  const toggleWarmup = () => {
    if (completed) return;
    vibrate(15);
    onUpdate({ warmup: !isWarmup });
  };

  // Cor de aquecimento: laranja-amarelo (não conflita com volt nem com vermelho de remoção).
  const WARMUP_COLOR = '#f59e0b';

  return (
    <>
      <tr className={completed ? 'completed' : ''}
        onPointerDown={startPress} onPointerUp={cancelPress} onPointerLeave={cancelPress} onPointerCancel={cancelPress}
        style={isWarmup ? { background: completed ? '#0a0a0a' : 'rgba(245,158,11,0.05)' } : undefined}>
        <td className="col-num">
          {/* Botão pequeno: clica pra alternar aquecimento. Mostra "AQ" se aquecimento, senão o número. */}
          <button type="button" onClick={toggleWarmup} disabled={completed}
            title={isWarmup ? 'Aquecimento — clique para desmarcar' : 'Marcar como aquecimento'}
            className={`w-full font-mono transition-colors ${completed ? 'cursor-not-allowed' : 'cursor-pointer hover:text-white'}`}
            style={isWarmup ? { color: WARMUP_COLOR, fontSize: 10, fontWeight: 600 } : { color: '#666', fontSize: 11 }}>
            {isWarmup ? 'AQ' : displayNum}
          </button>
        </td>
        <td><NumStepper value={set.rest} onChange={v=>onUpdate({rest:v})} step={15} disabled={completed} /></td>
        {isTime ? (
          <>
            <td><NumStepper value={set.weight} onChange={v=>onUpdate({weight:v})} step={0.5} disabled={completed} /></td>
            <td><NumStepper value={set.time} onChange={v=>onUpdate({time:v})} step={1} disabled={completed} /></td>
          </>
        ) : (
          <>
            <td><NumStepper value={set.weight} onChange={v=>onUpdate({weight:v})} step={0.5} disabled={completed} /></td>
            <td><NumStepper value={set.reps} onChange={v=>onUpdate({reps:v})} step={1} disabled={completed} /></td>
            <td className="cell-1rm">{oneRM > 0 ? oneRM : '—'}</td>
          </>
        )}
        <td className="col-check">
          <CompletedCheckbox checked={completed} onChange={onToggle} />
        </td>
      </tr>
      {confirmDel && (
        <Confirm open={true} title={`Excluir ${isWarmup ? 'aquecimento' : `série ${displayNum}`}?`}
          message="Esta série será removida do exercício. Esta ação não pode ser desfeita."
          confirmLabel="Excluir"
          onConfirm={()=>{ setConfirmDel(false); onRemove(); }}
          onCancel={()=>setConfirmDel(false)} danger />
      )}
    </>
  );
};

const CompletedCheckbox = ({ checked, onChange }) => (
  <button type="button" onClick={()=>{ vibrate(20); onChange && onChange(); }}
    className={`w-7 h-7 border transition-colors ${checked?'bg-[#d4ff00] border-[#d4ff00]':'bg-black border-[#333] hover:border-[#666]'}`}
    style={{display:'inline-flex', alignItems:'center', justifyContent:'center'}}>
    {checked && <Check size={16} strokeWidth={3} className="text-black" />}
  </button>
);

const ExerciseHistoryModal = ({ exerciseId, data, onClose }) => {
  const exDef = data.exercises.find(e=>e.id===exerciseId);
  const sessions = data.sessions
    .map(s => {
      const log = s.exercises.find(e => e.exerciseId === exerciseId);
      const sets = log ? (log.sets||[]).filter(x=>x.completed) : [];
      if (!sets.length) return null;
      return { session: s, sets, sessionNote: log.sessionNote, execScore: log.execScore };
    })
    .filter(Boolean)
    .slice(0, 8);

  return (
    <Modal open={true} onClose={onClose} title={(exDef && exDef.name) || 'Histórico'}
      footer={<Btn onClick={onClose} full>Fechar</Btn>}>
      {sessions.length === 0 ? (
        <p className="text-sm text-[#666] font-mono text-center py-6">Sem histórico para este exercício ainda.</p>
      ) : (
        <div className="space-y-3">
          {sessions.map((entry, i) => {
            const { session, sets, sessionNote, execScore } = entry;
            const max1RM = exDef && exDef.type === 'weight' ? Math.max(...sets.map(s=>s.oneRM||0)) : 0;
            return (
              <div key={i} className="border border-[#1a1a1a] p-3">
                <div className="flex items-baseline justify-between mb-0.5 gap-2">
                  <div className="font-display text-base tracking-wider truncate">{session.templateName || 'Treino livre'}</div>
                  <div className="flex items-center gap-2 flex-shrink-0">
                    {execScore && <span className="text-[10px] font-mono text-[#d4ff00]">Exec {execScore}/5</span>}
                    {max1RM > 0 && <span className="text-[10px] font-mono text-[#d4ff00]">1RM {max1RM}kg</span>}
                  </div>
                </div>
                <div className="text-[10px] font-mono text-[#666] tracking-widest mb-2">{formatDateTime(session.date)}</div>
                <div className="space-y-0.5">
                  {(() => {
                    let validIdx = 0;
                    return sets.map((s, si) => {
                      const num = s.warmup ? null : (++validIdx);
                      return (
                        <div key={si} className="flex items-center gap-3 text-xs font-mono">
                          {s.warmup
                            ? <span className="font-mono" style={{ color: '#f59e0b', fontSize: 9, fontWeight: 600, width: 22 }}>AQ</span>
                            : <span className="text-[#666] w-5">{num}</span>}
                          {exDef && exDef.type==='time' ? (
                            <span className="text-white">{Number(s.weight)>0?`${s.weight}kg · `:''}{s.time}s</span>
                          ) : (
                            <>
                              <span className="text-white">{formatLoadReps(s.weight, s.reps)}</span>
                              {s.oneRM > 0 && <span className="text-[#888] ml-auto">1RM {s.oneRM}kg</span>}
                            </>
                          )}
                        </div>
                      );
                    });
                  })()}
                </div>
                {sessionNote && (
                  <div className="text-[10px] font-mono text-[#888] mt-2 leading-relaxed border-l-2 border-[#1a1a1a] pl-2">{sessionNote}</div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </Modal>
  );
};

const SummaryModal = ({ active, data, onConfirm, onCancel, onUpdateActive }) => {
  const [disposition, setDisposition] = useState(active.disposition || null);
  const [intensity, setIntensity] = useState(active.intensity || null);

  // Detecta mudanças estruturais comparando ordem/composição com snapshot do template
  const structuralChange = useMemo(() => {
    if (!active.templateId || !active.originalExerciseIds) return null;
    const orig = active.originalExerciseIds;
    const curr = active.exercises.map(e => e.exerciseId);
    if (orig.length !== curr.length) return { type: orig.length < curr.length ? 'added' : 'removed', orig, curr };
    for (let i = 0; i < orig.length; i++) {
      if (orig[i] !== curr[i]) return { type: 'reordered_or_substituted', orig, curr };
    }
    return null;
  }, [active.templateId, active.originalExerciseIds, active.exercises]);

  const [applyStructural, setApplyStructural] = useState(false);

  const initialDiff = useMemo(() => {
    if (!active.templateId) return null;
    const tpl = data.workouts.find(w=>w.id===active.templateId);
    if (!tpl) return null;
    const out = [];
    active.exercises.forEach(e => {
      const def = data.exercises.find(d=>d.id===e.exerciseId);
      const tplEx = tpl.exercises.find(t => t.exerciseId === e.exerciseId);
      if (!def) return;
      // Se exercício é novo (não existe no template) ou foi reordenado, ainda mostra diff só de séries
      const tplNorm = tplEx ? normalizeTemplateExercise(tplEx, def) : { setRefs: [] };
      const refs = tplNorm.setRefs || [];
      const completed = (e.sets||[]).filter(s=>s.completed);
      const diffs = [];
      completed.forEach((s, idx) => {
        const ref = refs[idx];
        if (!ref) {
          diffs.push({ setIdx: idx, isExtra: true, ref: { weight:'', reps:'', time:'' }, actual: { weight: s.weight, reps: s.reps, time: s.time } });
          return;
        }
        const wDiff = (def.type === 'time' || def.type === 'weight') && Number(s.weight||0) !== Number(ref.weight||0);
        const rDiff = def.type !== 'time' && Number(s.reps||0) !== Number(ref.reps||0);
        const tDiff = def.type === 'time' && Number(s.time||0) !== Number(ref.time||0);
        if (wDiff || rDiff || tDiff) {
          diffs.push({ setIdx: idx, isExtra: false, ref: { weight: ref.weight, reps: ref.reps, time: ref.time }, actual: { weight: s.weight, reps: s.reps, time: s.time } });
        }
      });
      if (diffs.length) {
        out.push({ exerciseId: e.exerciseId, def, tplEx: tplNorm, completed, diffs });
      }
    });
    return out;
  }, [active.templateId, active.exercises, data.workouts, data.exercises]);

  const [applyByExercise, setApplyByExercise] = useState(() => {
    const m = {};
    if (initialDiff) initialDiff.forEach(d => { m[d.exerciseId] = false; });
    return m;
  });

  // Totais finais de séries e volume IGNORAM aquecimentos (consistente com o resto do app).
  const totalSets = active.exercises.reduce((acc, e) =>
    acc + ((e.sets && e.sets.filter(s => s.completed && !s.warmup).length) || 0), 0);
  const totalVolume = active.exercises.reduce((acc, e) =>
    acc + (e.sets||[]).filter(s => s.completed && !s.warmup)
                       .reduce((a,s)=>a+(Number(s.weight)||0)*(Number(s.reps)||0),0), 0);

  const handleConfirm = () => {
    const extras = { disposition, intensity, applyStructural };
    if (!active.templateId || !initialDiff || initialDiff.length === 0) {
      onConfirm(null, extras); return;
    }
    const out = {};
    initialDiff.forEach(group => {
      if (!applyByExercise[group.exerciseId]) return;
      const completed = group.completed;
      const newRefs = completed.map(s => {
        if (group.def.type === 'time') return { weight: s.weight === '' ? '' : Number(s.weight)||0, reps: '', time: Number(s.time)||0 };
        return { weight: Number(s.weight)||0, reps: Number(s.reps)||0, time: '' };
      });
      out[group.exerciseId] = { setRefs: newRefs };
    });
    onConfirm(out, extras);
  };

  const renderRefVal = (ref, type) => {
    if (type === 'time') return `${ref.weight?`${ref.weight}kg · `:''}${ref.time||'—'}s`;
    return `${ref.weight===''?'—':ref.weight}kg × ${ref.reps===''?'—':ref.reps}`;
  };

  return (
    <Modal open={true} onClose={onCancel} title="Finalizar treino"
      footer={<>
        <Btn variant="ghost" onClick={onCancel} full>Voltar</Btn>
        <Btn variant="primary" onClick={handleConfirm} icon={Check} full>Salvar</Btn>
      </>}>
      <div className="grid grid-cols-3 gap-2 text-center">
        <div className="border border-[#1a1a1a] p-3">
          <div className="font-display text-2xl text-white">{formatTime(Math.floor((Date.now()-active.startedAt)/1000))}</div>
          <div className="text-[9px] font-mono uppercase tracking-widest text-[#666] mt-1">Tempo</div>
        </div>
        <div className="border border-[#1a1a1a] p-3">
          <div className="font-display text-2xl text-white">{totalSets}</div>
          <div className="text-[9px] font-mono uppercase tracking-widest text-[#666] mt-1">Séries</div>
        </div>
        <div className="border border-[#1a1a1a] p-3">
          <div className="font-display text-2xl text-[#d4ff00]">{Math.round(totalVolume)}</div>
          <div className="text-[9px] font-mono uppercase tracking-widest text-[#666] mt-1">Volume kg</div>
        </div>
      </div>

      <div>
        <div className="text-[10px] font-mono uppercase tracking-widest text-[#666] mb-2">Como você se sentiu?</div>
        <ScaleSelector value={disposition} onChange={setDisposition} labels={DISP_LABELS} colors={DISP_COLORS} />
      </div>
      <div>
        <div className="text-[10px] font-mono uppercase tracking-widest text-[#666] mb-2">Como foi o treino?</div>
        <ScaleSelector value={intensity} onChange={setIntensity} labels={RPE_LABELS} colors={INTENSITY_COLORS} />
      </div>

      <TextArea label="Observações finais do treino" value={active.sessionNote||''}
        onChange={v=>onUpdateActive({...active, sessionNote:v})} placeholder="Algo que aconteceu hoje?" rows={3} />

      {/* Mudança estrutural: ordem, adição, remoção, substituição */}
      {structuralChange && (
        <div className="border border-[#d4ff00]/40 p-3 space-y-2" style={{ background: withAlpha('#d4ff00', 0.05) }}>
          <div className="flex items-center justify-between gap-3">
            <div className="flex-1 min-w-0">
              <div className="text-[10px] font-mono uppercase tracking-widest text-[#d4ff00]">Estrutura do treino alterada</div>
              <div className="text-[11px] font-mono text-[#aaa] mt-1 leading-relaxed">
                Você {structuralChange.type === 'added' ? 'adicionou' : structuralChange.type === 'removed' ? 'removeu' : 'reorganizou ou substituiu'} exercícios.
                Quer fixar essa nova estrutura no modelo do treino?
              </div>
            </div>
            <div className="flex-shrink-0">
              <CompletedCheckbox checked={applyStructural} onChange={()=>setApplyStructural(v=>!v)} />
            </div>
          </div>
          {applyStructural && (
            <div className="text-[9px] font-mono uppercase tracking-widest text-[#d4ff00]">
              ✓ Modelo será atualizado com a nova ordem e composição
            </div>
          )}

      )}

      {initialDiff && initialDiff.length > 0 && (
        <div className="space-y-2">
          <div className="text-[10px] font-mono uppercase tracking-widest text-[#666]">Mudanças detectadas vs. referência</div>
          <p className="text-[10px] font-mono text-[#666] leading-relaxed">
            Marque os exercícios que devem ter a referência atualizada com os novos valores.
          </p>
          {initialDiff.map(group => {
            const c = muscleColor(group.def.muscle);
            const willApply = applyByExercise[group.exerciseId];
            return (
              <div key={group.exerciseId} className="border border-[#1a1a1a] border-l-4 p-3 space-y-2" style={{ borderLeftColor: c, background: withAlpha(c, 0.05) }}>
                <div className="flex items-center justify-between gap-3">
                  <div className="font-mono text-sm text-white truncate flex-1">{group.def.name}</div>
                  <div className="flex items-center gap-2 flex-shrink-0">
                    <span className="text-[9px] font-mono uppercase tracking-widest text-[#666]">Atualizar</span>
                    <CompletedCheckbox checked={willApply} onChange={()=>setApplyByExercise(prev => ({...prev, [group.exerciseId]: !prev[group.exerciseId]}))} />
                  </div>
                </div>
                <div className="space-y-1">
                  {group.diffs.map((d, di) => (
                    <div key={di} className="text-[10px] font-mono flex items-center gap-2">
                      <span className="text-[#666] w-6">#{d.setIdx+1}</span>
                      {d.isExtra ? (
                        <>
                          <span className="text-[#d4ff00]">EXTRA</span>
                          <span className="text-white ml-auto">{renderRefVal(d.actual, group.def.type)}</span>
                        </>
                      ) : (
                        <>
                          <span className="text-[#888] truncate">{renderRefVal(d.ref, group.def.type)}</span>
                          <span className="text-[#666]">→</span>
                          <span className="text-white truncate">{renderRefVal(d.actual, group.def.type)}</span>
                        </>
                      )}
                    </div>
                  ))}
                </div>
                {willApply && (
                  <div className="text-[9px] font-mono uppercase tracking-widest text-[#d4ff00]">

      {active.templateId && initialDiff && initialDiff.length === 0 && (
        <div className="border border-[#1a1a1a] p-3 text-center">
          <div className="text-[10px] font-mono uppercase tracking-widest text-[#666]">

    </Modal>
  );
};

/* Formato legível pra colar em IA. Inclui todos os dados da sessão. */
/* Exporta todos os treinos ATIVOS como texto formatado pra colar em IA.
   Inclui: nome, dias da semana, observações, e cada exercício com séries, faixas e descanso. */
const activeTemplatesToText = (data) => {
  const lines = [];
  const active = data.workouts.filter(w => !w.inactive);
  if (!active.length) return '';
  lines.push(`# Meus treinos ativos (${active.length})`);
  lines.push('');
  active.forEach((w, idx) => {
    lines.push(`## ${idx+1}. ${w.name || 'Sem nome'}`);
    if (w.weekdays && w.weekdays.length) {
      const days = [...w.weekdays].sort((a,b)=>a-b).map(d => WEEKDAY_LABELS_FULL[d]);
      lines.push(`Dias: ${days.join(', ')}`);
    }
    if (w.notes) lines.push(`Observações: ${w.notes}`);
    lines.push('');
    if (!w.exercises.length) {
      lines.push('  (sem exercícios)');
      lines.push('');
      return;
    }
    w.exercises.forEach((we, ei) => {
      const def = data.exercises.find(e => e.id === we.exerciseId);
      const name = (def && def.name) || 'Exercício removido';
      const muscle = (def && def.muscle) || '—';
      const isTime = def && def.type === 'time';
      lines.push(`  ${ei+1}. ${name} (${muscle})`);
      const refs = we.setRefs || [];
      const numSets = refs.length || we.targetSets || 0;
      if (!isTime && we.targetRepsMin && we.targetRepsMax) {
        lines.push(`     Faixa alvo: ${we.targetRepsMin}-${we.targetRepsMax} reps`);
      }
      if (we.restSeconds && we.restSeconds > 0) {
        lines.push(`     Descanso entre séries: ${we.restSeconds}s`);
      }
      lines.push(`     ${numSets} séries de referência:`);
      refs.forEach((r, si) => {
        if (isTime) {
          const wPart = Number(r.weight) > 0 ? `${r.weight}kg · ` : '';
          lines.push(`       ${si+1}: ${wPart}${r.time || '?'}s`);
        } else {
          const wVal = Number(r.weight) > 0 ? `${r.weight}kg` : 'peso corporal';
          lines.push(`       ${si+1}: ${wVal} × ${r.reps || '?'} reps`);
        }
      });
      if (we.notes) lines.push(`     Notas: ${we.notes}`);
      lines.push('');
    });
  });
  return lines.join('\n').trim();
};

const sessionToText = (session, data) => {
  const lines = [];
  lines.push(`Treino: ${session.templateName || 'Treino livre'}`);
  lines.push(`Data: ${formatDateTime(session.date)}`);
  lines.push(`Duração: ${formatTime(Math.floor((session.duration||0)/1000))}`);
  if (session.disposition) lines.push(`Disposição: ${session.disposition}/5 (${DISP_LABELS[session.disposition]})`);
  if (session.intensity) lines.push(`Intensidade: ${session.intensity}/5 (${RPE_LABELS[session.intensity]})`);
  if (session.sessionNote) lines.push(`Notas gerais: ${session.sessionNote}`);
  lines.push('');
  session.exercises.forEach((e, idx) => {
    const def = data.exercises.find(d=>d.id===e.exerciseId);
    const name = (def && def.name) || 'Exercício removido';
    const muscle = (def && def.muscle) || '—';
    const isTime = def && def.type === 'time';
    lines.push(`${idx+1}. ${name} (${muscle})`);
    if (e.targetRepsMin && e.targetRepsMax) lines.push(`   Faixa alvo: ${e.targetRepsMin}-${e.targetRepsMax} reps`);

    // Sessão anterior do mesmo exercício pra calcular diffs
    const prevSession = data.sessions.find(s2 => s2.id !== session.id && s2.date < session.date && s2.exercises.some(ex => ex.exerciseId === e.exerciseId));
    const prevLog = prevSession ? prevSession.exercises.find(ex => ex.exerciseId === e.exerciseId) : null;
    const prevSets = prevLog ? (prevLog.sets||[]).filter(s=>s.completed) : [];

    // Maior 1RM histórico antes desta sessão (ignorando aquecimentos)
    let priorMax1RM = 0;
    if (def && def.type === 'weight') {
      data.sessions.forEach(s2 => {
        if (s2.date >= session.date) return;
        const log = s2.exercises.find(ex => ex.exerciseId === e.exerciseId);
        if (!log) return;
        (log.sets||[]).filter(x=>x.completed && !x.warmup).forEach(x => {
          if ((x.oneRM||0) > priorMax1RM) priorMax1RM = x.oneRM || 0;
        });
      });
    }
    const sets = (e.sets||[]).filter(s=>s.completed);
    // Pico desta sessão também ignora aquecimentos pra detecção de "novo recorde"
    const sessionMax1RM = sets.filter(s=>!s.warmup).reduce((m, s) => Math.max(m, s.oneRM || 0), 0);
    const isBest1RM = !isTime && sessionMax1RM > 0 && sessionMax1RM > priorMax1RM;
    if (isBest1RM) {
      lines.push(`   ★ NOVO MELHOR 1RM: ${sessionMax1RM}kg (anterior: ${priorMax1RM || 'sem registro'}kg)`);
    }

    let validIdx = 0;
    sets.forEach((s, si) => {
      const restPart = (s.rest && Number(s.rest) > 0) ? ` (descanso ${s.rest}s)` : '';
      // Numeração de séries não-aquecimento começa em 1 e ignora aquecimentos no meio.
      const labelPrefix = s.warmup ? 'Aquecimento' : `Série ${++validIdx}`;
      let line;
      if (isTime) {
        const wPart = Number(s.weight) > 0 ? `${s.weight}kg · ` : '';
        line = `   ${labelPrefix}${restPart}: ${wPart}${s.time}s`;
      } else {
        const oneRM = s.oneRM > 0 ? ` (1RM ${s.oneRM}kg)` : '';
        line = `   ${labelPrefix}${restPart}: ${formatLoadReps(s.weight, s.reps)}${oneRM}`;
      }
      // Diff vs sessão anterior na mesma série
      const prevS = prevSets[si];
      if (prevS) {
        const parts = [];
        if (isTime) {
          const dt = (Number(s.time)||0) - (Number(prevS.time)||0);
          if (dt !== 0) parts.push(`${dt > 0 ? '+' : ''}${dt}s`);
        } else {
          const dw = (Number(s.weight)||0) - (Number(prevS.weight)||0);
          const dr = (Number(s.reps)||0) - (Number(prevS.reps)||0);
          if (dw !== 0) parts.push(`${dw>0?'+':''}${dw}kg`);
          if (dr !== 0) parts.push(`${dr>0?'+':''}${dr} reps`);
        }
        if (parts.length) line += `   [vs anterior: ${parts.join(', ')}]`;
      }
      lines.push(line);
    });
    if (e.execScore) {
      // Diff vs sessão anterior do mesmo exercício
      const prevExecScore = prevLog ? prevLog.execScore : null;
      let execLine = `   Nota execução: ${e.execScore}/5 (${EXEC_LABELS[e.execScore]})`;
      if (prevExecScore && prevExecScore !== e.execScore) {
        const arrow = e.execScore > prevExecScore ? '↑ melhorou' : '↓ piorou';
        execLine += `   [${arrow}: ${prevExecScore}→${e.execScore}]`;
      }
      lines.push(execLine);
    }
    if (e.sessionNote) lines.push(`   Anotação: ${e.sessionNote}`);
    lines.push('');
  });
  return lines.join('\n').trim();
};

const sessionToTSV = (session, data) => {
  // Formato: data \t treino \t exercício \t grupo \t nota_exec \t descanso1 \t carga1 \t reps1 \t descanso2 \t carga2 \t reps2 \t ...
  // Sem cabeçalho. Todas as séries concluídas (sem limite). Vírgula como separador decimal.
  // Descanso (em segundos) é o tempo de pausa ANTES daquela série.
  const dateStr = formatDateForExcel(session.date);
  const tname = session.templateName || 'Treino livre';
  const lines = [];
  session.exercises.forEach(e => {
    const def = data.exercises.find(d=>d.id===e.exerciseId);
    const exName = (def && def.name) || 'Exercício removido';
    const muscle = (def && def.muscle) || '';
    const execScore = e.execScore == null ? '' : String(e.execScore);
    const sets = (e.sets||[]).filter(s=>s.completed);
    const cells = [dateStr, tname, exName, muscle, execScore];
    sets.forEach(s => {
      const rest = s.rest === '' || s.rest == null ? '' : String(s.rest);
      const w = s.weight === '' || s.weight == null ? '' : String(s.weight).replace('.', ',');
      const r = s.reps === '' || s.reps == null ? '' : String(s.reps);
      const t = s.time === '' || s.time == null ? '' : String(s.time);
      if (def && def.type === 'time') {
        cells.push(rest); cells.push(w); cells.push(t);
      } else {
        cells.push(rest); cells.push(w); cells.push(r);
      }
    });
    lines.push(cells.join('\t'));
  });
  return lines.join('\r\n');
};

        // Encontra a sessão imediatamente anterior do mesmo exercício pra calcular diffs.
        const prevSession = data.sessions.find(s2 => s2.id !== session.id && s2.date < session.date && s2.exercises.some(ex => ex.exerciseId === e.exerciseId));
        const prevLog = prevSession ? prevSession.exercises.find(ex => ex.exerciseId === e.exerciseId) : null;
        const prevSets = prevLog ? (prevLog.sets||[]).filter(s=>s.completed) : [];

        // Para cada série, calcula 1RM máximo HISTÓRICO até antes desta sessão
        // (pra marcar "MELHOR 1RM" corretamente). Ignora aquecimentos.
        const priorMax1RM = (() => {
          if (!def || def.type !== 'weight') return 0;
          let max = 0;
          data.sessions.forEach(s2 => {
            if (s2.date >= session.date) return;
            const log = s2.exercises.find(ex => ex.exerciseId === e.exerciseId);
            if (!log) return;
            (log.sets||[]).filter(x=>x.completed && !x.warmup).forEach(x => {
              if ((x.oneRM||0) > max) max = x.oneRM || 0;
            });
          });
          return max;
        })();
        // 1RM máximo desta sessão (ignorando aquecimentos)
        const sessionMax1RM = sets.filter(s=>!s.warmup).reduce((m, s) => Math.max(m, s.oneRM || 0), 0);
        const isBest1RM = !isTime && sessionMax1RM > 0 && sessionMax1RM > priorMax1RM;

        // Diff de execScore vs sessão anterior do mesmo exercício
        const prevExecScore = prevLog ? prevLog.execScore : null;
        const execDiff = (e.execScore && prevExecScore && e.execScore !== prevExecScore)
          ? (e.execScore > prevExecScore ? `↑ ${prevExecScore}→${e.execScore}` : `↓ ${prevExecScore}→${e.execScore}`)
          : null;
        const execDiffColor = execDiff && execDiff.startsWith('↑') ? '#84cc16' : '#ff4757';

        return (
          <div key={i} className="border-b border-[#1a1a1a] border-l-4" style={{ borderLeftColor: c }}>
            <div className="px-4 py-3">
              <div className="flex items-baseline justify-between mb-1 gap-2">
                <h3 className="font-display text-lg tracking-wider leading-none flex-1 min-w-0 truncate">{(def && def.name) || 'Exercício removido'}</h3>
                <div className="flex items-center gap-2 flex-shrink-0">
                  {e.execScore && (
                    <span className="text-[10px] font-mono uppercase tracking-widest" style={{ color: EXEC_COLORS[e.execScore] }}>
                      Exec {e.execScore}/5
                    </span>
                  )}
                  {execDiff && (
                    <span className="text-[10px] font-mono" style={{ color: execDiffColor }}>{execDiff}</span>
                  )}
                </div>
              </div>
              {/* Grupo muscular abaixo do nome (contagem ignora aquecimentos) */}
              {def && def.muscle && (
                <div className="text-[10px] font-mono uppercase tracking-widest mb-2" style={{ color: c }}>
                  {def.muscle} · {sets.filter(s=>!s.warmup).length} séries
                  {isBest1RM && (
                    <span className="ml-2 px-1.5 py-0.5" style={{ background: '#d4ff00', color: '#000' }}>★ MELHOR 1RM {sessionMax1RM}kg</span>
                  )}
                </div>
              )}
              {sets.length > 0 && (
                <div className="space-y-1 mb-2">
                  {(() => {
                    let validIdx = 0;
                    return sets.map((s,si) => {
                      const displayNum = s.warmup ? null : (++validIdx);
                      const prevS = prevSets[si];
                      let diffStr = null;
                      if (prevS) {
                        if (isTime) {
                          const dt = (Number(s.time)||0) - (Number(prevS.time)||0);
                          if (dt !== 0) diffStr = `${dt > 0 ? '+' : ''}${dt}s`;
                        } else {
                          const dw = (Number(s.weight)||0) - (Number(prevS.weight)||0);
                          const dr = (Number(s.reps)||0) - (Number(prevS.reps)||0);
                          const parts = [];
                          if (dw !== 0) parts.push(`${dw>0?'+':''}${dw}kg`);
                          if (dr !== 0) parts.push(`${dr>0?'+':''}${dr}r`);
                          if (parts.length) diffStr = parts.join(' ');
                        }
                      }
                      const diffColor = diffStr && diffStr.startsWith('+') ? '#84cc16' : '#ff4757';
                      return (
                        <div key={si} className="flex items-center gap-2 text-xs font-mono">
                          {s.warmup ? (
                            <span className="flex-shrink-0 font-mono" style={{ color: '#f59e0b', fontSize: 9, fontWeight: 600, width: 22 }}>AQ</span>
                          ) : (
                            <span className="text-[#666] w-5 flex-shrink-0">{displayNum}</span>
                          )}
                          {Number(s.rest) > 0 && (
                            <span className="text-[#888] flex-shrink-0 text-[10px]" title="Descanso antes desta série">⏱{s.rest}s</span>
                          )}
                          {isTime ? (
                            <span className="text-white flex-1 min-w-0 truncate">{Number(s.weight)>0?`${s.weight}kg · `:''}{s.time}s</span>
                          ) : (
                            <span className="text-white flex-1 min-w-0 truncate">{formatLoadReps(s.weight, s.reps)}</span>
                          )}
                          {diffStr && <span style={{ color: diffColor }} className="flex-shrink-0 text-[10px]">{diffStr}</span>}
                          {!isTime && s.oneRM > 0 && <span className="text-[#888] flex-shrink-0">1RM {s.oneRM}kg</span>}
                        </div>
                      );
                    });
                  })()}
                </div>
              )}
              {e.sessionNote && (
                <div className="bg-[#0a0a0a] border-l-2 border-[#666] px-2 py-1.5 mt-2">
                  <p className="text-[11px] font-mono text-[#aaa] whitespace-pre-wrap">{e.sessionNote}</p>
                </div>
              )}
            </div>
          </div>
        );
      })}
      <Confirm open={confirmDel} title="Excluir registro?" message="Este treino será removido permanentemente do histórico."
        onConfirm={onDelete} onCancel={()=>setConfirmDel(false)} danger />
    </div>
  );
};

/* PROGRESS */
const ProgressView = ({ data }) => {
  const [selectedExId, setSelectedExId] = useState(null);
  const exerciseStats = useMemo(() => {
    const map = {};
    data.sessions.forEach(s => {
      s.exercises.forEach(e => {
        if (!map[e.exerciseId]) map[e.exerciseId] = [];
        // Apenas séries concluídas E não-aquecimento contam pras estatísticas de progresso.
        // Aquecimentos não devem afetar 1RM, carga máxima, volume etc.
        const allCompleted = (e.sets||[]).filter(x=>x.completed);
        const sets = allCompleted.filter(x => !x.warmup);
        if (!sets.length) return;
        const max1RM   = Math.max(...sets.map(x=>x.oneRM ||0));
        const maxW     = Math.max(...sets.map(x=>Number(x.weight)||0));
        const maxReps  = Math.max(...sets.map(x=>Number(x.reps) ||0));
        const maxTime  = Math.max(...sets.map(x=>Number(x.time) ||0));
        const volume   = sets.reduce((a,x)=>a+(Number(x.weight)||0)*(Number(x.reps)||0),0);
        map[e.exerciseId].push({
          date: s.date, dateStr: formatShort(s.date),
          templateName: s.templateName || 'Treino livre',
          sessionId: s.id,
          execScore: e.execScore || null,
          max1RM, maxW, maxReps, maxTime, volume,
          // sets aqui inclui aquecimento também pra mostrar no histórico detalhado
          sets: allCompleted, setsCount: sets.length
        });
      });
    });
    Object.keys(map).forEach(k => map[k].sort((a,b)=>a.date-b.date));
    return map;
  }, [data.sessions]);

  if (data.sessions.length === 0) {
    return <div className="pb-24">
      <Header title="Progresso" subtitle="Evolução por exercício" />
      <EmptyState icon={BarChart3} title="Sem dados" hint="Faça alguns treinos para ver gráficos." />
    </div>;
  }

  if (selectedExId) {
    const def = data.exercises.find(e=>e.id===selectedExId);
    const stats = exerciseStats[selectedExId] || [];
    if (!def || !stats.length) {
      return <div className="pb-24">
        <Header title="Progresso" onBack={()=>setSelectedExId(null)} />
        <p className="px-4 py-6 text-[#666] font-mono text-sm">Sem dados para este exercício.</p>
      </div>;
    }
    const isTime = def.type==='time';
    const peak1RM = Math.max(...stats.map(s=>s.max1RM));
    const peakDate = (stats.find(s=>s.max1RM===peak1RM)||{}).dateStr;
    const peakW   = Math.max(...stats.map(s=>s.maxW));
    const peakReps= Math.max(...stats.map(s=>s.maxReps));
    const peakTime= Math.max(...stats.map(s=>s.maxTime));
    const peakVolume = Math.max(...stats.map(s=>s.volume));
    const c = muscleColor(def.muscle);

    return (
      <div className="pb-24">
        <Header title={def.name} subtitle={`${stats.length} sessões registradas`} onBack={()=>setSelectedExId(null)} />
        <div className="px-4 py-2 border-b border-[#1a1a1a] flex items-center gap-2" style={{ background: withAlpha(c, 0.08) }}>
          <span className="w-2 h-2" style={{ background: c }} />
          <span className="text-[10px] font-mono uppercase tracking-widest" style={{ color: c }}>{def.muscle||'—'}</span>
        </div>
        <div className="grid grid-cols-2 gap-px bg-[#1a1a1a] border-b border-[#1a1a1a]">
          {!isTime && (
            <div className="bg-black p-3">
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666]">Pico 1RM</div>
              <div className="font-display text-2xl text-[#d4ff00] mt-1">{peak1RM}kg</div>
              <div className="text-[10px] font-mono text-[#666] mt-0.5">{peakDate}</div>
            </div>
          )}
          {!isTime && (
            <div className="bg-black p-3">
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666]">Carga máx</div>
              <div className="font-display text-2xl text-white mt-1">{peakW}kg</div>
            </div>
          )}
          {!isTime && (
            <div className="bg-black p-3">
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666]">Reps máx</div>
              <div className="font-display text-2xl text-white mt-1">{peakReps}</div>
            </div>
          )}
          {isTime && (
            <div className="bg-black p-3">
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666]">Tempo máx</div>
              <div className="font-display text-2xl text-[#d4ff00] mt-1">{peakTime}s</div>
            </div>
          )}
          <div className="bg-black p-3">
            <div className="text-[9px] font-mono uppercase tracking-widest text-[#666]">Volume máx</div>
            <div className="font-display text-2xl text-white mt-1">{Math.round(peakVolume)}</div>
          </div>
        </div>
        {!isTime && <ChartCard title="1RM estimado"     data={stats} dataKey="max1RM"  suffix="kg" color={c} />}
        {!isTime && <ChartCard title="Carga máxima"     data={stats} dataKey="maxW"    suffix="kg" color={c} />}
        {!isTime && <ChartCard title="Repetições máximas" data={stats} dataKey="maxReps" suffix="" color={c} />}
        {isTime  && <ChartCard title="Tempo máximo"     data={stats} dataKey="maxTime" suffix="s" color={c} />}
        {!isTime && <ChartCard title="Volume total"     data={stats} dataKey="volume"  suffix="kg" color={c} />}

        <div className="px-4 py-3 border-t border-[#1a1a1a]">
          <div className="text-[10px] font-mono uppercase tracking-widest text-[#666] mb-3">Histórico detalhado</div>
          <div className="space-y-3">
            {[...stats].reverse().map((s,i) => (
              <div key={i} className="border border-[#1a1a1a] p-3">
                <div className="flex items-baseline justify-between mb-0.5 gap-2">
                  <div className="font-display text-base tracking-wider truncate">{s.templateName}</div>
                  <div className="text-[10px] font-mono text-[#666] flex-shrink-0">{formatDate(s.date)}</div>
                </div>
                <div className="text-[10px] font-mono text-[#666] tracking-widest mb-2 flex gap-3 flex-wrap">
                  {!isTime && <span className="text-[#d4ff00]">1RM máx {s.max1RM}kg</span>}
                  {!isTime && <span>Pico {s.maxW}kg × {s.maxReps}</span>}
                  {isTime && <span className="text-[#d4ff00]">Pico {s.maxTime}s</span>}
                  <span>{s.setsCount} séries</span>
                  {s.execScore && <span className="text-[#d4ff00]">Exec {s.execScore}/5</span>}
                </div>
                <div className="space-y-0.5">
                  {(() => {
                    let vi = 0;
                    return s.sets.map((set, si) => {
                      const num = set.warmup ? null : (++vi);
                      return (
                        <div key={si} className="flex items-center gap-3 text-xs font-mono">
                          {set.warmup
                            ? <span className="font-mono" style={{ color: '#f59e0b', fontSize: 9, fontWeight: 600, width: 22 }}>AQ</span>
                            : <span className="text-[#666] w-5">{num}</span>}
                          {isTime ? <span className="text-white">{Number(set.weight)>0?`${set.weight}kg · `:''}{set.time}s</span>
                            : (<><span className="text-white">{formatLoadReps(set.weight, set.reps)}</span>{set.oneRM > 0 && <span className="text-[#888] ml-auto">1RM {set.oneRM}kg</span>}</>)}
                        </div>
                      );
                    });
                  })()}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  const exsWithData = data.exercises.filter(e => exerciseStats[e.id] && exerciseStats[e.id].length);
  const groups = {};
  exsWithData.forEach(ex => {
    const m = ex.muscle || 'Sem grupo';
    if (!groups[m]) groups[m]=[];
    groups[m].push(ex);
  });
  const groupEntries = Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0],'pt-BR'));

  return (
    <div className="pb-24">
      <Header title="Progresso" subtitle={`${exsWithData.length} exercícios com dados`} />
      {groupEntries.map(([muscle, exs]) => {
        const c = muscleColor(muscle);
        return (
          <div key={muscle}>
            <div className="px-4 py-2 text-[10px] font-mono uppercase tracking-widest flex items-center gap-2 border-b border-[#1a1a1a]" style={{ color: c, background: withAlpha(c, 0.08) }}>
              <span className="w-2 h-2" style={{ background: c }} />
              {muscle}
            </div>
            {exs.map(ex => {
              const stats = exerciseStats[ex.id];
              const last = stats[stats.length-1];
              const first = stats[0];
              const delta1RM = ex.type==='weight' ? last.max1RM - first.max1RM : 0;
              const isPositive = delta1RM > 0;
              return (
                <button key={ex.id} onClick={()=>setSelectedExId(ex.id)}
                  className="w-full px-4 py-3 flex items-center gap-3 hover:bg-[#0a0a0a] text-left border-b border-[#0d0d0d] last:border-b-0 border-l-4"
                  style={{ borderLeftColor: c }}>
                  <div className="flex-1 min-w-0">
                    <div className="font-mono text-sm text-white truncate">{ex.name}</div>
                    <div className="text-[10px] font-mono text-[#666] mt-0.5">
                      {stats.length} sessões · {ex.type==='weight' ? `Pico 1RM ${Math.max(...stats.map(s=>s.max1RM))}kg`
                        : `Pico ${Math.max(...stats.map(s=>s.maxTime))}s`}
                    </div>
                  </div>
                  {ex.type==='weight' && stats.length > 1 && (
                    <div className={`text-xs font-mono ${isPositive?'text-[#d4ff00]':delta1RM<0?'text-[#ff4757]':'text-[#666]'}`}>
                      {isPositive?'+':''}{delta1RM.toFixed(1)}kg
                    </div>
                  )}
                  <ChevronRight size={14} className="text-[#444]" />
                </button>
              );
            })}
          </div>
        );
      })}
    </div>
  );
};

/* CONFIG */
const ConfigView = ({ data, setData, toast }) => {
  const fileRef = useRef();
  const [importPreview, setImportPreview] = useState(null);
  const [confirmReplace, setConfirmReplace] = useState(false);
  const [confirmWipe, setConfirmWipe] = useState(false);
  const [confirmReplaceFromDrive, setConfirmReplaceFromDrive] = useState(false);
  const [drivePreview, setDrivePreview] = useState(null);
  const [driveBusy, setDriveBusy] = useState(false);
  const [driveSetup, setDriveSetup] = useState(false);
  const [config, setConfig] = useState(driveLoadConfig());
  const [authed, setAuthed] = useState(!!driveLoadToken());
  const [syncTimes, setSyncTimes] = useState(loadSyncTimes());
  const bumpSync = (key) => setSyncTimes(recordSyncTime(key));

  // Timer prefs
  const [timerPrefs, setTimerPrefsState] = useState(() => loadTimerPrefs());
  const updateTimerPref = (key, val) => {
    const next = { ...timerPrefs, [key]: val };
    setTimerPrefsState(next);
    saveTimerPrefs(next);
  };

  // Log de diagnóstico de notificações (mostra cada passo do teste pra debug)
  const [diagLog, setDiagLog] = useState([]);
  const addDiag = (msg, ok) => setDiagLog(prev => [...prev, { msg, ok, t: new Date().toLocaleTimeString('pt-BR') }]);
  const clearDiag = () => setDiagLog([]);

  const handleSetClientId = (cid) => {
    const newCfg = { ...config, clientId: cid };
    setConfig(newCfg);
    driveSaveConfig(newCfg);
    setDriveSetup(false);
    if (cid) toast('Client ID salvo. Agora toque em "Conectar".'); else toast('Client ID removido.');
  };

  const ensureTokenClient = () => {
    if (!config.clientId) throw new Error('Configure o Client ID primeiro.');
    if (!tokenClient) {
      driveInitTokenClient(config.clientId, () => {});
    }
  };

  const driveConnect = async () => {
    try {
      setDriveBusy(true);
      ensureTokenClient();
      await driveRequestToken(true);
      setAuthed(true);
      toast('Conectado ao Google Drive');
    } catch (e) {
      console.error(e); toast('Falha ao conectar: ' + e.message, 'error');
    } finally { setDriveBusy(false); }
  };

  const driveDisconnect = () => {
    driveSaveToken(null);
    setAuthed(false);
    toast('Desconectado');
  };

  const driveSaveAction = async () => {
    try {
      setDriveBusy(true);
      ensureTokenClient();
      const token = await driveGetValidToken();
      const existing = await driveFindFile(token, DRIVE_FILE_NAME);
      const payload = { version: APP_VERSION, exportedAt: new Date().toISOString(), data };
      await driveUpload(token, JSON.stringify(payload, null, 2), existing && existing.id);
      bumpSync('driveSave');
      toast('Salvo no Drive');
    } catch (e) {
      console.error(e); toast('Erro ao salvar: ' + e.message, 'error');
    } finally { setDriveBusy(false); }
  };

  const driveLoadAction = async () => {
    try {
      setDriveBusy(true);
      ensureTokenClient();
      const token = await driveGetValidToken();
      const existing = await driveFindFile(token, DRIVE_FILE_NAME);
      if (!existing) { toast('Nenhum backup encontrado no Drive', 'error'); return; }
      const text = await driveDownload(token, existing.id);
      const parsed = JSON.parse(text);
      const payload = parsed.data || parsed;
      if (!payload || !Array.isArray(payload.exercises) || !Array.isArray(payload.workouts) || !Array.isArray(payload.sessions)) {
        throw new Error('Formato inválido');
      }
      setDrivePreview({ payload, modifiedTime: existing.modifiedTime });
      setConfirmReplaceFromDrive(true);
    } catch (e) {
      console.error(e); toast('Erro ao carregar: ' + e.message, 'error');
    } finally { setDriveBusy(false); }
  };

  const exportData = () => {
    try {
      const payload = { version: APP_VERSION, exportedAt: new Date().toISOString(), data };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const dt = new Date().toISOString().split('T')[0];
      a.href = url; a.download = `treino-backup-${dt}.json`;
      document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 100);
      bumpSync('fileExport');
      toast('Backup exportado.');
    } catch (e) { console.error(e); toast('Erro ao exportar.', 'error'); }
  };

  const handleFile = async (e) => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    try {
      const text = await f.text();
      const parsed = JSON.parse(text);
      const payload = parsed.data || parsed;
      if (!payload || !Array.isArray(payload.exercises) || !Array.isArray(payload.workouts) || !Array.isArray(payload.sessions)) {
        throw new Error('Formato inválido');
      }
      setImportPreview(payload);
      setConfirmReplace(true);
    } catch (err) { console.error(err); toast('Arquivo inválido.', 'error'); }
    e.target.value = '';
  };

  const doImport = () => {
    setData(importPreview);
    setConfirmReplace(false); setImportPreview(null);
    bumpSync('fileImport');
    toast('Dados substituídos.');
  };
  // Merge genérico: adiciona itens novos (id não existente) sem mexer nos existentes.
  const performMerge = (incoming) => {
    setData(curr => {
      const existsBy = (arr, id) => arr.some(x => x.id === id);
      const newExs = (incoming.exercises||[]).filter(e => !existsBy(curr.exercises, e.id));
      const newWks = (incoming.workouts||[]).filter(w => !existsBy(curr.workouts, w.id));
      const newSes = (incoming.sessions||[]).filter(s => !existsBy(curr.sessions, s.id));
      return {
        ...curr,
        exercises: [...curr.exercises, ...newExs].sort((a,b)=>a.name.localeCompare(b.name,'pt-BR')),
        workouts:  [...curr.workouts,  ...newWks],
        sessions:  [...curr.sessions,  ...newSes].sort((a,b)=>b.date - a.date),
      };
    });
  };
  const mergeData = (incoming) => {
    performMerge(incoming);
    setConfirmReplace(false); setImportPreview(null);
    bumpSync('fileImport');
    toast('Dados adicionados.');
  };
  const doImportFromDrive = () => {
    if (drivePreview) setData(drivePreview.payload);
    setConfirmReplaceFromDrive(false); setDrivePreview(null);
    bumpSync('driveLoad');
    toast('Dados substituídos pelo Drive.');
  };
  const mergeFromDrive = () => {
    if (drivePreview) performMerge(drivePreview.payload);
    setConfirmReplaceFromDrive(false); setDrivePreview(null);
    bumpSync('driveLoad');
    toast('Dados do Drive adicionados.');
  };
  const wipeAll = () => {
    setData({ exercises: [], workouts: [], sessions: [] });
    setConfirmWipe(false);
    toast('Dados removidos.');
  };

  const isFileProto = location.protocol === 'file:';

  return (
    <div className="pb-24">
      <Header title="Config" subtitle="Backup e ajustes" />
      <div className="p-4 space-y-4">
        <div>
          <div className="text-[10px] font-mono uppercase tracking-widest text-[#666] mb-2">Resumo</div>
          <div className="grid grid-cols-3 gap-px bg-[#1a1a1a] border border-[#1a1a1a]">
            <div className="bg-black p-3 text-center">
              <div className="font-display text-xl text-white">{data.exercises.length}</div>
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666] mt-1">Exerc</div>
            </div>
            <div className="bg-black p-3 text-center">
              <div className="font-display text-xl text-white">{data.workouts.length}</div>
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666] mt-1">Treinos</div>
            </div>
            <div className="bg-black p-3 text-center">
              <div className="font-display text-xl text-[#d4ff00]">{data.sessions.length}</div>
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666] mt-1">Sessões</div>
            </div>
          </div>
        </div>

        {/* TIMER DE DESCANSO */}
        <div className="border border-[#1a1a1a] p-4 space-y-3">
          <div>
            <div className="text-[10px] font-mono uppercase tracking-widest text-[#d4ff00] mb-1">Timer de descanso</div>
            <p className="text-[10px] font-mono text-[#666] leading-relaxed">
              Inicia automaticamente ao marcar uma série, com base no "Intervalo entre séries" definido no exercício.
            </p>
          </div>
          {[
            { key: 'enabled', label: 'Timer automático', sub: 'Inicia o cronômetro ao marcar série como feita' },
            { key: 'sound', label: 'Som', sub: 'Beep ao terminar o descanso' },
            { key: 'vibration', label: 'Vibração', sub: 'Vibra ao terminar o descanso' },
            { key: 'keepAlive', label: 'Manter app ativo', sub: 'Mantém timer rodando com tela bloqueada (consome bateria, conflita com música)' },
          ].map(opt => (
            <button key={opt.key} type="button"
              onClick={()=>{ vibrate(15); updateTimerPref(opt.key, !timerPrefs[opt.key]); }}
              className="w-full flex items-center justify-between gap-3 px-3 py-2.5 border border-[#1a1a1a] hover:border-[#333] transition-colors text-left">
              <div className="flex-1 min-w-0">
                <div className="font-mono text-sm text-white">{opt.label}</div>
                <div className="text-[10px] font-mono text-[#666] mt-0.5 leading-relaxed">{opt.sub}</div>
              </div>
              <div className="flex-shrink-0 font-mono text-xs uppercase tracking-wider"
                style={{ color: timerPrefs[opt.key] ? '#d4ff00' : '#666' }}>
                {timerPrefs[opt.key] ? 'ON' : 'OFF'}
              </div>
            </button>
          ))}
        </div>

        {/* NOTIFICAÇÕES OS */}
        <div className="border border-[#1a1a1a] p-4 space-y-3">
          <div>
            <div className="text-[10px] font-mono uppercase tracking-widest text-[#d4ff00] mb-1">Notificações</div>
            <p className="text-[10px] font-mono text-[#666] leading-relaxed">
              Para receber notificação ao terminar o descanso, conceda permissão e teste antes do treino.
              Em PWAs no Android, essa permissão é separada da permissão geral do Chrome.
            </p>
          </div>
          {(() => {
            const perm = (typeof Notification !== 'undefined') ? Notification.permission : 'unsupported';
            const isGranted = perm === 'granted';
            const isDenied = perm === 'denied';
            const isUnsupported = perm === 'unsupported';
            return (
              <>
                <div className="flex items-center justify-between gap-3 px-3 py-2.5 border border-[#1a1a1a]">
                  <div className="flex-1 min-w-0">

                    <div className="text-[10px] font-mono text-[#666] mt-0.5">

                      {!isUnsupported && perm === 'default' && 'Ainda não foi solicitada'}

                  </div>
                  <div className="flex-shrink-0 font-mono text-xs uppercase tracking-wider"
                    style={{ color: isGranted ? '#d4ff00' : (isDenied ? '#ff4757' : '#888') }}>

                  </div>
                </div>
                {!isUnsupported && !isGranted && !isDenied && (
                  <Btn variant="primary" full onClick={async () => {
                    const r = await requestNotificationPermission();

                    else toast('Permissão não concedida.', 'error');

                )}
                <Btn variant="ghost" full onClick={async () => {
                  clearDiag();
                  addDiag('Iniciando diagnóstico...', true);

                  // 1. Suporte básico
                  if (typeof Notification === 'undefined') {
                    addDiag('Notification API não suportada neste navegador', false);
                    return;
                  }
                  addDiag('Notification API: suportada', true);

                  // 2. Permissão
                  addDiag('Permissão atual: ' + Notification.permission, Notification.permission === 'granted');
                  if (Notification.permission !== 'granted') {
                    const r = await requestNotificationPermission();
                    addDiag('Após solicitação: ' + r, r === 'granted');
                    if (r !== 'granted') return;
                  }

                  // 3. Service Worker
                  let reg = window.__swReg;
                  if (!reg && navigator.serviceWorker) {
                    try {
                      reg = await navigator.serviceWorker.getRegistration();
                    } catch(e) {
                      addDiag('Erro ao buscar SW: ' + e.message, false);
                    }
                  }
                  if (reg) {
                    addDiag('Service Worker: registrado (' + (reg.active ? 'ativo' : 'inativo') + ')', !!reg.active);
                  } else {
                    addDiag('Service Worker: NÃO registrado', false);
                  }

                  // 4. Display mode (PWA vs aba)
                  const isStandalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches;
                  addDiag('Modo: ' + (isStandalone ? 'PWA standalone' : 'aba do navegador'), true);

                  // 5. Tenta caminho SW
                  let swOk = false;
                  if (reg && reg.showNotification) {
                    try {
                      await reg.showNotification('TESTE SW - ' + new Date().toLocaleTimeString('pt-BR'), {
                        body: 'Notificação via Service Worker',
                        tag: 'test-sw',
                        requireInteraction: true,
                      });
                      addDiag('showNotification(SW): chamada sem erro', true);
                      swOk = true;
                    } catch(e) {
                      addDiag('showNotification(SW) FALHOU: ' + e.message, false);
                    }
                  }

                  // 6. Tenta caminho direto também
                  try {
                    const n = new Notification('TESTE Direto - ' + new Date().toLocaleTimeString('pt-BR'), {
                      body: 'Notificação via API direta',
                      tag: 'test-direct',
                      requireInteraction: true,
                    });
                    addDiag('new Notification(): chamada sem erro', true);
                  } catch(e) {
                    addDiag('new Notification() FALHOU: ' + e.message, false);
                  }

                  // 7. Vibração e som como prova de vida (não-notificação)
                  vibrate(200);
                  addDiag('Vibração disparada (deveria sentir)', true);
                  try { playBeep(); addDiag('Beep disparado (deveria ouvir)', true); }
                  catch(e) { addDiag('Beep FALHOU: ' + e.message, false); }

                  addDiag('--- FIM ---', true);
                  addDiag('Se as duas chamadas de notificação acima foram OK mas você não viu nenhuma na tela, é o sistema operacional bloqueando (comum em Xiaomi/MIUI/HyperOS). Veja instruções abaixo do log.', true);
                }}>Diagnóstico de notificação</Btn>

                {/* Log de diagnóstico */}
                {diagLog.length > 0 && (
                  <div className="border border-[#1a1a1a] bg-[#0a0a0a] p-3 space-y-1 max-h-72 overflow-y-auto">
                    {diagLog.map((entry, i) => (
                      <div key={i} className="font-mono text-[10px] flex gap-2 leading-relaxed">
                        <span className="text-[#666] flex-shrink-0">{entry.t}</span>
                        <span className="flex-shrink-0" style={{ color: entry.ok ? '#84cc16' : '#ff4757' }}>
                          {entry.ok ? '✓' : '✗'}
                        </span>
                        <span className="text-white break-words">{entry.msg}</span>
                      </div>
                    ))}
                    <button onClick={clearDiag} className="mt-2 text-[10px] font-mono text-[#666] hover:text-white">Limpar log</button>
                  </div>
                )}

                {/* Instruções específicas pra Xiaomi/MIUI */}
                <div className="border border-[#1a1a1a] bg-[#0a0a0a] p-3 space-y-1.5">
                  <div className="text-[10px] font-mono uppercase tracking-widest text-[#888] mb-1">Telefone Xiaomi/Redmi/Poco?</div>
                  <p className="text-[10px] font-mono text-[#aaa] leading-relaxed">

                  </p>
                  <ol className="text-[10px] font-mono text-[#aaa] leading-relaxed list-decimal list-inside space-y-0.5">
                    <li>Configurações → Apps → Chrome (ou o PWA instalado) → <span className="text-white">Notificações</span> → ativar tudo, especialmente "Banners flutuantes" e "Tela de bloqueio"</li>
                    <li>Configurações → Apps → Chrome → <span className="text-white">Bateria</span> → "Sem restrições"</li>
                    <li>Configurações → Apps → Chrome → <span className="text-white">Iniciar automaticamente</span> → ativar</li>
                    <li>Em "Apps recentes": segura o card do Chrome e ativa <span className="text-white">cadeado</span> (impede o sistema de fechar)</li>
                  </ol>
                </div>
                {isDenied && (
                  <p className="text-[10px] font-mono text-[#ff4757] leading-relaxed px-1">
                    Para reativar: nas configurações do Android → Apps → Chrome (ou o PWA do Treino) → Notificações → permitir. Depois volte aqui.
                  </p>
                )}
              </>
            );
          })()}
        </div>

        {/* DRIVE SECTION */}
        <div className="border border-[#d4ff00]/40 p-4 space-y-3">
          <div>
            <h3 className="font-display text-lg tracking-wider mb-1 text-[#d4ff00]">Google Drive</h3>
            <p className="text-[10px] font-mono text-[#666] leading-relaxed">
              Sincronize seus dados entre dispositivos via Google Drive. Os dados ficam num arquivo único <span className="text-[#aaa]">{DRIVE_FILE_NAME}</span> na sua conta.
            </p>
          </div>

          {isFileProto && (
            <div className="border border-[#ff4757]/40 bg-[#ff4757]/10 p-3 text-[10px] font-mono text-[#ff4757] leading-relaxed">
              ⚠ Você está abrindo o app via file://. O Google não permite login OAuth nesse modo. Hospede o arquivo num servidor (GitHub Pages, Netlify) para usar o Drive.
            </div>
          )}

          {!config.clientId ? (
            <Btn variant="accent" onClick={()=>setDriveSetup(true)} icon={Settings} full>Configurar Client ID</Btn>
          ) : (
            <>
              <div className="text-[10px] font-mono text-[#666] flex items-center justify-between gap-2">
                <span className="truncate">Client ID: {config.clientId.slice(0,16)}…</span>
                <button onClick={()=>setDriveSetup(true)} className="text-[#d4ff00] underline flex-shrink-0">trocar</button>
              </div>

              {!authed ? (
                <Btn variant="primary" onClick={driveConnect} icon={Cloud} disabled={driveBusy} full>
                  {driveBusy ? 'Conectando...' : 'Conectar ao Drive'}
                </Btn>
              ) : (
                <div className="space-y-2">
                  <div className="grid grid-cols-2 gap-2">
                    <div className="space-y-1">
                      <Btn variant="primary" onClick={driveSaveAction} icon={CloudUp} disabled={driveBusy}>Salvar</Btn>
                      <div className="text-[9px] font-mono text-[#666] text-center tracking-widest uppercase truncate">
                        {syncTimes.driveSave ? formatSyncTime(syncTimes.driveSave) : 'Nunca'}
                      </div>
                    </div>
                    <div className="space-y-1">
                      <Btn variant="ghost" onClick={driveLoadAction} icon={CloudDown} disabled={driveBusy}>Carregar</Btn>
                      <div className="text-[9px] font-mono text-[#666] text-center tracking-widest uppercase truncate">
                        {syncTimes.driveLoad ? formatSyncTime(syncTimes.driveLoad) : 'Nunca'}
                      </div>
                    </div>
                  </div>
                  <Btn variant="ghost" onClick={driveDisconnect} icon={LogOut} size="sm" full>Desconectar</Btn>
                </div>
              )}
            </>
          )}
        </div>

        <div className="border border-[#1a1a1a] p-4 space-y-3">
          <div>
            <h3 className="font-display text-lg tracking-wider mb-1">Exportar arquivo</h3>
            <p className="text-[10px] font-mono text-[#666] leading-relaxed">Baixa um JSON com todos os dados.</p>
          </div>
          <Btn icon={Download} onClick={exportData} variant="ghost" full>Exportar backup</Btn>
          <div className="text-[9px] font-mono text-[#666] text-center tracking-widest uppercase">

        </div>
        <div className="border border-[#1a1a1a] p-4 space-y-3">
          <div>
            <h3 className="font-display text-lg tracking-wider mb-1">Importar arquivo</h3>
            <p className="text-[10px] font-mono text-[#666] leading-relaxed">Carrega um JSON e SUBSTITUI todos os dados atuais.</p>
          </div>
          <input ref={fileRef} type="file" accept="application/json,.json" className="hidden" onChange={handleFile} />
          <Btn icon={Upload} variant="ghost" onClick={()=>fileRef.current && fileRef.current.click()} full>Importar backup</Btn>
          <div className="text-[9px] font-mono text-[#666] text-center tracking-widest uppercase">
            Última: {syncTimes.fileImport ? formatSyncTime(syncTimes.fileImport) : 'Nunca'}
          </div>
        </div>
        <div className="border border-[#ff4757]/30 p-4 space-y-3">
          <div>
            <h3 className="font-display text-lg tracking-wider mb-1 text-[#ff4757]">Apagar tudo</h3>
            <p className="text-[10px] font-mono text-[#666] leading-relaxed">Remove permanentemente todos os dados locais.</p>
          </div>
          <Btn icon={Trash2} variant="danger" onClick={()=>setConfirmWipe(true)} full>Apagar todos os dados</Btn>
        </div>
        <div className="text-center text-[9px] font-mono text-[#444] tracking-widest pt-4">Versão {APP_VERSION}</div>
      </div>

      <DriveSetupModal open={driveSetup} currentClientId={config.clientId} onSave={handleSetClientId} onClose={()=>setDriveSetup(false)} />

      {/* Modal de import com escolha entre substituir e adicionar */}
      <Modal open={confirmReplace} onClose={()=>{setConfirmReplace(false); setImportPreview(null);}}
        title="Importar dados"
        footer={null}>
        {importPreview && (
          <>
            <p className="text-sm text-[#aaa] font-mono leading-relaxed">
              O arquivo contém <span className="text-white">{importPreview.exercises.length} exercícios</span>,{' '}
              <span className="text-white">{importPreview.workouts.length} treinos</span> e{' '}

            <div className="space-y-2 pt-2">
              <Btn variant="ghost" onClick={mergeData.bind(null, importPreview)} icon={Plus} full>
                Adicionar aos dados existentes

              <p className="text-[10px] font-mono text-[#666] leading-relaxed">

      </Modal>

      <Modal open={confirmReplaceFromDrive} onClose={()=>{setConfirmReplaceFromDrive(false); setDrivePreview(null);}} title="Carregar do Drive"
        footer={null}>
        {drivePreview && (
          <>
            <p className="text-sm text-[#aaa] font-mono leading-relaxed">

              <Btn variant="primary" onClick={mergeFromDrive} icon={Plus} full>Adicionar dados novos</Btn>

      <Confirm open={confirmWipe} title="Apagar tudo?"

    </div>
  );

/* APP */
function App() {
  const { data, setData, active, setActive } = useStorage();
  const [tab, setTab] = useState('home');
  const [editingWorkout, setEditingWorkout] = useState(null);
  const [viewingSession, setViewingSession] = useState(null);
  const [finishedSession, setFinishedSession] = useState(null);
  // Quando true, o treino ativo fica em segundo plano e o usuário vê a tela principal.
  // Persiste no localStorage para sobreviver a reload.
  // ALÉM disso, ao carregar a página com um treino ativo, sempre começa pausado —
  // isso garante que recarregar/reabrir o app mostra o banner de retomada em vez de
  // cair direto no treino, evitando confusão e reduzindo risco de perder dados acidentalmente.
  const [paused, setPausedState] = useState(() => {
    const persistedPaused = loadLS(PAUSED_KEY, false);
    const hasActive = !!loadLS(ACTIVE_KEY, null);
    // Se tem active, força pausa ao abrir (independente do flag persistido).
    return persistedPaused || hasActive;
  });
  const setPaused = useCallback((v) => {
    setPausedState(v);
    if (v) saveLS(PAUSED_KEY, true);
    else localStorage.removeItem(PAUSED_KEY);
  }, []);
  const { show: toast, Toast } = useToast();

  // Recuperação: se o app abriu com um treino ativo cujo último update foi há muito tempo
  // (>4h), oferecer ao usuário continuar, finalizar agora, ou descartar.
  // Isso cobre o cenário "esqueci o app aberto, voltei dia seguinte".
  // Para fechamentos curtos (poucos minutos), o fluxo é direto sem atrito.
  const STALE_THRESHOLD_MS = 4 * 60 * 60 * 1000;
  const [staleCheckDone, setStaleCheckDone] = useState(false);
  const [staleSession, setStaleSession] = useState(null);
  useEffect(() => {
    if (staleCheckDone) return;
    if (!active) { setStaleCheckDone(true); return; }
    const last = active.lastUpdatedAt || active.startedAt;
    if (Date.now() - last > STALE_THRESHOLD_MS) {
      setStaleSession(active);
    }
    setStaleCheckDone(true);
  }, [staleCheckDone, active]);

  // Atualiza um timestamp de "última atividade" sempre que o active muda.
  // Isso permite distinguir "fechei e voltei rápido" de "esqueci aberto".
  useEffect(() => {
    if (!active) return;
    if (!staleSession) {
      // Só atualiza lastUpdatedAt se não estamos no meio de uma decisão de "stale"
      const now = Date.now();
      if (!active.lastUpdatedAt || now - active.lastUpdatedAt > 30000) {
        setActive({ ...active, lastUpdatedAt: now });
      }
    }
  }, [active && active.exercises, staleSession]);

  const handleStaleContinue = () => setStaleSession(null);
  const handleStaleDiscard = () => { setActive(null); setStaleSession(null); };
  const handleStaleFinish = () => {
    // Salva como sessão finalizada usando o que já estava registrado.
    if (staleSession) {
      const now = Date.now();
      // Como duração, usa o tempo desde startedAt até o último update conhecido (não inflar com horas paradas)
      const duration = (staleSession.lastUpdatedAt || staleSession.startedAt) - staleSession.startedAt;
      const finalized = { ...staleSession, finishedAt: now, duration: Math.max(0, duration) };
      setData(d => ({ ...d, sessions: [finalized, ...d.sessions] }));
    }
    setActive(null);
    setStaleSession(null);
  };

  const goTab = useCallback((newTab) => {
    setViewingSession(null);
    setEditingWorkout(null);
    setTab(newTab);
  }, []);

  // Copia para clipboard com fallback para document.execCommand
  // (que continua funcionando em contextos sem permissão de clipboard moderna).
  const copyTextToClipboard = async (text, successMsg) => {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
      } else {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position='fixed'; ta.style.left='-9999px';
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      }
      toast(successMsg);
    } catch (e) { console.error(e); toast('Erro ao copiar', 'error'); }
  };
  const handleCopyAllTemplates = () => {
    const txt = activeTemplatesToText(data);
    if (!txt) { toast('Nenhum treino ativo', 'error'); return; }
    copyTextToClipboard(txt, 'Treinos copiados como texto');
  };

  const startWorkout = (template) => {
    if (template.exercises.length === 0) return;
    // Limpa modal de "Treino finalizado" da sessão anterior, se ainda estiver no estado.
    setFinishedSession(null);
    const sessionId = uid();

    // Helper: busca o último execScore registrado para um exerciseId no histórico.
    // Default 3 se nunca foi avaliado.
    const findLastExecScore = (exerciseId) => {
      for (const s of data.sessions) {
        const log = s.exercises.find(e => e.exerciseId === exerciseId);
        if (log && log.execScore != null) return log.execScore;
      }
      return 3;
    };

    // Helper: busca os descansos REAIS por índice de série da última sessão registrada
    // do mesmo exercício. Retorna função (setIdx) -> rest|null.
    const findLastRestsForExercise = (exerciseId) => {
      for (const s of data.sessions) {
        const log = s.exercises.find(e => e.exerciseId === exerciseId);
        if (!log) continue;
        const sets = (log.sets || []).filter(x => x.completed);
        if (sets.length === 0) continue;
        return (setIdx) => {
          const set = sets[setIdx];
          if (!set) return null;
          return (set.rest === '' || set.rest == null) ? null : set.rest;
        };
      }
      return () => null;
    };

    const session = {
      id: sessionId,
      templateId: template.id,
      templateName: template.name,
      notes: template.notes||'',
      sessionNote:'',
      date: Date.now(),
      startedAt: Date.now(),
      elapsed: 0,
      disposition: null,
      intensity: null,
      originalExerciseIds: template.exercises.map(we => we.exerciseId),
      exercises: template.exercises.map(we => {
        const def = data.exercises.find(d=>d.id===we.exerciseId);
        const norm = normalizeTemplateExercise(we, def);
        const getLastRest = findLastRestsForExercise(we.exerciseId);
        const sets = def ? buildInitialSets(def, norm, getLastRest) : [];
        return {
          exerciseId: we.exerciseId,
          targetSets: norm.targetSets,
          targetRepsMin: norm.targetRepsMin,
          targetRepsMax: norm.targetRepsMax,
          restSeconds: norm.restSeconds || null,
          notes: norm.notes,
          sessionNote:'',
          execScore: findLastExecScore(we.exerciseId),
          sets
        };
      })
    };
    setActive(session);
  };

  if (active && !paused) {
    return (
      <>
        {staleSession && (
          <Modal open={true} onClose={()=>{}} title="Treino aberto há muito tempo"
            footer={null}>
            <p className="text-sm font-mono text-[#aaa] leading-relaxed">
              Você tem um treino "<span className="text-white">{staleSession.templateName}</span>" iniciado em <span className="text-white">{formatDateTime(staleSession.startedAt)}</span>, há mais de 4 horas. O que deseja fazer?
            </p>
            <div className="space-y-2 pt-2">
              <Btn variant="primary" onClick={handleStaleContinue} icon={Play} full>Continuar treino</Btn>
              <Btn variant="ghost" onClick={handleStaleFinish} icon={Check} full>Finalizar e salvar agora</Btn>
              <Btn variant="danger" onClick={handleStaleDiscard} icon={Trash2} full>Descartar este treino</Btn>
            </div>
          </Modal>
        )}
        {!staleSession && (
          <ActiveWorkout active={active} setActive={setActive} data={data} setData={setData}
            onPause={()=>setPaused(true)}
            onFinish={(session) => { setPaused(false); if (session) setFinishedSession(session); }} />
        )}
        {Toast}
      </>
    );
  }

  if (editingWorkout) {
    return (<>
      <WorkoutEditor workout={editingWorkout} data={data} setData={setData} onClose={()=>setEditingWorkout(null)} />
      {Toast}
    </>);
  }

  if (viewingSession) {
    return (
      <>
        <SessionDetail session={viewingSession} data={data} onBack={()=>setViewingSession(null)}
          onDelete={()=>{ setData(d=>({...d, sessions: d.sessions.filter(s=>s.id!==viewingSession.id)})); setViewingSession(null); }}
          toast={toast} />
        <BottomNav tab={tab} onTab={goTab} />
        {Toast}
      </>
    );
  }

  return (
    <>
      <div className="min-h-screen bg-black text-white">
        {tab==='home'      && <WorkoutsView data={data} onStart={startWorkout} onEdit={setEditingWorkout}
                                pausedSession={paused && active ? active : null}
                                onResume={()=>setPaused(false)}
                                onCopyTemplates={handleCopyAllTemplates} />}
        {tab==='exercises' && <ExercisesView data={data} setData={setData} />}
        {tab==='history'   && <HistoryView   data={data} onSelect={setViewingSession} />}
        {tab==='progress'  && <ProgressView  data={data} />}
        {tab==='config'    && <ConfigView    data={data} setData={setData} toast={toast} />}
      </div>
      <BottomNav tab={tab} onTab={goTab} />
      {/* Modal de "Treino finalizado" no fluxo principal: aparece após o ActiveWorkout sair de tela.
          Se ficasse dentro do retorno do `if (active)`, sumiria junto com o ActiveWorkout
          quando active fosse null e o modal nunca seria visto. */}
      {finishedSession && (
        <Modal open={true} onClose={()=>setFinishedSession(null)} title="Treino finalizado"
          footer={<Btn onClick={()=>setFinishedSession(null)} full>OK</Btn>}>
          <p className="text-sm font-mono text-[#aaa]">Salvo no histórico.</p>
        </Modal>
      )}
      {Toast}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
