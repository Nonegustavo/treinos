// Service worker registrado via Blob.
// - Sem cache (não faz offline real, evita problemas de versionamento)
// - Aceita mensagens via postMessage pra mostrar notificações via showNotification
//   (necessário em PWAs Android Chrome, que frequentemente bloqueiam new Notification() direto)
// - Mantém referência global window.__swReg pra que o app possa usar swReg.showNotification(...)
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  var swCode = [
    "self.addEventListener('install', e => self.skipWaiting());",
    "self.addEventListener('activate', e => self.clients.claim());",
    "self.addEventListener('fetch', e => {});",
    // Quando o usuário toca na notificação, foca a janela do app
    "self.addEventListener('notificationclick', e => {",
    "  e.notification.close();",
    "  e.waitUntil(",
    "    self.clients.matchAll({ type: 'window', includeUncontrolled: true }).then(list => {",
    "      for (const c of list) { if ('focus' in c) { c.postMessage({ type: 'notification-click', tag: e.notification.tag }); return c.focus(); } }",
    "      if (self.clients.openWindow) return self.clients.openWindow('/');",
    "    })",
    "  );",
    "});",
    // Permite que a página peça uma notificação via postMessage (algumas plataformas exigem)
    "self.addEventListener('message', e => {",
    "  if (e.data && e.data.type === 'show-notification') {",
    "    self.registration.showNotification(e.data.title || 'Treino', e.data.options || {});",
    "  }",
    "});"
  ].join('\n');
  var swBlob = new Blob([swCode], { type: 'application/javascript' });
  var swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl)
    .then(function(reg) {
      window.__swReg = reg;
      // Escuta cliques na notificação propagados pelo SW
      navigator.serviceWorker.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'notification-click') {
          window.__pendingStartSetFromNotification = true;
          // Dispara um evento focus pra que o app reaja imediatamente
          try { window.dispatchEvent(new Event('focus')); } catch(err){}
        }
      });
    })
    .catch(function(err) { console.warn('SW registration failed:', err); });
}
</script>

/* Web Audio: gera beep sintético quando o timer termina.
   Reaproveita o mesmo AudioContext entre chamadas pra evitar sobrecarga.
   Em iOS o contexto começa "suspended" — a primeira interação do usuário (clique)
   precisa chamar .resume() pra desbloquear. Por isso temos o helper unlockAudio. */
let _audioCtx = null;
const getAudioCtx = () => {
  if (!_audioCtx) {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      _audioCtx = new Ctx();
    } catch (e) { return null; }
  }
  return _audioCtx;
};
const unlockAudio = () => {
  // Chamar dentro de qualquer handler de clique pra desbloquear áudio em iOS Safari.
  const ctx = getAudioCtx();
  if (ctx && ctx.state === 'suspended') ctx.resume().catch(()=>{});
};
// Beep sintético: sequência de 3 tons curtos de 800Hz, total ~600ms.
const playBeep = () => {
  const ctx = getAudioCtx();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume().catch(()=>{});
  const now = ctx.currentTime;
  for (let i = 0; i < 3; i++) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    const start = now + i * 0.22;
    const end = start + 0.16;
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(0.35, start + 0.01);
    gain.gain.linearRampToValueAtTime(0, end);
    osc.start(start);
    osc.stop(end + 0.05);
  }
};

/* MediaSession + áudio "silencioso" pra manter timer ativo com tela bloqueada.
   Estratégia: criar um <audio> com um data URI de áudio extremamente baixo volume
   tocando em loop. Isso engana o navegador a manter o JavaScript do app ativo.
   Compensação: o telefone exibe um indicador de mídia ativa e pode conflitar
   com apps de música. Por isso é opt-in nas configurações. */
let _silentAudio = null;
const startKeepAlive = () => {
  if (_silentAudio) return;
  try {
    const audio = document.createElement('audio');
    // 1s de silêncio em WAV (44.1kHz mono 16bit) — encodado em base64.
    // Mantemos bem curto e ativamos loop=true.
    audio.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAAA';
    audio.loop = true;
    audio.volume = 0.001; // praticamente inaudível; só pra manter mídia ativa
    audio.play().catch(()=>{});
    _silentAudio = audio;
    if ('mediaSession' in navigator) {
      try {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: 'Treino em andamento',
          artist: 'Treino',
        });
      } catch(e){}
    }
  } catch(e) { console.warn('keepAlive failed:', e); }
};
const stopKeepAlive = () => {
  if (_silentAudio) {
    try { _silentAudio.pause(); _silentAudio.src = ''; } catch(e){}
    _silentAudio = null;
  }
};

/* Wake Lock: mantém a tela acesa durante o treino. API moderna; falha silenciosa
   onde não suportada (iOS Safari mais antigo). Não bloqueia features. */
let _wakeLock = null;
const acquireWakeLock = async () => {
  if (_wakeLock) return;
  try {
    if ('wakeLock' in navigator && navigator.wakeLock.request) {
      _wakeLock = await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener && _wakeLock.addEventListener('release', () => { _wakeLock = null; });
    }
  } catch(e) {}
};
const releaseWakeLock = () => {
  if (_wakeLock) {
    try { _wakeLock.release && _wakeLock.release(); } catch(e){}
    _wakeLock = null;
  }
};

/* Pede permissão de notificação. Retorna 'granted' / 'denied' / 'default'.
   IMPORTANTE: deve ser chamado dentro de um handler de clique direto pra funcionar
   em alguns Androids/PWAs que ignoram solicitações automáticas. */
const requestNotificationPermission = async () => {
  if (typeof Notification === 'undefined') return 'unsupported';
  if (Notification.permission === 'granted') return 'granted';
  if (Notification.permission === 'denied') return 'denied';
  try {
    const result = await Notification.requestPermission();
    return result;
  } catch(e) {
    // Versões antigas usam callback
    return new Promise(resolve => {
      try { Notification.requestPermission(r => resolve(r)); }
      catch(err) { resolve('default'); }
    });
  }
};

/* Mostra notificação local. Estratégia em camadas para máxima compatibilidade:
   1. Se há service worker registration disponível, usa swReg.showNotification()
      (necessário em PWAs Android Chrome instalados)
   2. Fallback: new Notification() (funciona em desktop, Android Chrome aba normal)
   Retorna a promise/notification ou null se falhar. */
const showLocalNotification = async (title, options) => {
  if (typeof Notification === 'undefined') return null;
  if (Notification.permission !== 'granted') return null;
  const opts = { tag: 'rest-timer', renotify: true, requireInteraction: false, silent: false, ...options };
  // Tenta via service worker primeiro
  try {
    const reg = window.__swReg || (navigator.serviceWorker && await navigator.serviceWorker.getRegistration());
    if (reg && reg.showNotification) {
      await reg.showNotification(title, opts);
      return true;
    }
  } catch(e) { console.warn('SW notification failed:', e); }
  // Fallback: Notification API direta
  try {
    const n = new Notification(title, opts);
    n.onclick = () => {
      try { window.focus(); } catch(e){}
      n.close();
      window.__pendingStartSetFromNotification = true;
    };
    setTimeout(() => { try { n.close(); } catch(e){} }, 30000);
    return n;
  } catch(e) { console.warn('Notification failed:', e); return null; }
};

  const w = Number(weight) || 0;

  if (w <= 0 || r < 1) return 0;

  return Math.round(w * (1 + r/30) * 10) / 10;

  return `${m}:${String(r).padStart(2,'0')}`;
};

/* hex + alpha helper */
const withAlpha = (hex, alpha) => {
  if (!hex || typeof hex !== 'string') return '#0000';
  const h = hex.replace('#','');
  if (h.length !== 6) return hex;
  const r = parseInt(h.slice(0,2),16);
  const g = parseInt(h.slice(2,4),16);
  const b = parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
};

const normalizeTemplateExercise = (we, exDef) => {
  const targetSets = Math.max(1, we.targetSets || 3);
  if (Array.isArray(we.setRefs) && we.setRefs.length) {
    if (we.setRefs.length === targetSets) return we;
    const adjusted = [];
    for (let i = 0; i < targetSets; i++) {
      adjusted.push(we.setRefs[i] || we.setRefs[we.setRefs.length-1] || { weight: '', reps: '', time: '' });
    }
    return { ...we, setRefs: adjusted };
  }
  const baseW = we.lastWeight != null ? we.lastWeight : '';
  const baseReps = we.targetRepsMax || we.targetRepsMin || '';
  const baseTime = we.targetTime || '';
  const isTime = exDef && exDef.type === 'time';
  const setRefs = [];
  for (let i = 0; i < targetSets; i++) {
    if (isTime) setRefs.push({ weight: baseW, reps: '', time: baseTime });
    else setRefs.push({ weight: baseW, reps: baseReps, time: '' });
  }
  return { ...we, setRefs };
};

/* STORAGE */
const loadLS = (key, fallback) => {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; } catch { return fallback; }
};
const saveLS = (key, val) => {
  try { localStorage.setItem(key, JSON.stringify(val)); }
  catch (e) { console.error('Falha ao salvar:', e); alert('Não foi possível salvar. Armazenamento cheio.'); }
};

const useStorage = () => {
  const [data, setData] = useState(() => loadLS(STORAGE_KEY, { exercises: [], workouts: [], sessions: [] }));
  const [active, setActiveState] = useState(() => loadLS(ACTIVE_KEY, null));
  const saveTimer = useRef(null);
  const firstRun = useRef(true);
  useEffect(() => {
    if (firstRun.current) { firstRun.current = false; return; }
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => saveLS(STORAGE_KEY, data), 200);
    return () => saveTimer.current && clearTimeout(saveTimer.current);
  }, [data]);

  // setActive aceita valor direto OU função updater (estilo React).
  // CRÍTICO: o valor real (não a função) é salvo no localStorage.
  // Antes desta correção, passar uma função aqui salvava a string da função em
  // ACTIVE_KEY, corrompendo o storage e fazendo o app "perder" o treino ao recarregar.
  const activeRef = useRef(active);
  activeRef.current = active;
  const setActive = useCallback((s) => {
    if (typeof s === 'function') {
      const newVal = s(activeRef.current);
      activeRef.current = newVal;
      setActiveState(newVal);
      if (newVal) saveLS(ACTIVE_KEY, newVal);
      else localStorage.removeItem(ACTIVE_KEY);
    } else {
      activeRef.current = s;
      setActiveState(s);
      if (s) saveLS(ACTIVE_KEY, s);
      else localStorage.removeItem(ACTIVE_KEY);
    }
  }, []);
  return { data, setData, active, setActive };
};

const formatSyncTime = (ts) => {
  if (!ts) return null;
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return `Hoje às ${d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
  const diff = Math.floor((now - d) / (1000*60*60*24));
  if (diff === 1) return `Ontem às ${d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
  if (diff < 7) return `${diff} dias atrás · ${d.toLocaleDateString('pt-BR')}`;
  return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
};

const driveInitTokenClient = (clientId, callback) => {
  if (!window.google || !window.google.accounts || !window.google.accounts.oauth2) {
    throw new Error('Google Identity Services não carregado. Verifique a conexão com a internet.');
  }
  tokenClient = window.google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: callback,
  });
  return tokenClient;
};

const driveRequestToken = (interactive = true) => new Promise((resolve, reject) => {
  if (!tokenClient) return reject(new Error('Cliente OAuth não inicializado.'));
  tokenClient.callback = (resp) => {
    if (resp.error) return reject(new Error(resp.error_description || resp.error));
    const token = { access_token: resp.access_token, expires_at: Date.now() + (resp.expires_in * 1000) };
    driveSaveToken(token);
    resolve(token);
  };
  tokenClient.requestAccessToken({ prompt: interactive ? 'consent' : '' });
});

const driveGetValidToken = async () => {
  const t = driveLoadToken();
  if (t && t.access_token && t.expires_at && Date.now() < t.expires_at - 60000) return t;
  return await driveRequestToken(false);
};

const driveFindFile = async (token, name) => {
  const q = encodeURIComponent(`name='${name}' and trashed=false`);
  const resp = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)&pageSize=10`, {
    headers: { Authorization: `Bearer ${token.access_token}` }
  });
  if (!resp.ok) throw new Error(`Drive list: ${resp.status}`);
  const json = await resp.json();
  // pega o mais recente
  const files = json.files || [];
  files.sort((a,b) => new Date(b.modifiedTime) - new Date(a.modifiedTime));
  return files[0] || null;
};

const driveUpload = async (token, content, existingFileId) => {
  const metadata = { name: DRIVE_FILE_NAME, mimeType: 'application/json' };
  const boundary = '-------treino' + uid();
  const delim = `\r\n--${boundary}\r\n`;
  const close = `\r\n--${boundary}--`;
  const body =
    delim + 'Content-Type: application/json; charset=UTF-8\r\n\r\n' + JSON.stringify(metadata) +
    delim + 'Content-Type: application/json\r\n\r\n' + content + close;

  const url = existingFileId
    ? `https://www.googleapis.com/upload/drive/v3/files/${existingFileId}?uploadType=multipart`
    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
  const method = existingFileId ? 'PATCH' : 'POST';
  const resp = await fetch(url, {
    method,
    headers: {
      Authorization: `Bearer ${token.access_token}`,
      'Content-Type': `multipart/related; boundary=${boundary}`,
    },
    body
  });
  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`Drive upload: ${resp.status} ${err}`);
  }
  return await resp.json();
};

const driveDownload = async (token, fileId) => {
  const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { Authorization: `Bearer ${token.access_token}` }
  });
  if (!resp.ok) throw new Error(`Drive download: ${resp.status}`);
  return await resp.text();
};

const Btn = ({ children, onClick, variant='primary', size='md', icon:IconC, type='button', disabled, full, style }) => {
  const sizes = { sm:'px-3 py-2 text-xs', md:'px-4 py-3 text-sm', lg:'px-5 py-4 text-base' };
  const variants = {
    primary: 'bg-[#d4ff00] text-black hover:opacity-90',
    ghost:   'bg-transparent text-white border border-[#1a1a1a] hover:border-[#333]',
    danger:  'bg-transparent text-[#ff4757] border border-[#ff4757]/30 hover:bg-[#ff4757]/10',
    dark:    'bg-[#0d0d0d] text-white border border-[#1a1a1a] hover:border-[#333]',
    accent:  'bg-transparent text-[#d4ff00] border border-[#d4ff00]/40 hover:bg-[#d4ff00]/10',
  };
  // Wrapper de click que aciona vibração tátil leve antes do handler.
  const handleClick = (e) => {
    if (disabled) return;
    vibrate(15);
    if (onClick) onClick(e);
  };
  return (
    <button type={type} onClick={handleClick} disabled={disabled} style={style}
      className={`${sizes[size]} ${variants[variant]} ${full?'w-full':''} ${disabled?'opacity-40 cursor-not-allowed':''} font-mono uppercase tracking-wider font-medium transition-all duration-150 active:scale-[0.98] flex items-center justify-center gap-2`}>
      {IconC && <IconC size={size==='sm'?14:16} strokeWidth={2.2} />}
      {children}
    </button>
  );
};

/* NumStepper: input numérico com botões - e + nas laterais.
   - "menos" à esquerda, "mais" à direita.
   - step configurável (default 1, ex: 0.5 para carga, 1 para reps/tempo).
   - Nunca permite valores negativos.
   - Preserva string vazia (não força 0 ao apagar).
   - Compacto pra caber em células de tabela. */
/* NumStepper: input numérico simples (sem botões − e +).
   Mantido com nome "NumStepper" porque é usado em vários pontos.
   - step define precisão (0.5 pra carga, 1 pra reps/tempo).
   - Nunca permite valores negativos.
   - Preserva string vazia (não força 0 ao apagar). */
const NumStepper = ({ value, onChange, step = 1, disabled, placeholder = '—' }) => {
  const isEmpty = value === '' || value == null;
  const isInt = step >= 1 && Number.isInteger(step);

  const handleInput = (str) => {
    if (str === '') { onChange(''); return; }
    const n = isInt ? parseInt(str) : parseFloat(str);
    if (isNaN(n) || n < 0) { onChange(''); return; }
    onChange(n);
  };

  return (
    <input type="number" inputMode="decimal" step={step} min="0"
      value={isEmpty ? '' : value}
      onChange={(e)=>handleInput(e.target.value)}
      onFocus={(e)=>e.target.select()}
      placeholder={placeholder}
      disabled={disabled}
      className="cell-input"
      style={{ width: '100%' }} />
  );
};

const useToast = () => {
  const [msg, setMsg] = useState('');
  const [variant, setVariant] = useState('info');
  const show = (text, v='info') => { setMsg(text); setVariant(v); setTimeout(()=>setMsg(''), 3500); };
  const colors = variant === 'error'
    ? 'border-[#ff4757]/40 text-[#ff4757]'
    : 'border-[#d4ff00]/40 text-[#d4ff00]';
  const Toast = msg ? (
    <div className={`fixed bottom-24 left-4 right-4 z-50 bg-[#0a0a0a] border ${colors} px-4 py-3 font-mono text-xs uppercase tracking-widest text-center`}>
      {msg}
    </div>
  ) : null;
  return { show, Toast };
};

const ExercisesView = ({ data, setData }) => {
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState('');
  const [confirmDelete, setConfirmDelete] = useState(null);
  const startNew = () => setEditing({ id:null, name:'', muscle:'', type:'weight', notes:'' });

  const save = (ex) => {
    if (!ex.name.trim()) return;
    setData(d => {
      const list = [...d.exercises];
      if (ex.id) { const i = list.findIndex(x => x.id === ex.id); if (i >= 0) list[i] = ex; }
      else list.push({ ...ex, id: uid() });
      list.sort((a,b) => a.name.localeCompare(b.name, 'pt-BR'));
      return { ...d, exercises: list };
    });
    setEditing(null);
  };
  const remove = (id) => {
    setData(d => ({ ...d, exercises: d.exercises.filter(e => e.id !== id) }));
    setConfirmDelete(null); setEditing(null);
  };
  const filtered = useMemo(() => {
    const f = filter.toLowerCase().trim();
    if (!f) return data.exercises;
    return data.exercises.filter(e => e.name.toLowerCase().includes(f) || (e.muscle||'').toLowerCase().includes(f));
  }, [data.exercises, filter]);
  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(e => { const m = e.muscle||'Sem grupo'; if (!g[m]) g[m]=[]; g[m].push(e); });
    return Object.entries(g).sort((a,b)=>a[0].localeCompare(b[0],'pt-BR'));
  }, [filtered]);

  return (
    <div className="pb-24">
      <Header title="Exercícios" subtitle={`${data.exercises.length} cadastrados`} right={<Btn icon={Plus} onClick={startNew} size="sm">Novo</Btn>} />
      <div className="px-4 py-3 border-b border-[#1a1a1a]">
        <Input value={filter} onChange={setFilter} placeholder="Buscar nome ou grupo muscular" />
      </div>
      {data.exercises.length === 0 ? (
        <EmptyState icon={Dumbbell} title="Nenhum exercício"
          hint="Cadastre os exercícios que você usa nos treinos."
          action={<Btn icon={Plus} onClick={startNew}>Cadastrar primeiro</Btn>} />
      ) : (
        <div>
          {grouped.map(([muscle, exs]) => {
            const c = muscleColor(muscle);
            return (
              <div key={muscle} className="border-b border-[#0d0d0d]">
                <div className="px-4 py-2 text-[10px] font-mono uppercase tracking-widest flex items-center gap-2" style={{ color: c, background: withAlpha(c, 0.08) }}>
                  <span className="w-2 h-2" style={{ background: c }} />
                  {muscle}
                </div>
                {exs.map(ex => (
                  <button key={ex.id} onClick={()=>setEditing(ex)}
                    className="w-full px-4 py-3 flex items-center gap-3 hover:bg-[#0a0a0a] transition-colors text-left border-b border-[#0d0d0d] last:border-b-0 border-l-4"
                    style={{ borderLeftColor: c }}>
                    <div className="flex-1 min-w-0">
                      <div className="font-mono text-sm text-white truncate">{ex.name}</div>
                      <div className="flex gap-2 mt-1 flex-wrap">
                        <Pill>{(EX_TYPES.find(t=>t.id===ex.type)||{}).label || ex.type}</Pill>
                      </div>
                    </div>
                    <ChevronRight size={16} className="text-[#444]" />
                  </button>
                ))}
              </div>
            );
          })}
        </div>
      )}
      {editing && <ExerciseEditor exercise={editing} onSave={save} onCancel={()=>setEditing(null)} onDelete={editing.id?()=>setConfirmDelete(editing.id):null} />}
      <Confirm open={!!confirmDelete} title="Excluir exercício?"
        message="O exercício será removido. Treinos antigos manterão o registro."
        onConfirm={()=>remove(confirmDelete)} onCancel={()=>setConfirmDelete(null)} danger />
    </div>
  );
};

/* WORKOUTS */
const WEEKDAY_LABELS = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
const WEEKDAY_LABELS_FULL = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

const WorkoutsView = ({ data, onStart, onEdit, pausedSession, onResume, onCopyTemplates }) => {
  const [showInactive, setShowInactive] = useState(false);
  // Ordena ativos: primeiro os que têm dias atribuídos (pelo menor dia), depois os sem dia (ordem de cadastro).
  // Domingo=0 vem antes.
  const activeWorkouts = useMemo(() => {
    const list = data.workouts.filter(w => !w.inactive);
    return [...list].sort((a, b) => {
      const da = (a.weekdays && a.weekdays.length) ? Math.min(...a.weekdays) : 99;
      const db = (b.weekdays && b.weekdays.length) ? Math.min(...b.weekdays) : 99;
      if (da !== db) return da - db;
      return (a.name||'').localeCompare(b.name||'', 'pt-BR');
    });
  }, [data.workouts]);
  const inactiveWorkouts = data.workouts.filter(w => w.inactive);

  // Total agregado de séries por grupo muscular somando todos os ativos.
  // Total agregado SEMANAL: cada treino é contado tantas vezes quantos dias da semana
  // ele estiver atribuído. Treino sem dia atribuído conta apenas 1 vez (interpretado
  // como executado uma vez na semana). É só nesta agregação — o card individual
  // mostra o total normal por treino.
  const aggregatedMuscleSets = useMemo(() => {
    const m = {};
    activeWorkouts.forEach(w => {
      const multiplier = (w.weekdays && w.weekdays.length) ? w.weekdays.length : 1;
      w.exercises.forEach(we => {
        const ex = data.exercises.find(e=>e.id===we.exerciseId);
        const muscle = (ex && ex.muscle) || 'Sem grupo';
        // Conta apenas séries de trabalho (não-aquecimento) na agregação semanal.
        const refs = we.setRefs || [];
        const sets = refs.length ? refs.filter(r => !r.warmup).length : (we.targetSets || 0);
        m[muscle] = (m[muscle] || 0) + (sets * multiplier);
      });
    });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  }, [activeWorkouts, data.exercises]);

  const renderCard = (w, opts={}) => {
    const compact = !!opts.compact;
    const lastSession = data.sessions.filter(s=>s.templateId===w.id).sort((a,b)=>b.date-a.date)[0];
    const muscleSetCounts = {};
    w.exercises.forEach(we => {
      const ex = data.exercises.find(e=>e.id===we.exerciseId);
      const m = (ex && ex.muscle) || 'Sem grupo';
      // Card individual também ignora aquecimentos no total
      const refs = we.setRefs || [];
      const sets = refs.length ? refs.filter(r => !r.warmup).length : (we.targetSets || 0);
      muscleSetCounts[m] = (muscleSetCounts[m] || 0) + sets;
    });
    const muscleEntries = Object.entries(muscleSetCounts).sort((a,b)=>b[1]-a[1]);
    const totalSets = muscleEntries.reduce((a,[,n])=>a+n,0);
    const wColor = w.color || WORKOUT_COLORS[0].value;
    const weekdayBadges = (w.weekdays && w.weekdays.length)
      ? [...w.weekdays].sort((a,b)=>a-b).map(d => WEEKDAY_LABELS[d]).join(' · ')
      : null;
    if (compact) {
      return (
        <button key={w.id} onClick={()=>onEdit(w)}
          className="w-full px-4 py-2 text-left border-b border-[#0d0d0d] hover:bg-[#0a0a0a] flex items-center gap-2"
          style={{ borderLeftWidth: '4px', borderLeftStyle: 'solid', borderLeftColor: wColor }}>
          <span className="font-mono text-xs flex-1 truncate" style={{ color: wColor, opacity: 0.8 }}>{w.name||'Sem nome'}</span>
          <span className="text-[9px] font-mono text-[#666]">inativo</span>
          <Edit3 size={12} className="text-[#444] flex-shrink-0" />
        </button>
      );
    }
    return (
      <div key={w.id} className="px-4 py-4 border-l-4" style={{ borderLeftColor: wColor }}>
        <div className="flex items-start justify-between gap-3 mb-3">
          <div className="flex-1 min-w-0">
            <h3 className="font-display text-2xl tracking-wider leading-none" style={{ color: wColor }}>{w.name||'Sem nome'}</h3>
            <div className="text-[10px] font-mono uppercase tracking-widest text-[#666] mt-1.5 flex flex-wrap gap-2">
              {weekdayBadges && <span style={{ color: wColor }}>{weekdayBadges}</span>}
              <span>{totalSets} séries</span>
              <span>{lastSession ? `Último: ${formatShort(lastSession.date)}` : 'Nunca executado'}</span>
            </div>
          </div>
          <button onClick={()=>{ vibrate(15); onEdit(w); }} className="p-2 text-[#888] hover:text-white"><Edit3 size={16} /></button>
        </div>
        {muscleEntries.length > 0 && (
          <div className="flex flex-wrap gap-1.5 mb-3">
            {muscleEntries.map(([m, count]) => (
              <Pill key={m} color={muscleColor(m)}>{m} · {count}</Pill>
            ))}
          </div>
        )}

const WorkoutEditor = ({ workout, data, setData, onClose }) => {
  const [w, setW] = useState({
    color: WORKOUT_COLORS[0].value,
    ...workout,
    exercises: (workout.exercises||[]).map(we => normalizeTemplateExercise(we, data.exercises.find(e=>e.id===we.exerciseId)))
  });
  const [pickingEx, setPickingEx] = useState(false);
  const [editingExIdx, setEditingExIdx] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(false);

  const save = () => {
    if (!w.name.trim()) return;
    setData(d => {
      const list = [...d.workouts];
      if (w.id) { const i = list.findIndex(x=>x.id===w.id); if (i>=0) list[i] = w; }
      else list.push({...w, id: uid()});
      return { ...d, workouts: list };
    });
    onClose();
  };
  const remove = () => { setData(d => ({...d, workouts: d.workouts.filter(x=>x.id!==w.id)})); onClose(); };

  const addExercise = (exerciseId) => {
    const ex = data.exercises.find(e=>e.id===exerciseId);
    if (!ex) return;
    const targetSets = 3;
    const setRefs = [];
    for (let i = 0; i < targetSets; i++) {
      if (ex.type === 'time') setRefs.push({ weight: '', reps: '', time: 30 });
      else setRefs.push({ weight: '', reps: 10, time: '' });
    }
    const newItem = {
      exerciseId,
      targetSets,
      targetRepsMin: ex.type === 'time' ? null : 8,
      targetRepsMax: ex.type === 'time' ? null : 12,
      setRefs,
      notes: ''

    setW(prev => ({...prev, exercises: [...prev.exercises, newItem]}));
    setPickingEx(false);
    setEditingExIdx(w.exercises.length);
  };
  const updateEx = (idx, patch) => setW(prev => ({...prev, exercises: prev.exercises.map((e,i)=>i===idx?{...e,...patch}:e)}));
  const removeEx = (idx) => { setW(prev => ({...prev, exercises: prev.exercises.filter((_,i)=>i!==idx)})); setEditingExIdx(null); };
  const moveEx = (idx, dir) => {
    setW(prev => {
      const arr = [...prev.exercises]; const ni = idx + dir;
      if (ni < 0 || ni >= arr.length) return prev;
      [arr[idx], arr[ni]] = [arr[ni], arr[idx]];
      return {...prev, exercises: arr};
    });

                    title={c.label}
                    className="transition-all relative flex-shrink-0"

                    {sel && <Check size={12} strokeWidth={3} className="text-black absolute" style={{top:'50%', left:'50%', transform:'translate(-50%,-50%)'}} />}
                  </button>

                        const days = prev.weekdays || [];

                      });

                    className="font-mono text-[10px] uppercase tracking-wider transition-colors flex items-center justify-center flex-shrink-0"
                    style={{

const WorkoutExerciseEditor = ({ item, exercise, onSave, onCancel, onRemove }) => {
  const [it, setIt] = useState(() => normalizeTemplateExercise(item, exercise));
  const isTime = exercise && exercise.type === 'time';

  // Adiciona uma série copiando a última (ou um default).
  const addSet = () => {
    const refs = [...(it.setRefs || [])];
    const last = refs[refs.length-1] || (isTime ? {weight:'', reps:'', time:30} : {weight:'', reps:10, time:''});
    refs.push({ ...last });
    setIt({ ...it, targetSets: refs.length, setRefs: refs });
    vibrate(15);
  };

  // Remove a última série. Mantém pelo menos 1.
  const removeSet = () => {
    const refs = [...(it.setRefs || [])];
    if (refs.length <= 1) return;
    refs.pop();
    setIt({ ...it, targetSets: refs.length, setRefs: refs });
    vibrate(15);
  };

  // Atualiza valor de uma série e propaga apenas para séries SUBSEQUENTES VAZIAS.
  // Cada série posterior é avaliada individualmente: se está vazia, recebe o novo valor;
  // se já tem qualquer valor (mesmo que igual ao anterior), é preservada.
  const updateRef = (i, field, newValue) => {
    setIt(prev => {
      const refs = prev.setRefs || [];
      const isEmpty = (v) => v === '' || v == null;
      const next = refs.map((r, j) => {
        if (j === i) return { ...r, [field]: newValue };
        if (j > i && isEmpty(r[field])) return { ...r, [field]: newValue };
        return r;
      });
      return { ...prev, setRefs: next };
    });
  };

  return (
    <Modal open={true} onClose={onCancel} title={(exercise && exercise.name)||'Configurar'}
      footer={<>
        <Btn variant="danger" onClick={onRemove} icon={Trash2} size="md" />
        <Btn variant="ghost" onClick={onCancel} full>Cancelar</Btn>
        <Btn variant="primary" onClick={()=>onSave(it)} full>OK</Btn>
      </>}>
      {!isTime && (
        <div className="grid grid-cols-2 gap-3">
          <Input label="Faixa reps mín" type="number" inputMode="numeric" value={it.targetRepsMin}
            onChange={v=>setIt({...it, targetRepsMin: v===''? '' : (parseInt(v)||0)})} />
          <Input label="Faixa reps máx" type="number" inputMode="numeric" value={it.targetRepsMax}
            onChange={v=>setIt({...it, targetRepsMax: v===''? '' : (parseInt(v)||0)})} />
        </div>
      )}

      {/* Tempo sugerido de intervalo entre séries (em segundos). */}
      <Input label="Intervalo entre séries (s)" type="number" inputMode="numeric" value={it.restSeconds == null ? '' : it.restSeconds}
        onChange={v=>setIt({...it, restSeconds: v==='' ? '' : Math.max(0, parseInt(v)||0)})}
        placeholder="Ex: 90" suffix="seg" />

      <div>
        <div className="text-[10px] font-mono uppercase tracking-widest text-[#666] mb-2">
          Séries de referência ({(it.setRefs||[]).length})
        </div>
        <p className="text-[10px] font-mono text-[#666] mb-3 leading-relaxed">
          Estes valores são pré-preenchidos no início do treino. Ao editar uma série, o valor é copiado apenas para as séries seguintes que ainda estiverem vazias. Toque no número da série para marcá-la como aquecimento.
        </p>
        <table className="set-table">
          <thead>
            <tr>
              <th className="col-num">#</th>
              {isTime ? (<><th>Carga</th><th>Tempo</th></>) : (<><th>Carga</th><th>Reps</th></>)}
            </tr>
          </thead>
          <tbody>
            {(() => {
              let validIdx = 0;
              return (it.setRefs||[]).map((r,i) => {
                const isAQ = !!r.warmup;
                const num = isAQ ? null : (++validIdx);
                const toggleWarmup = () => {
                  vibrate(15);
                  setIt(prev => ({
                    ...prev,
                    setRefs: prev.setRefs.map((rr, j) => j === i ? { ...rr, warmup: !rr.warmup } : rr)
                  }));
                };
                return (
                  <tr key={i} style={isAQ ? { background: 'rgba(245,158,11,0.05)' } : undefined}>
                    <td className="col-num">
                      <button type="button" onClick={toggleWarmup}
                        title={isAQ ? 'Aquecimento — clique para desmarcar' : 'Marcar como aquecimento'}
                        className="w-full font-mono cursor-pointer hover:text-white transition-colors"
                        style={isAQ ? { color: '#f59e0b', fontSize: 10, fontWeight: 600 } : { color: '#666', fontSize: 11 }}>
                        {isAQ ? 'AQ' : num}
                      </button>
                    </td>
                    {isTime ? (
                      <>
                        <td><NumStepper value={r.weight} onChange={v=>updateRef(i, 'weight', v)} step={0.5} /></td>
                        <td><NumStepper value={r.time} onChange={v=>updateRef(i, 'time', v)} step={1} /></td>
                      </>
                    ) : (
                      <>
                        <td><NumStepper value={r.weight} onChange={v=>updateRef(i, 'weight', v)} step={0.5} /></td>
                        <td><NumStepper value={r.reps} onChange={v=>updateRef(i, 'reps', v)} step={1} /></td>
                      </>
                    )}
                  </tr>
                );
              });
            })()}
          </tbody>
        </table>
        {/* Botões de adicionar/remover série ao final da tabela */}
        <div className="grid grid-cols-2 gap-2 mt-2">
          <button type="button" onClick={removeSet} disabled={(it.setRefs||[]).length <= 1}
            className="h-10 border border-[#1a1a1a] hover:border-[#333] text-[#888] disabled:opacity-30 disabled:cursor-not-allowed font-mono text-xs uppercase tracking-wider flex items-center justify-center gap-2">
            <span style={{fontSize: 16, fontWeight: 600}}>−</span> Remover série
          </button>
          <button type="button" onClick={addSet}
            className="h-10 border border-[#1a1a1a] hover:border-[#d4ff00] text-[#d4ff00] font-mono text-xs uppercase tracking-wider flex items-center justify-center gap-2">
            <span style={{fontSize: 16, fontWeight: 600}}>+</span> Adicionar série
          </button>
        </div>
      </div>

      <TextArea label="Observações deste exercício no treino" value={it.notes} onChange={v=>setIt({...it, notes:v})}
        placeholder="Ex: começar com aquecimento de 50%" rows={2} />
    </Modal>
  );
};

const buildInitialSets = (exDef, exTemplateItem, getLastRestForSet) => {
  const it = normalizeTemplateExercise(exTemplateItem, exDef);
  const refs = it.setRefs || [];
  // Pré-preenche o tempo de descanso na seguinte ordem de prioridade (TODAS as séries,
  // incluindo a primeira — o descanso da primeira pode representar o intervalo desde o
  // exercício anterior do treino):
  //   1. Descanso REAL da mesma série na última sessão (via getLastRestForSet)
  //   2. restSeconds definido no template do exercício
  //   3. vazio se nada disponível
  const defaultRest = it.restSeconds && it.restSeconds > 0 ? it.restSeconds : '';
  return refs.map((r, i) => {
    let rest = '';
    const fromHistory = getLastRestForSet ? getLastRestForSet(i) : null;
    if (fromHistory != null && fromHistory !== '') rest = fromHistory;
    else rest = defaultRest;
    return {
      completed: false,
      warmup: !!r.warmup,
      rest,
      weight: r.weight == null ? '' : r.weight,
      reps: r.reps == null ? '' : r.reps,
      time: r.time == null ? '' : r.time,
    };
  });
};

/* ACTIVE WORKOUT */
const ActiveWorkout = ({ active, setActive, data, setData, onFinish, onPause }) => {
  const [showSummary, setShowSummary] = useState(false);
  const [confirmExit, setConfirmExit] = useState(false);
  const [confirmPause, setConfirmPause] = useState(false);
  const [confirmIncomplete, setConfirmIncomplete] = useState(false);
  const [addingEx, setAddingEx] = useState(false);
  const [substitutingIdx, setSubstitutingIdx] = useState(null);
  const [confirmRemoveIdx, setConfirmRemoveIdx] = useState(null);
  const [historyExId, setHistoryExId] = useState(null);
  const [collapsed, setCollapsed] = useState(() => loadLS(COLLAPSED_KEY, {}));

  // Configurações persistentes do timer (toggles em Config).
  const [timerPrefs, setTimerPrefs] = useState(() => loadTimerPrefs());
  // Estado do timer ativo: null quando não há timer, ou
  // { startedAt, targetSeconds, exerciseId, lastSetIdx, notified }
  // Ao recarregar, descartamos timers muito antigos (> 1h) — provavelmente o usuário
  // saiu/fechou e voltou bem depois, não faz sentido retomar contagem.
  const [timer, setTimerState] = useState(() => {
    const saved = loadTimerState();
    if (!saved) return null;
    const ageMs = Date.now() - (saved.startedAt || 0);
    if (ageMs > 60 * 60 * 1000) {
      // Limpa o storage também
      saveTimerState(null);
      return null;
    }
    // Se o timer já terminou enquanto a página estava fora, marca como notified
    // pra não disparar feedback "atrasado" (já passou o momento)
    if (saved.targetSeconds && ageMs / 1000 >= saved.targetSeconds) {
      return { ...saved, notified: true };
    }
    return saved;
  });
  // Re-render forçado a cada segundo enquanto timer está ativo (pra atualizar contador).
  const [, setTick] = useState(0);

  const setTimer = useCallback((next) => {
    setTimerState(next);
    saveTimerState(next);
  }, []);

  // Salva o estado de collapse por exercício/sessão
  useEffect(() => { saveLS(COLLAPSED_KEY, collapsed); }, [collapsed]);

  // Ao iniciar uma nova sessão (id ainda sem entradas no collapsed), colapsa tudo exceto o primeiro.
  useEffect(() => {
    if (!active) return;
    const firstKey = `${active.id}-0`;
    // Se ainda não há nenhuma entrada para essa sessão, é um treino "fresco"
    const hasAnyEntry = active.exercises.some((_, idx) => `${active.id}-${idx}` in collapsed);
    if (!hasAnyEntry) {
      setCollapsed(prev => {
        const next = { ...prev };
        active.exercises.forEach((_, idx) => {
          next[`${active.id}-${idx}`] = idx !== 0; // colapsa todos menos o primeiro
        });
        return next;
      });
    }
  }, [active && active.id]);

  useEffect(() => {
    const t = setInterval(() => setActive(prev => prev ? {...prev, elapsed: Date.now() - prev.startedAt} : prev), 1000);
    return () => clearInterval(t);
  }, [setActive]);

  /* TIMER: tick a cada segundo enquanto há timer ativo (pra atualizar contador na tela)
     e detecta o momento em que cruza targetSeconds pra disparar beep+vibração+notificação.
     Rodamos um setInterval só quando timer está ativo (eficiente). */
  useEffect(() => {
    if (!timer) return;
    const tick = () => {
      setTick(t => t + 1);
      // Cruzou o tempo alvo? Dispara feedback uma única vez.
      if (timer.targetSeconds && !timer.notified) {
        const elapsed = Math.floor((Date.now() - timer.startedAt) / 1000);
        if (elapsed >= timer.targetSeconds) {
          // Marca como notificado pra evitar repetição
          setTimer({ ...timer, notified: true });
          // Vibração forte
          if (timerPrefs.vibration) vibrate(400);
          // Beep
          if (timerPrefs.sound) playBeep();
          // Notificação OS (tap volta foco pra app, que reage via flag pendente)
          showLocalNotification('Descanso completo', {
            body: 'Toque para iniciar a próxima série',
            tag: 'rest-timer',
          });
        }
      }
    };
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [timer && timer.startedAt, timer && timer.targetSeconds, timer && timer.notified, timerPrefs.sound, timerPrefs.vibration]);

  /* Keep-alive e Wake Lock: ativados quando treino inicia E timer está habilitado E
     o usuário ligou "manter ativo" nas configurações. Liberados ao pausar/finalizar. */
  useEffect(() => {
    if (!active) return;
    if (timerPrefs.keepAlive) {
      startKeepAlive();
      acquireWakeLock();
    }
    return () => {
      stopKeepAlive();
      releaseWakeLock();
    };
  }, [active && active.id, timerPrefs.keepAlive]);

  // Notificação de lembrete: dispara 2h após o início do treino, uma única vez por sessão.
  // Funciona com a aba aberta (mesmo em background). Permissão pedida na primeira vez.
  useEffect(() => {
    if (!active) return;
    if (typeof Notification === 'undefined') return;
    if (active.reminderSent) return;
    const REMINDER_MS = 2 * 60 * 60 * 1000; // 2 horas
    const elapsed = Date.now() - active.startedAt;
    const remaining = REMINDER_MS - elapsed;
    if (remaining <= 0) return;

    let cancelled = false;
    const requestAndSchedule = () => {
      const fire = () => {
        if (cancelled) return;
        showLocalNotification('Treino aberto há 2 horas', {
          body: 'Você ainda está no treino "' + (active.templateName || '') + '". Lembre-se de finalizá-lo se já acabou.',
          tag: 'treino-reminder-' + active.id,
          requireInteraction: false,
        });
        // marca na sessão pra não disparar de novo
        setActive(prev => prev ? { ...prev, reminderSent: true } : prev);
      };
      if (Notification.permission === 'granted') {
        const id = setTimeout(fire, remaining);
        return () => { cancelled = true; clearTimeout(id); };
      }
      // Não pedimos permissão automaticamente aqui — usuário pode habilitar em Config
      return () => { cancelled = true; };
    };
    const cleanup = requestAndSchedule();
    return cleanup;
  }, [active && active.id, active && active.reminderSent, setActive]);

  const updateExLog = (idx, patch) => setActive(prev => ({
    ...prev,
    exercises: prev.exercises.map((e,i)=>i===idx?{...e,...patch}:e)
  }));

  const updateSet = (idx, si, patch) => {
    setActive(prev => ({
      ...prev,
      exercises: prev.exercises.map((e,i) => {
        if (i !== idx) return e;
        const newSets = (e.sets||[]).map((s,j) => {
          if (j !== si) return s;
          const merged = { ...s, ...patch };
          const exDef = data.exercises.find(d=>d.id===e.exerciseId);
          if (exDef && exDef.type === 'weight') {
            merged.oneRM = calc1RM(merged.weight, merged.reps);
          }
          return merged;
        });
        return { ...e, sets: newSets };
      })
    }));
  };

  const toggleSetCompleted = (idx, si) => {
    const exLog = active.exercises[idx];
    const sets = exLog.sets || [];
    const set = sets[si];
    if (!set) return;
    const exDef = data.exercises.find(d=>d.id===exLog.exerciseId);

    // Helper que valida se uma série tem dados suficientes pra ser marcada como feita.
    const isValidForCompletion = (s) => {
      const w = parseFloat(s.weight);
      const r = parseInt(s.reps);
      const t = parseInt(s.time);
      if (exDef.type === 'time') return t > 0;
      // weight: aceita carga 0 (peso corporal), exige reps válida
      return !isNaN(r) && r > 0;
    };

    if (set.completed) {
      // Desmarca esta série E todas as séries SEGUINTES que estiverem marcadas.
      // Simétrico ao comportamento de marcar (que marca anteriores também).
      const newSets = sets.map((s, j) => {
        if (j < si) return s;
        if (!s.completed) return s;
        return { ...s, completed: false };
      });
      setActive(prev => ({
        ...prev,
        exercises: prev.exercises.map((e, i) => i === idx ? { ...e, sets: newSets } : e)
      }));
    } else {
      if (!isValidForCompletion(set)) return;
      // Marca esta série E todas as anteriores que ainda não foram marcadas e que tenham dados válidos.
      const newSets = sets.map((s, j) => {
        if (j > si) return s;
        if (s.completed) return s;
        if (!isValidForCompletion(s)) return s;
        const oneRM = exDef.type === 'weight' ? calc1RM(s.weight, s.reps) : 0;
        return { ...s, completed: true, oneRM, timestamp: Date.now() };
      });
      setActive(prev => ({
        ...prev,
        exercises: prev.exercises.map((e, i) => i === idx ? { ...e, sets: newSets } : e)
      }));
      vibrate(80);

      // === TIMER DE DESCANSO ===
      // Inicia automaticamente se: timer habilitado E o exercício tem restSeconds definido.
      // Tempo alvo vem do RESTSECONDS DO EXERCÍCIO, não do campo rest da série
      // (decisão consciente: o timer é uma sugestão fixa do plano).
      if (timerPrefs.enabled && exLog.restSeconds && exLog.restSeconds > 0) {
        setTimer({
          startedAt: Date.now(),
          targetSeconds: exLog.restSeconds,
          exerciseId: exLog.exerciseId,
          exerciseIdx: idx,
          lastSetIdx: si,
          notified: false,
        });
        // Pede permissão de notificação na primeira vez que o timer inicia
        if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
          try { Notification.requestPermission(); } catch(e){}
        }
      }
    }
  };

  /* Handler "Iniciar próxima série": chamado pelo botão na barra do timer
     OU quando o usuário toca na notificação do fim do descanso.
     Encontra a próxima série pendente (do exercício atual ou do próximo) e
     preenche o campo rest dela com o tempo realmente decorrido desde o fim
     da série anterior. Depois encerra o timer. */
  const handleStartSet = useCallback(() => {
    if (!timer) return;
    unlockAudio(); // desbloqueia áudio em iOS no primeiro clique
    vibrate(20);
    const elapsed = Math.floor((Date.now() - timer.startedAt) / 1000);

    setActive(prev => {
      if (!prev) return prev;
      // Procura a próxima série pendente (não-completed) começando do exercício atual
      // a partir da série após a que iniciou o timer. Se não achar, vai pro próximo.
      let foundExIdx = -1, foundSetIdx = -1;
      const startExIdx = timer.exerciseIdx != null ? timer.exerciseIdx : 0;
      const startSetIdx = timer.lastSetIdx != null ? timer.lastSetIdx + 1 : 0;
      outer: for (let ei = startExIdx; ei < prev.exercises.length; ei++) {
        const ex = prev.exercises[ei];
        const fromSi = ei === startExIdx ? startSetIdx : 0;
        for (let si = fromSi; si < (ex.sets || []).length; si++) {
          if (!ex.sets[si].completed) {
            foundExIdx = ei; foundSetIdx = si; break outer;
          }
        }
      }
      if (foundExIdx < 0) return prev;
      const newExs = prev.exercises.map((ex, ei) => {
        if (ei !== foundExIdx) return ex;
        const newSets = ex.sets.map((s, si) => {
          if (si !== foundSetIdx) return s;
          return { ...s, rest: elapsed };
        });
        return { ...ex, sets: newSets };
      });
      return { ...prev, exercises: newExs };
    });

    setTimer(null);
  }, [timer, setActive, setTimer]);

  /* Detecta tap na notificação ao voltar foco pra aba.
     A notificação seta uma flag global; ao receber 'focus' a janela, chamamos
     handleStartSet. Isso é necessário porque o handler dentro do Notification.onclick
     captura uma versão obsoleta de handleStartSet (closure stale). */
  useEffect(() => {
    const onFocus = () => {
      if (window.__pendingStartSetFromNotification) {
        window.__pendingStartSetFromNotification = false;
        handleStartSet();
      }
    };
    window.addEventListener('focus', onFocus);
    return () => window.removeEventListener('focus', onFocus);
  }, [handleStartSet]);

  /* Função pra dispensar manualmente o timer sem registrar tempo (caso o usuário
     queira simplesmente cancelar). Usado no botão de fechar. */
  const dismissTimer = () => { vibrate(15); setTimer(null); };

  const addSetRow = (idx) => {
    const exLog = active.exercises[idx];
    const sets = exLog.sets || [];
    const last = sets[sets.length-1];
    const newSet = last
      ? { ...last, completed: false, oneRM: undefined, timestamp: undefined }
      : { completed: false, weight:'', reps:'', time:'' };
    updateExLog(idx, { sets: [...sets, newSet] });
  };

  const removeSetRow = (idx, si) => {
    const exLog = active.exercises[idx];
    updateExLog(idx, { sets: (exLog.sets||[]).filter((_,i)=>i!==si) });
  };

  const addExerciseToActive = (exerciseId) => {
    const ex = data.exercises.find(e=>e.id===exerciseId);
    if (!ex) return;
    const targetSets = 3;
    const setRefs = [];
    for (let i = 0; i < targetSets; i++) {
      if (ex.type === 'time') setRefs.push({ weight:'', reps:'', time: 30 });
      else setRefs.push({ weight:'', reps: 10, time: '' });
    }
    const tplItem = {
      exerciseId, targetSets,
      targetRepsMin: ex.type === 'time' ? null : 8,
      targetRepsMax: ex.type === 'time' ? null : 12,
      setRefs,
    };
    const newItem = { ...tplItem, notes:'', sessionNote:'', sets: buildInitialSets(ex, tplItem) };
    setActive(prev => ({ ...prev, exercises: [...prev.exercises, newItem] }));
    setAddingEx(false);
  };

  const substituteExercise = (newExerciseId) => {
    const newDef = data.exercises.find(e=>e.id===newExerciseId);
    if (!newDef) return;
    const idx = substitutingIdx;
    setActive(prev => {
      const old = prev.exercises[idx];
      const targetSets = old.targetSets || 3;
      const setRefs = [];
      for (let i = 0; i < targetSets; i++) {
        if (newDef.type === 'time') setRefs.push({ weight:'', reps:'', time: 30 });
        else setRefs.push({ weight:'', reps: 10, time: '' });
      }
      const tplItem = {
        exerciseId: newExerciseId, targetSets,
        targetRepsMin: newDef.type === 'time' ? null : (old.targetRepsMin || 8),
        targetRepsMax: newDef.type === 'time' ? null : (old.targetRepsMax || 12),
        setRefs,
      };
      const replaced = { ...tplItem, notes: old.notes||'', sessionNote: old.sessionNote||'', sets: buildInitialSets(newDef, tplItem) };
      return { ...prev, exercises: prev.exercises.map((e,i)=>i===idx?replaced:e) };
    });
    setSubstitutingIdx(null);
  };

  const removeExercise = (idx) => {
    setActive(prev => ({ ...prev, exercises: prev.exercises.filter((_,i)=>i!==idx) }));
    setConfirmRemoveIdx(null);
  };

  const moveExercise = (idx, dir) => {
    setActive(prev => {
      const arr = [...prev.exercises];
      const ni = idx + dir;
      if (ni < 0 || ni >= arr.length) return prev;
      [arr[idx], arr[ni]] = [arr[ni], arr[idx]];
      return { ...prev, exercises: arr };
    });
    // Também precisa mover o estado de "collapsed" pra acompanhar
    setCollapsed(prev => {
      const ni = idx + dir;
      const k1 = `${active.id}-${idx}`;
      const k2 = `${active.id}-${ni}`;
      const next = { ...prev };
      const v1 = next[k1], v2 = next[k2];
      next[k1] = v2 || false;
      next[k2] = v1 || false;
      return next;
    });
  };

  const finish = (refUpdates, extras) => {
    const session = {
      ...active,
      finishedAt: Date.now(),
      duration: Date.now() - active.startedAt,
      disposition: extras && extras.disposition != null ? extras.disposition : null,
      intensity: extras && extras.intensity != null ? extras.intensity : null,
    };
    const applyStructural = !!(extras && extras.applyStructural);
    setData(d => {
      let workouts = d.workouts;
      if (session.templateId && (applyStructural || (refUpdates && Object.keys(refUpdates).length))) {
        workouts = d.workouts.map(w => {
          if (w.id !== session.templateId) return w;
          let updatedExs;
          if (applyStructural) {
            // Reconstrói os exercícios do template baseado na ordem/composição atual da sessão.
            // Para cada exercício atual, tenta reaproveitar item do template se já existir;
            // senão cria novo a partir das séries feitas (ou setRefs default).
            updatedExs = active.exercises.map(actEx => {
              const def = data.exercises.find(d=>d.id===actEx.exerciseId);
              const existing = w.exercises.find(we => we.exerciseId === actEx.exerciseId);
              const completed = (actEx.sets||[]).filter(s=>s.completed);
              // Se foi marcado pra atualizar refs, usa as séries feitas como nova ref.
              const refUpd = refUpdates && refUpdates[actEx.exerciseId];
              let setRefs;
              if (refUpd && refUpd.setRefs) {
                setRefs = refUpd.setRefs;
              } else if (existing && existing.setRefs) {
                setRefs = existing.setRefs;
              } else {
                // exercício novo no template — usa séries feitas, ou um default
                if (completed.length) {
                  setRefs = completed.map(s => def && def.type === 'time'
                    ? { weight: Number(s.weight)||'', reps: '', time: Number(s.time)||0 }
                    : { weight: Number(s.weight)||0, reps: Number(s.reps)||0, time: '' });
                } else {
                  const ts = actEx.targetSets || 3;
                  setRefs = [];
                  for (let i = 0; i < ts; i++) setRefs.push(def && def.type === 'time' ? {weight:'',reps:'',time:30} : {weight:'',reps:10,time:''});
                }
              }
              return {
                exerciseId: actEx.exerciseId,
                targetSets: setRefs.length,
                targetRepsMin: actEx.targetRepsMin || (existing && existing.targetRepsMin) || null,
                targetRepsMax: actEx.targetRepsMax || (existing && existing.targetRepsMax) || null,
                setRefs,
                notes: actEx.notes || (existing && existing.notes) || ''
              };
            });
          } else {
            // Apenas atualiza setRefs dos exercícios existentes
            updatedExs = w.exercises.map(we => {
              const upd = refUpdates && refUpdates[we.exerciseId];
              if (!upd) return we;
              const next = { ...we };
              if (upd.setRefs) next.setRefs = upd.setRefs;
              if (upd.targetRepsMin != null) next.targetRepsMin = upd.targetRepsMin;
              if (upd.targetRepsMax != null) next.targetRepsMax = upd.targetRepsMax;
              return next;
            });
          }
          return { ...w, exercises: updatedExs };
        });
      }
      return { ...d, sessions: [session, ...d.sessions], workouts };
    });
    // Limpa o timer de descanso ao finalizar
    setTimer(null);
    setActive(null);
    onFinish(session);
  };

  // Progresso geral: total de séries concluídas / total de séries existentes (todos exercícios).
  // Reage automaticamente a add/remove de séries e exercícios via active.exercises.
  // Progresso geral conta apenas séries de TRABALHO (não-aquecimento).
  // Aquecimentos não entram no contador X/Y nem na barra de progresso —
  // o objetivo é a conclusão das séries de trabalho do treino.
  const progress = useMemo(() => {
    let total = 0, done = 0;
    active.exercises.forEach(e => {
      const sets = (e.sets || []).filter(s => !s.warmup);
      total += sets.length;
      done += sets.filter(s=>s.completed).length;
    });
    return { total, done, pct: total > 0 ? (done / total) : 0 };
  }, [active.exercises]);

  const hasIncomplete = progress.total > 0 && progress.done < progress.total;

  const tryFinish = () => {
    if (hasIncomplete) {
      setConfirmIncomplete(true);
    } else {
      setShowSummary(true);
    }
  };

  const totalEx = active.exercises.length;
  const doneCount = active.exercises.filter(e=>(e.sets||[]).every(s=>s.completed) && (e.sets||[]).length > 0).length;
  const elapsed = Math.floor((active.elapsed||0)/1000);

  const toggleCollapse = (key) => setCollapsed(prev => ({ ...prev, [key]: !prev[key] }));

  return (
    <div className="fixed inset-0 z-40 bg-black flex flex-col">
      <div className="border-b border-[#1a1a1a] sticky top-0 bg-black z-30">
        <div className="px-4 py-3 flex items-center justify-between gap-2">
          <button onClick={()=>{ vibrate(15); setConfirmExit(true); }} className="text-[#888] p-1 -ml-1" title="Sair (descarta)"><X size={20} /></button>
          <div className="text-center flex-1 min-w-0">
            <div className="font-display text-lg tracking-wider leading-none truncate">{active.templateName}</div>
            <div className="text-[10px] font-mono text-[#666] tracking-widest mt-0.5">{formatTime(elapsed)} · {progress.done}/{progress.total} séries</div>
          </div>
          {onPause && (
            <button onClick={()=>{ vibrate(15); setConfirmPause(true); }} className="text-[#888] p-1" title="Pausar treino"><Pause size={20} /></button>
          )}
          <button onClick={tryFinish} className="text-[#d4ff00] p-1" title="Finalizar"><Check size={22} /></button>
        </div>
        {/* TIMER DE DESCANSO — aparece entre header e barra de progresso quando ativo */}
        {timer && (() => {
          const elapsedSec = Math.floor((Date.now() - timer.startedAt) / 1000);
          const target = timer.targetSeconds || 0;
          const overTarget = target > 0 && elapsedSec >= target;
          const pct = target > 0 ? Math.min(elapsedSec / target, 1) : 0;
          const accent = overTarget ? '#84cc16' : '#d4ff00'; // verde quando passa do alvo
          const fmt = (s) => {
            const m = Math.floor(s / 60);
            const ss = s % 60;
            return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
          };
          return (
            <div className="border-t border-[#1a1a1a] relative" style={{ background: '#050505' }}>
              {/* Barra de fundo preenchendo */}
              <div className="absolute top-0 left-0 h-full transition-all duration-500"
                style={{ width: `${pct * 100}%`, background: overTarget ? 'rgba(132,204,22,0.12)' : 'rgba(212,255,0,0.08)' }} />
              <div className="relative flex items-center px-3 py-2 gap-3">
                <div className="flex-1 min-w-0">
                  <div className="text-[9px] font-mono uppercase tracking-widest mb-0.5"
                    style={{ color: overTarget ? accent : '#888' }}>
                    {overTarget ? 'Descanso completo' : 'Descansando'}
                  </div>
                  <div className="font-display text-lg leading-none tracking-wider" style={{ color: accent }}>
                    {fmt(elapsedSec)}{target > 0 ? <span className="text-[#666] text-sm ml-1">/ {fmt(target)}</span> : null}
                  </div>
                </div>
                <button onClick={handleStartSet}
                  className="flex-shrink-0 px-4 py-2.5 font-mono text-xs uppercase tracking-wider transition-colors"
                  style={{
                    background: accent,
                    color: '#000',
                    fontWeight: 600,
                  }}>
                  ▶ Iniciar série
                </button>
                <button onClick={dismissTimer}
                  title="Fechar timer (sem registrar tempo)"
                  className="flex-shrink-0 text-[#666] hover:text-white p-2">
                  <X size={16} />
                </button>
              </div>
            </div>
          );
        })()}
        {/* Barra de progresso. Largura proporcional ao avanço total. */}
        <div className="h-1 bg-[#0a0a0a] relative overflow-hidden">
          <div className="absolute top-0 left-0 h-full bg-[#d4ff00] transition-all duration-300" style={{ width: `${progress.pct * 100}%` }} />
        </div>
      </div>

      {active.notes && (
        <div className="border-b border-[#1a1a1a] px-4 py-3 bg-[#0a0a0a]" style={{ borderLeft: '3px solid #d4ff00' }}>
          <div className="text-[9px] font-mono uppercase tracking-widest text-[#d4ff00] mb-1.5">Orientações gerais</div>
          <p className="text-[12px] font-mono text-white leading-relaxed whitespace-pre-wrap">{active.notes}</p>
        </div>
      )}

      <div className="flex-1 overflow-y-auto pb-8">
        {active.exercises.map((exLog, idx) => {
          const exDef = data.exercises.find(e=>e.id===exLog.exerciseId);
          const key = `${active.id}-${idx}`;
          return (
            <ExerciseBlock
              key={key}
              idx={idx}
              total={active.exercises.length}
              exLog={exLog}
              exDef={exDef}
              isCollapsed={!!collapsed[key]}
              onToggleCollapse={()=>toggleCollapse(key)}
              onUpdateSet={(si, patch)=>updateSet(idx, si, patch)}
              onToggleSet={(si)=>toggleSetCompleted(idx, si)}
              onAddSet={()=>addSetRow(idx)}
              onRemoveSet={(si)=>removeSetRow(idx, si)}
              onUpdateLog={(patch)=>updateExLog(idx, patch)}
              onSubstitute={()=>setSubstitutingIdx(idx)}
              onRemove={()=>setConfirmRemoveIdx(idx)}
              onShowHistory={()=>setHistoryExId(exLog.exerciseId)}
              onMoveUp={()=>moveExercise(idx, -1)}
              onMoveDown={()=>moveExercise(idx, 1)}
            />
          );
        })}

        <div className="p-4 flex gap-2 safe-bottom">
          <Btn variant="ghost" full icon={Plus} onClick={()=>setAddingEx(true)}>Adicionar exercício</Btn>
        </div>
      </div>

      {showSummary && <SummaryModal active={active} data={data} onConfirm={finish} onCancel={()=>setShowSummary(false)} onUpdateActive={setActive} />}

      {addingEx && <ExercisePicker exercises={data.exercises} title="Adicionar exercício" onPick={addExerciseToActive} onClose={()=>setAddingEx(false)} />}
      {substitutingIdx !== null && <ExercisePicker exercises={data.exercises} title="Substituir por..." onPick={substituteExercise} onClose={()=>setSubstitutingIdx(null)} />}
      {historyExId && <ExerciseHistoryModal exerciseId={historyExId} data={data} onClose={()=>setHistoryExId(null)} />}

      <Confirm open={confirmRemoveIdx !== null} title="Remover exercício?"
        message="O exercício será removido deste treino. As séries já registradas nele serão perdidas."
        onConfirm={()=>removeExercise(confirmRemoveIdx)} onCancel={()=>setConfirmRemoveIdx(null)} danger />

      <Confirm open={confirmIncomplete} title="Finalizar com séries pendentes?"
        message="Existem séries não marcadas como concluídas. Você quer finalizar o treino mesmo assim? As séries não marcadas não serão registradas."
        onConfirm={()=>{ setConfirmIncomplete(false); setShowSummary(true); }}
        onCancel={()=>setConfirmIncomplete(false)}
        confirmLabel="Finalizar mesmo assim" />

      <Confirm open={confirmExit} title="Sair do treino?"
        message="O treino em andamento será descartado e não vai pro histórico."
        onConfirm={()=>{setTimer(null); setActive(null); onFinish(null);}} onCancel={()=>setConfirmExit(false)} danger />

      <Confirm open={confirmPause} title="Pausar treino?"
        message="O treino será pausado e ficará disponível para retomar na tela de Treinos. Nenhum dado será perdido."
        onConfirm={()=>{ setConfirmPause(false); onPause && onPause(); }}
        onCancel={()=>setConfirmPause(false)}
        confirmLabel="Pausar" />
    </div>
  );
};

const ExerciseBlock = ({ idx, total, exLog, exDef, isCollapsed, onToggleCollapse, onUpdateSet, onToggleSet, onAddSet, onRemoveSet, onUpdateLog, onSubstitute, onRemove, onShowHistory, onMoveUp, onMoveDown }) => {
  const [showActions, setShowActions] = useState(false);
  // Anotação rápida: começa fechada se vazia, abre ao clicar e foca; fecha no blur se vazia.
  const [noteOpen, setNoteOpen] = useState(false);
  const noteRef = useRef(null);

  if (!exDef) {
    return (
      <div className="border-b border-[#1a1a1a] p-4">
        <div className="flex items-center justify-between">
          <div className="text-sm font-mono text-[#ff4757]">? Exercício removido do cadastro</div>
          <button onClick={onRemove} className="text-[#ff4757] p-1"><Trash2 size={14} /></button>
        </div>
      </div>
    );
  }

  const sets = exLog.sets || [];
  const setsDone = sets.filter(s=>s.completed).length;
  const target = sets.length;
  const isDone = target > 0 && setsDone >= target;
  const c = muscleColor(exDef.muscle);
  const isTime = exDef.type === 'time';
  const repsRange = (exLog.targetRepsMin && exLog.targetRepsMax) ? `${exLog.targetRepsMin}-${exLog.targetRepsMax}` : null;
  const DONE_GREEN = '#84cc16';
  const titleColor = isDone ? DONE_GREEN : '#fff';

  // Quando exercício está concluído, fundo levemente verde; senão, fundo neutro (sem cor do grupo).
  // A cor do grupo aparece apenas na borda lateral e no label do grupo.
  const headerBg = isDone ? withAlpha(DONE_GREEN, 0.06) : 'transparent';

  const openNote = () => {
    setNoteOpen(true);
    setTimeout(() => { if (noteRef.current) noteRef.current.focus(); }, 0);
  };
  const handleNoteBlur = () => {
    if (!exLog.sessionNote || exLog.sessionNote.trim() === '') {
      setNoteOpen(false);
    }
  };

  return (
    <div className="border-b border-[#1a1a1a]">
      <div className="px-4 py-3 border-l-4"
        style={{ borderLeftColor: isDone ? DONE_GREEN : c, background: headerBg }}>
        <div className="flex items-start gap-2">
          <button onClick={onToggleCollapse} className="text-[#888] hover:text-white p-1 flex-shrink-0 mt-0.5">
            {isCollapsed ? <ChevronDown size={18} /> : <ChevronUp size={18} />}
          </button>
          <div className="flex-1 min-w-0" onClick={onToggleCollapse} style={{cursor:'pointer'}}>
            <div className="text-[10px] font-mono uppercase tracking-widest mb-0.5 flex items-center gap-1.5" style={{ color: c }}>
              <span>{idx+1}.</span>
              <span>{exDef.muscle||'—'}</span>
            </div>
            <h2 className="font-display text-xl tracking-wider leading-tight break-words" style={{ color: titleColor }}>
              {exDef.name}
            </h2>
            {/* Sumário das séries: aparece SÓ quando colapsado (quando expandido a tabela já mostra tudo) */}
            {isCollapsed && sets.length > 0 && (
              <div className="text-[11px] font-mono mt-1.5 leading-relaxed">
                {sets.map((s, si) => {
                  const txt = isTime
                    ? `${s.weight===''||s.weight==null||Number(s.weight)===0?'':s.weight+'kg·'}${s.time===''||s.time==null?'?':s.time}s`
                    : (Number(s.weight)>0
                        ? `${s.weight}×${s.reps===''||s.reps==null?'?':s.reps}`
                        : `pc×${s.reps===''||s.reps==null?'?':s.reps}`);
                  // Aquecimento tem cor laranja-âmbar, completas verdes, demais cinza
                  const color = s.completed ? DONE_GREEN : (s.warmup ? '#f59e0b' : '#666');
                  return (
                    <span key={si} style={{ color, marginRight: 8 }}>
                      {s.warmup && <span style={{ fontSize: 9, marginRight: 2 }}>AQ</span>}

              </div>

          </div>
          <button onClick={()=>{ vibrate(15); setShowActions(true); }} className="text-[#888] hover:text-white p-1 flex-shrink-0">
            <Settings size={16} />
          </button>
        </div>
      </div>

      {!isCollapsed && (
        <>
          {/* Observações fixas: agora sempre visíveis em texto completo, sem modal */}
          {(exDef.notes || exLog.notes) && (
            <div className="w-full px-4 py-2 bg-[#050505] border-b border-[#0d0d0d]">
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666] mb-0.5">Observações</div>
              <p className="text-[11px] font-mono text-[#888] leading-relaxed whitespace-pre-wrap">{exDef.notes || exLog.notes}</p>
              {exLog.restSeconds > 0 && (
                <div className="text-[10px] font-mono text-[#888] mt-1">Descanso sugerido: <span className="text-[#d4ff00]">{exLog.restSeconds}s</span></div>
              )}
            </div>
          )}
          {/* Mostra descanso sugerido mesmo sem observações */}
          {(!exDef.notes && !exLog.notes && exLog.restSeconds > 0) && (
            <div className="w-full px-4 py-2 bg-[#050505] border-b border-[#0d0d0d]">
              <div className="text-[10px] font-mono text-[#888]">Descanso sugerido: <span className="text-[#d4ff00]">{exLog.restSeconds}s</span></div>
            </div>
          )}

          {/* Nota de execução ACIMA das séries */}
          <div className="px-4 py-3 border-b border-[#0d0d0d]">
            <div className="text-[9px] font-mono uppercase tracking-widest mb-2 text-center"
              style={{ color: exLog.execScore ? EXEC_COLORS[exLog.execScore] : '#666' }}>
              Execução {exLog.execScore ? <span className="ml-1">· {EXEC_LABELS[exLog.execScore]}</span> : null}
            </div>
            <div className="grid grid-cols-5 gap-1.5">
              {[1,2,3,4,5].map(n => {
                const sel = exLog.execScore === n;

                      ? { borderColor: col, color: col, background: col + '1a' }

                ref={noteRef}

                placeholder="Ex: 'última série caiu', 'ombro incomodando'..."

                className="w-full bg-black border border-[#1a1a1a] focus:border-[#d4ff00] outline-none px-3 py-2 text-white font-mono text-xs placeholder:text-[#444] resize-none transition-colors" />

            <thead>
              <tr>

                <th>Desc</th>

                    <th>Carga</th>
                    <th>Tempo</th>
                  </>

                  <>
                    <th>Carga</th>
                    <th>Reps{repsRange && <span className="ml-1 text-[#888] normal-case tracking-normal">({repsRange})</span>}</th>
                    <th>1RM</th>
                  </>
                )}
                <th className="col-check">Feita</th>
              </tr>
            </thead>
            <tbody>
              {(() => {
                // Numeração: aquecimentos não consomem número; séries válidas começam em 1.
                let validCount = 0;
                return sets.map((s, si) => {
                  let displayNum;
                  if (s.warmup) {
                    displayNum = null; // mostra "AQ"
                  } else {
                    validCount += 1;
                    displayNum = validCount;
                  }
                  return (
                    <SetRow key={si} si={si} displayNum={displayNum} set={s} exDef={exDef}

              <Plus size={12} /> Adicionar série extra

      <Modal open={showActions} onClose={()=>setShowActions(false)} title={exDef.name}
        footer={<Btn variant="ghost" onClick={()=>setShowActions(false)} full>Fechar</Btn>}>
        {/* Reordenar */}
        <div className="grid grid-cols-2 gap-2">
          <button onClick={()=>{ vibrate(15); if (onMoveUp) onMoveUp(); setShowActions(false); }} disabled={idx===0}
            className="px-3 py-3 border border-[#1a1a1a] hover:border-[#333] disabled:opacity-30 disabled:cursor-not-allowed text-left flex items-center gap-2">
            <ArrowUp size={16} className="text-[#d4ff00]" />

          </button>
          <button onClick={()=>{ vibrate(15); if (onMoveDown) onMoveDown(); setShowActions(false); }} disabled={idx===total-1}
            className="px-3 py-3 border border-[#1a1a1a] hover:border-[#333] disabled:opacity-30 disabled:cursor-not-allowed text-left flex items-center gap-2">
            <ArrowDown size={16} className="text-[#d4ff00]" />
            <span className="font-mono text-sm text-white">Mover ↓</span>
          </button>
        </div>
        {/* Anotação rápida (abre a caixa inline na tela do treino) */}
