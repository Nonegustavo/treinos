const calc1RM = (weight, reps) => {
  const w = Number(weight) || 0;
  const r = Number(reps) || 0;
  if (w <= 0 || r < 1) return 0;
  if (r === 1) return Math.round(w*10)/10;
  return Math.round(w * (1 + r/30) * 10) / 10;
};

  return `${m}:${String(r).padStart(2,'0')}`;
};

/* hex + alpha helper */
const withAlpha = (hex, alpha) => {
  if (!hex || typeof hex !== 'string') return '#0000';
  const h = hex.replace('#','');
  if (h.length !== 6) return hex;
  const r = parseInt(h.slice(0,2),16);
  const g = parseInt(h.slice(2,4),16);
  const b = parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
};

const normalizeTemplateExercise = (we, exDef) => {
  const targetSets = Math.max(1, we.targetSets || 3);
  if (Array.isArray(we.setRefs) && we.setRefs.length) {
    if (we.setRefs.length === targetSets) return we;
    const adjusted = [];
    for (let i = 0; i < targetSets; i++) {
      adjusted.push(we.setRefs[i] || we.setRefs[we.setRefs.length-1] || { weight: '', reps: '', time: '' });
    }
    return { ...we, setRefs: adjusted };
  }
  const baseW = we.lastWeight != null ? we.lastWeight : '';
  const baseReps = we.targetRepsMax || we.targetRepsMin || '';
  const baseTime = we.targetTime || '';
  const isTime = exDef && exDef.type === 'time';
  const setRefs = [];
  for (let i = 0; i < targetSets; i++) {
    if (isTime) setRefs.push({ weight: baseW, reps: '', time: baseTime });
    else setRefs.push({ weight: baseW, reps: baseReps, time: '' });
  }
  return { ...we, setRefs };
};

const formatSyncTime = (ts) => {
  if (!ts) return null;
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return `Hoje às ${d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
  const diff = Math.floor((now - d) / (1000*60*60*24));
  if (diff === 1) return `Ontem às ${d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
  if (diff < 7) return `${diff} dias atrás · ${d.toLocaleDateString('pt-BR')}`;
  return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
};

const driveInitTokenClient = (clientId, callback) => {
  if (!window.google || !window.google.accounts || !window.google.accounts.oauth2) {
    throw new Error('Google Identity Services não carregado. Verifique a conexão com a internet.');
  }
  tokenClient = window.google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: callback,
  });
  return tokenClient;
};

const driveRequestToken = (interactive = true) => new Promise((resolve, reject) => {
  if (!tokenClient) return reject(new Error('Cliente OAuth não inicializado.'));
  tokenClient.callback = (resp) => {
    if (resp.error) return reject(new Error(resp.error_description || resp.error));
    const token = { access_token: resp.access_token, expires_at: Date.now() + (resp.expires_in * 1000) };
    driveSaveToken(token);
    resolve(token);
  };
  tokenClient.requestAccessToken({ prompt: interactive ? 'consent' : '' });
});

const driveGetValidToken = async () => {
  const t = driveLoadToken();
  if (t && t.access_token && t.expires_at && Date.now() < t.expires_at - 60000) return t;
  return await driveRequestToken(false);
};

const driveFindFile = async (token, name) => {
  const q = encodeURIComponent(`name='${name}' and trashed=false`);
  const resp = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)&pageSize=10`, {
    headers: { Authorization: `Bearer ${token.access_token}` }
  });
  if (!resp.ok) throw new Error(`Drive list: ${resp.status}`);
  const json = await resp.json();
  // pega o mais recente
  const files = json.files || [];
  files.sort((a,b) => new Date(b.modifiedTime) - new Date(a.modifiedTime));
  return files[0] || null;
};

const driveUpload = async (token, content, existingFileId) => {
  const metadata = { name: DRIVE_FILE_NAME, mimeType: 'application/json' };
  const boundary = '-------treino' + uid();
  const delim = `\r\n--${boundary}\r\n`;
  const close = `\r\n--${boundary}--`;
  const body =
    delim + 'Content-Type: application/json; charset=UTF-8\r\n\r\n' + JSON.stringify(metadata) +
    delim + 'Content-Type: application/json\r\n\r\n' + content + close;

  const url = existingFileId
    ? `https://www.googleapis.com/upload/drive/v3/files/${existingFileId}?uploadType=multipart`
    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
  const method = existingFileId ? 'PATCH' : 'POST';
  const resp = await fetch(url, {
    method,
    headers: {
      Authorization: `Bearer ${token.access_token}`,
      'Content-Type': `multipart/related; boundary=${boundary}`,
    },
    body
  });
  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`Drive upload: ${resp.status} ${err}`);
  }
  return await resp.json();
};

const driveDownload = async (token, fileId) => {
  const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { Authorization: `Bearer ${token.access_token}` }
  });
  if (!resp.ok) throw new Error(`Drive download: ${resp.status}`);
  return await resp.text();
};

const WorkoutEditor = ({ workout, data, setData, onClose }) => {
  const [w, setW] = useState({
    color: WORKOUT_COLORS[0].value,
    ...workout,
    exercises: (workout.exercises||[]).map(we => normalizeTemplateExercise(we, data.exercises.find(e=>e.id===we.exerciseId)))
  });
  const [pickingEx, setPickingEx] = useState(false);
  const [editingExIdx, setEditingExIdx] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(false);

  const save = () => {
    if (!w.name.trim()) return;
    setData(d => {
      const list = [...d.workouts];
      if (w.id) { const i = list.findIndex(x=>x.id===w.id); if (i>=0) list[i] = w; }
      else list.push({...w, id: uid()});
      return { ...d, workouts: list };
    });
    onClose();
  };
  const remove = () => { setData(d => ({...d, workouts: d.workouts.filter(x=>x.id!==w.id)})); onClose(); };

  const addExercise = (exerciseId) => {
    const ex = data.exercises.find(e=>e.id===exerciseId);
    if (!ex) return;
    const targetSets = 3;
    const setRefs = [];
    for (let i = 0; i < targetSets; i++) {
      if (ex.type === 'time') setRefs.push({ weight: '', reps: '', time: 30 });
      else setRefs.push({ weight: '', reps: 10, time: '' });
    }
    const newItem = {
      exerciseId,
      targetSets,
      targetRepsMin: ex.type === 'time' ? null : 8,
      targetRepsMax: ex.type === 'time' ? null : 12,
      setRefs,
      notes: ''
    };
    setW(prev => ({...prev, exercises: [...prev.exercises, newItem]}));
    setPickingEx(false);
    setEditingExIdx(w.exercises.length);
  };
  const updateEx = (idx, patch) => setW(prev => ({...prev, exercises: prev.exercises.map((e,i)=>i===idx?{...e,...patch}:e)}));
  const removeEx = (idx) => { setW(prev => ({...prev, exercises: prev.exercises.filter((_,i)=>i!==idx)})); setEditingExIdx(null); };
  const moveEx = (idx, dir) => {
    setW(prev => {
      const arr = [...prev.exercises]; const ni = idx + dir;
      if (ni < 0 || ni >= arr.length) return prev;
      [arr[idx], arr[ni]] = [arr[ni], arr[idx]];
      return {...prev, exercises: arr};
    });
  };

  return (
    <div className="fixed inset-0 z-40 bg-black flex flex-col">
      <Header title={workout.id?'Editar treino':'Novo treino'} onBack={onClose}
        right={<Btn variant="primary" size="sm" onClick={save} icon={Save}>Salvar</Btn>} />
      <div className="flex-1 overflow-y-auto pb-32">
        <div className="p-4 space-y-4 border-b border-[#1a1a1a]">
          <Input label="Nome" value={w.name} onChange={v=>setW({...w, name:v})} placeholder="Ex: Treino A — Push" />
          <div>
            <div className="text-[10px] font-mono uppercase tracking-widest text-[#666] mb-1.5">Cor do treino</div>
            <div className="grid grid-cols-6 gap-2">
              {WORKOUT_COLORS.map(c => {
                const sel = w.color === c.value;
                return (
                  <button key={c.id} type="button" onClick={()=>setW({...w, color: c.value})}
                    title={c.label}
                    className="h-10 border transition-all relative"
                    style={{ background: c.value, borderColor: sel ? '#fff' : 'transparent', borderWidth: sel ? 2 : 1 }}>
                    {sel && <Check size={14} strokeWidth={3} className="text-black absolute" style={{top:'50%', left:'50%', transform:'translate(-50%,-50%)'}} />}
                  </button>
                );
              })}
            </div>
          </div>
          <TextArea label="Observações gerais" value={w.notes} onChange={v=>setW({...w, notes:v})} placeholder="Notas para lembrar a cada treino" rows={3} />
        </div>
        <div className="px-4 py-3 flex items-center justify-between">
          <div className="text-[10px] font-mono uppercase tracking-widest text-[#666]">Exercícios ({w.exercises.length})</div>
          <Btn icon={Plus} onClick={()=>setPickingEx(true)} size="sm" variant="ghost">Adicionar</Btn>
        </div>
        {w.exercises.length === 0 ? (
          <div className="px-4 py-8 text-center text-[#666] font-mono text-xs">Nenhum exercício. Toque em ADICIONAR.</div>
        ) : (
          <div className="divide-y divide-[#0d0d0d]">
            {w.exercises.map((we, idx) => {
              const ex = data.exercises.find(e=>e.id===we.exerciseId);
              const c = muscleColor(ex && ex.muscle);
              const refsCount = (we.setRefs||[]).length;
              return (
                <div key={idx} className="px-4 py-3 flex items-center gap-3 border-l-4" style={{ borderLeftColor: c, background: withAlpha(c, 0.04) }}>
                  <div className="flex flex-col gap-0.5">
                    <button onClick={()=>moveEx(idx,-1)} disabled={idx===0} className="text-[#666] disabled:opacity-30 p-1"><ArrowUp size={12} /></button>
                    <button onClick={()=>moveEx(idx, 1)} disabled={idx===w.exercises.length-1} className="text-[#666] disabled:opacity-30 p-1"><ArrowDown size={12} /></button>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="font-mono text-sm text-white truncate">{ex ? ex.name : '? Exercício removido'}</div>
                    <div className="text-[10px] font-mono text-[#666] mt-0.5">
                      {refsCount}× {ex && ex.type==='time'

        {workout.id && (
          <div className="p-4 mt-6">
            <Btn variant="danger" onClick={()=>setConfirmDelete(true)} icon={Trash2} full>Excluir treino</Btn>
          </div>

      {pickingEx && <ExercisePicker exercises={data.exercises} onPick={addExercise} onClose={()=>setPickingEx(false)} />}
      {editingExIdx !== null && w.exercises[editingExIdx] && (
        <WorkoutExerciseEditor
          item={w.exercises[editingExIdx]}
          exercise={data.exercises.find(e=>e.id===w.exercises[editingExIdx].exerciseId)}
          onSave={(patch)=>{updateEx(editingExIdx, patch); setEditingExIdx(null);}}
          onCancel={()=>setEditingExIdx(null)}
          onRemove={()=>removeEx(editingExIdx)} />
      )}
      <Confirm open={confirmDelete} title="Excluir treino?"
        message="O modelo será removido. Treinos já realizados ficam no histórico."

  );
};

const WorkoutExerciseEditor = ({ item, exercise, onSave, onCancel, onRemove }) => {
  const [it, setIt] = useState(() => normalizeTemplateExercise(item, exercise));
  const isTime = exercise && exercise.type === 'time';

  const updateTargetSets = (n) => {
    const next = Math.max(1, parseInt(n)||1);
    const refs = [...(it.setRefs || [])];
    while (refs.length < next) {
      const last = refs[refs.length-1] || (isTime ? {weight:'', reps:'', time:30} : {weight:'', reps:10, time:''});
      refs.push({ ...last });
    }
    refs.length = next;
    setIt({ ...it, targetSets: next, setRefs: refs });
  };

  const updateRef = (i, patch) => {
    setIt({ ...it, setRefs: it.setRefs.map((r,j)=>j===i?{...r,...patch}:r) });
  };

  return (
    <Modal open={true} onClose={onCancel} title={(exercise && exercise.name)||'Configurar'}
      footer={<>
        <Btn variant="danger" onClick={onRemove} icon={Trash2} size="md" />
        <Btn variant="ghost" onClick={onCancel} full>Cancelar</Btn>
        <Btn variant="primary" onClick={()=>onSave(it)} full>OK</Btn>
      </>}>
      <Input label="Número de séries" type="number" inputMode="numeric" value={it.targetSets}
        onChange={updateTargetSets} min={1} />

      {!isTime && (
        <div className="grid grid-cols-2 gap-3">
          <Input label="Faixa reps mín" type="number" inputMode="numeric" value={it.targetRepsMin}
            onChange={v=>setIt({...it, targetRepsMin: v===''? '' : (parseInt(v)||0)})} />
          <Input label="Faixa reps máx" type="number" inputMode="numeric" value={it.targetRepsMax}
            onChange={v=>setIt({...it, targetRepsMax: v===''? '' : (parseInt(v)||0)})} />
        </div>
      )}

      <div>
        <div className="text-[10px] font-mono uppercase tracking-widest text-[#666] mb-2">
          Cargas e {isTime ? 'tempos' : 'repetições'} de referência por série
        </div>
        <p className="text-[10px] font-mono text-[#666] mb-3 leading-relaxed">
          Estes valores são pré-preenchidos no início do treino.
        </p>
        <table className="set-table">
          <thead>
            <tr>
              <th className="col-num">#</th>
              {isTime ? (<><th>Carga</th><th>Tempo</th></>) : (<><th>Carga</th><th>Reps</th></>)}
            </tr>
          </thead>
          <tbody>
            {(it.setRefs||[]).map((r,i)=>(
              <tr key={i}>
                <td className="col-num">{i+1}</td>
                {isTime ? (
                  <>
                    <td><input type="number" inputMode="decimal" step="0.5" className="cell-input" value={r.weight==null?'':r.weight}
                      onFocus={(e)=>e.target.select()}
                      onChange={(e)=>updateRef(i, {weight: e.target.value === '' ? '' : (parseFloat(e.target.value)||0)})} /></td>
                    <td><input type="number" inputMode="numeric" className="cell-input" value={r.time==null?'':r.time}
                      onFocus={(e)=>e.target.select()}
                      onChange={(e)=>updateRef(i, {time: e.target.value === '' ? '' : (parseInt(e.target.value)||0)})} /></td>
                  </>
                ) : (
                  <>
                    <td><input type="number" inputMode="decimal" step="0.5" className="cell-input" value={r.weight==null?'':r.weight}
                      onFocus={(e)=>e.target.select()}
                      onChange={(e)=>updateRef(i, {weight: e.target.value === '' ? '' : (parseFloat(e.target.value)||0)})} /></td>
                    <td><input type="number" inputMode="numeric" className="cell-input" value={r.reps==null?'':r.reps}
                      onFocus={(e)=>e.target.select()}
                      onChange={(e)=>updateRef(i, {reps: e.target.value === '' ? '' : (parseInt(e.target.value)||0)})} /></td>
                  </>
                )}
              </tr>
            ))}

        </table>
      </div>

      <TextArea label="Observações deste exercício no treino" value={it.notes} onChange={v=>setIt({...it, notes:v})}
        placeholder="Ex: começar com aquecimento de 50%" rows={2} />
    </Modal>
  );
};

const buildInitialSets = (exDef, exTemplateItem) => {
  const it = normalizeTemplateExercise(exTemplateItem, exDef);
  const refs = it.setRefs || [];
  return refs.map(r => ({
    completed: false,
    weight: r.weight == null ? '' : r.weight,
    reps: r.reps == null ? '' : r.reps,
    time: r.time == null ? '' : r.time,
  }));
};

/* ACTIVE WORKOUT */
const ActiveWorkout = ({ active, setActive, data, setData, onFinish }) => {
  const [showSummary, setShowSummary] = useState(false);
  const [showWorkoutNotes, setShowWorkoutNotes] = useState(false);
  const [confirmExit, setConfirmExit] = useState(false);
  const [confirmIncomplete, setConfirmIncomplete] = useState(false);
  const [addingEx, setAddingEx] = useState(false);
  const [substitutingIdx, setSubstitutingIdx] = useState(null);
  const [confirmRemoveIdx, setConfirmRemoveIdx] = useState(null);
  const [historyExId, setHistoryExId] = useState(null);
  const [collapsed, setCollapsed] = useState(() => loadLS(COLLAPSED_KEY, {}));

  // Salva o estado de collapse por exercício/sessão
  useEffect(() => { saveLS(COLLAPSED_KEY, collapsed); }, [collapsed]);

  useEffect(() => {
    const t = setInterval(() => setActive(prev => prev ? {...prev, elapsed: Date.now() - prev.startedAt} : prev), 1000);
    return () => clearInterval(t);
  }, [setActive]);

  const updateExLog = (idx, patch) => setActive(prev => ({
    ...prev,
    exercises: prev.exercises.map((e,i)=>i===idx?{...e,...patch}:e)
  }));

  const updateSet = (idx, si, patch) => {
    setActive(prev => ({
      ...prev,
      exercises: prev.exercises.map((e,i) => {
        if (i !== idx) return e;
        const newSets = (e.sets||[]).map((s,j) => {
          if (j !== si) return s;
          const merged = { ...s, ...patch };
          const exDef = data.exercises.find(d=>d.id===e.exerciseId);
          if (exDef && exDef.type === 'weight') {
            merged.oneRM = calc1RM(merged.weight, merged.reps);
          }
          return merged;
        });
        return { ...e, sets: newSets };
      })
    }));
  };

  const toggleSetCompleted = (idx, si) => {
    const exLog = active.exercises[idx];
    const set = (exLog.sets||[])[si];
    if (!set) return;
    const exDef = data.exercises.find(d=>d.id===exLog.exerciseId);
    if (set.completed) {
      updateSet(idx, si, { completed: false });
    } else {
      const w = parseFloat(set.weight);
      const r = parseInt(set.reps);
      const t = parseInt(set.time);
      if (exDef.type === 'time' && (!t || t <= 0)) return;
      if (exDef.type === 'weight' && (isNaN(r) || r <= 0)) return;
      const oneRM = exDef.type === 'weight' ? calc1RM(set.weight, set.reps) : 0;
      updateSet(idx, si, { completed: true, oneRM, timestamp: Date.now() });
      try{ navigator.vibrate && navigator.vibrate(80); } catch(e){}
    }
  };

  const addSetRow = (idx) => {
    const exLog = active.exercises[idx];
    const sets = exLog.sets || [];
    const last = sets[sets.length-1];
    const newSet = last
      ? { ...last, completed: false, oneRM: undefined, timestamp: undefined }
      : { completed: false, weight:'', reps:'', time:'' };
    updateExLog(idx, { sets: [...sets, newSet] });
  };

  const removeSetRow = (idx, si) => {
    const exLog = active.exercises[idx];
    updateExLog(idx, { sets: (exLog.sets||[]).filter((_,i)=>i!==si) });
  };

  const addExerciseToActive = (exerciseId) => {
    const ex = data.exercises.find(e=>e.id===exerciseId);
    if (!ex) return;
    const targetSets = 3;
    const setRefs = [];
    for (let i = 0; i < targetSets; i++) {
      if (ex.type === 'time') setRefs.push({ weight:'', reps:'', time: 30 });
      else setRefs.push({ weight:'', reps: 10, time: '' });
    }
    const tplItem = {
      exerciseId, targetSets,
      targetRepsMin: ex.type === 'time' ? null : 8,
      targetRepsMax: ex.type === 'time' ? null : 12,
      setRefs,
    };
    const newItem = { ...tplItem, notes:'', sessionNote:'', sets: buildInitialSets(ex, tplItem) };
    setActive(prev => ({ ...prev, exercises: [...prev.exercises, newItem] }));
    setAddingEx(false);
  };

  const substituteExercise = (newExerciseId) => {
    const newDef = data.exercises.find(e=>e.id===newExerciseId);
    if (!newDef) return;
    const idx = substitutingIdx;
    setActive(prev => {
      const old = prev.exercises[idx];
      const targetSets = old.targetSets || 3;
      const setRefs = [];
      for (let i = 0; i < targetSets; i++) {
        if (newDef.type === 'time') setRefs.push({ weight:'', reps:'', time: 30 });
        else setRefs.push({ weight:'', reps: 10, time: '' });
      }
      const tplItem = {
        exerciseId: newExerciseId, targetSets,
        targetRepsMin: newDef.type === 'time' ? null : (old.targetRepsMin || 8),
        targetRepsMax: newDef.type === 'time' ? null : (old.targetRepsMax || 12),
        setRefs,
      };
      const replaced = { ...tplItem, notes: old.notes||'', sessionNote: old.sessionNote||'', sets: buildInitialSets(newDef, tplItem) };
      return { ...prev, exercises: prev.exercises.map((e,i)=>i===idx?replaced:e) };
    });
    setSubstitutingIdx(null);
  };

  const removeExercise = (idx) => {
    setActive(prev => ({ ...prev, exercises: prev.exercises.filter((_,i)=>i!==idx) }));
    setConfirmRemoveIdx(null);
  };

  const finish = (refUpdates, extras) => {
    const session = {
      ...active,
      finishedAt: Date.now(),
      duration: Date.now() - active.startedAt,
      disposition: extras && extras.disposition != null ? extras.disposition : null,
      intensity: extras && extras.intensity != null ? extras.intensity : null,
    };
    setData(d => {
      let workouts = d.workouts;
      if (refUpdates && session.templateId && Object.keys(refUpdates).length) {
        workouts = d.workouts.map(w => {
          if (w.id !== session.templateId) return w;
          const updatedExs = w.exercises.map(we => {
            const upd = refUpdates[we.exerciseId];
            if (!upd) return we;
            const next = { ...we };
            if (upd.setRefs) next.setRefs = upd.setRefs;
            if (upd.targetRepsMin != null) next.targetRepsMin = upd.targetRepsMin;
            if (upd.targetRepsMax != null) next.targetRepsMax = upd.targetRepsMax;
            return next;
          });
          return { ...w, exercises: updatedExs };
        });
      }
      return { ...d, sessions: [session, ...d.sessions], workouts };
    });
    setActive(null);
    onFinish(session);
  };

  // verifica se há séries pendentes (alvo - completas > 0) em qualquer exercício
  const hasIncomplete = useMemo(() => {
    return active.exercises.some(e => {
      const target = e.targetSets || 0;
      const done = (e.sets||[]).filter(s=>s.completed).length;
      return done < target;
    });
  }, [active.exercises]);

  const tryFinish = () => {
    if (hasIncomplete) {
      setConfirmIncomplete(true);
    } else {
      setShowSummary(true);
    }
  };

  const totalEx = active.exercises.length;
  const doneCount = active.exercises.filter(e=>(e.sets||[]).every(s=>s.completed) && (e.sets||[]).length > 0).length;
  const elapsed = Math.floor((active.elapsed||0)/1000);

  const toggleCollapse = (key) => setCollapsed(prev => ({ ...prev, [key]: !prev[key] }));

  return (
    <div className="fixed inset-0 z-40 bg-black flex flex-col">
      <div className="border-b border-[#1a1a1a] px-4 py-3 sticky top-0 bg-black z-30">
        <div className="flex items-center justify-between">
          <button onClick={()=>setConfirmExit(true)} className="text-[#888] p-1 -ml-1"><X size={20} /></button>
          <div className="text-center flex-1 min-w-0 mx-2">
            <div className="font-display text-lg tracking-wider leading-none truncate">{active.templateName}</div>
            <div className="text-[10px] font-mono text-[#666] tracking-widest mt-0.5">{formatTime(elapsed)} · {doneCount}/{totalEx}</div>
          </div>
          <button onClick={tryFinish} className="text-[#d4ff00] p-1"><Check size={22} /></button>
        </div>
      </div>

      {active.notes && (
        <button onClick={()=>setShowWorkoutNotes(true)} className="border-b border-[#1a1a1a] px-4 py-2 flex items-center gap-2 text-[#d4ff00] hover:bg-[#0a0a0a]">
          <Edit3 size={14} />
          <span className="text-[10px] font-mono uppercase tracking-widest truncate text-left">Notas do treino · toque para abrir</span>
        </button>
      )}

      <div className="flex-1 overflow-y-auto safe-bottom-pad">
        {active.exercises.map((exLog, idx) => {
          const exDef = data.exercises.find(e=>e.id===exLog.exerciseId);
          const key = `${active.id}-${idx}`;
          return (
            <ExerciseBlock
              key={key}
              idx={idx}
              exLog={exLog}
              exDef={exDef}
              isCollapsed={!!collapsed[key]}
              onToggleCollapse={()=>toggleCollapse(key)}
              onUpdateSet={(si, patch)=>updateSet(idx, si, patch)}
              onToggleSet={(si)=>toggleSetCompleted(idx, si)}
              onAddSet={()=>addSetRow(idx)}
              onRemoveSet={(si)=>removeSetRow(idx, si)}
              onUpdateLog={(patch)=>updateExLog(idx, patch)}
              onSubstitute={()=>setSubstitutingIdx(idx)}
              onRemove={()=>setConfirmRemoveIdx(idx)}
              onShowHistory={()=>setHistoryExId(exLog.exerciseId)}
            />
          );
        })}

        <div className="p-4 flex gap-2">
          <Btn variant="ghost" full icon={Plus} onClick={()=>setAddingEx(true)}>Adicionar exercício</Btn>
        </div>
      </div>

      <div className="border-t border-[#1a1a1a] bg-black px-4 py-3 fixed bottom-0 left-0 right-0 safe-bottom">
        <Btn variant="primary" onClick={tryFinish} full size="lg" icon={Check}>Finalizar treino</Btn>
      </div>

      <Modal open={showWorkoutNotes} onClose={()=>setShowWorkoutNotes(false)} title="Notas do treino"
        footer={<Btn onClick={()=>setShowWorkoutNotes(false)} full>Fechar</Btn>}>
        {active.notes && (
          <div className="bg-[#0a0a0a] border-l-2 border-[#d4ff00] px-3 py-3">
            <div className="text-[9px] font-mono uppercase tracking-widest text-[#d4ff00] mb-2">Observações fixas</div>
            <p className="text-sm font-mono text-white whitespace-pre-wrap leading-relaxed">{active.notes}</p>
          </div>
        )}
        <TextArea label="Anotação geral deste treino (hoje)" value={active.sessionNote||''}
          onChange={v=>setActive({...active, sessionNote:v})}
          placeholder="Ex: 'dormi pouco', 'sem cafeína', 'pump bom'..." rows={4} />
      </Modal>

      {showSummary && <SummaryModal active={active} data={data} onConfirm={finish} onCancel={()=>setShowSummary(false)} onUpdateActive={setActive} />}

      {addingEx && <ExercisePicker exercises={data.exercises} title="Adicionar exercício" onPick={addExerciseToActive} onClose={()=>setAddingEx(false)} />}
      {substitutingIdx !== null && <ExercisePicker exercises={data.exercises} title="Substituir por..." onPick={substituteExercise} onClose={()=>setSubstitutingIdx(null)} />}
      {historyExId && <ExerciseHistoryModal exerciseId={historyExId} data={data} onClose={()=>setHistoryExId(null)} />}

      <Confirm open={confirmRemoveIdx !== null} title="Remover exercício?"
        message="O exercício será removido deste treino. As séries já registradas nele serão perdidas."
        onConfirm={()=>removeExercise(confirmRemoveIdx)} onCancel={()=>setConfirmRemoveIdx(null)} danger />

      <Confirm open={confirmIncomplete} title="Finalizar com séries pendentes?"
        message="Existem séries não marcadas como concluídas. Você quer finalizar o treino mesmo assim? As séries não marcadas não serão registradas."
        onConfirm={()=>{ setConfirmIncomplete(false); setShowSummary(true); }}
        onCancel={()=>setConfirmIncomplete(false)}
        confirmLabel="Finalizar mesmo assim" />

      <Confirm open={confirmExit} title="Sair do treino?"
        message="O treino em andamento será descartado e não vai pro histórico."
        onConfirm={()=>{setActive(null); onFinish(null);}} onCancel={()=>setConfirmExit(false)} danger />
    </div>
  );
};

const ExerciseBlock = ({ idx, exLog, exDef, isCollapsed, onToggleCollapse, onUpdateSet, onToggleSet, onAddSet, onRemoveSet, onUpdateLog, onSubstitute, onRemove, onShowHistory }) => {
  const [showActions, setShowActions] = useState(false);
  const [showNotes, setShowNotes] = useState(false);

  if (!exDef) {
    return (
      <div className="border-b border-[#1a1a1a] p-4">

      </div>

  // resumo curto pra mostrar quando colapsado
  const summary = (() => {
    if (sets.length === 0) return '—';
    const refs = sets.slice(0, target);
    if (isTime) return refs.map(s => `${s.time||'?'}s`).join(' · ');
    return refs.map(s => `${s.weight===''?'?':s.weight}×${s.reps===''?'?':s.reps}`).join(' · ');
  })();

  return (
    <div className="border-b border-[#1a1a1a]">
      <div className={`px-4 py-3 border-l-4 ${isDone?'bg-[#0a0a0a]':''}`}

          <button onClick={onToggleCollapse} className="text-[#888] hover:text-white p-1 flex-shrink-0 mt-0.5">
            {isCollapsed ? <ChevronDown size={18} /> : <ChevronUp size={18} />}

            <div className="text-[10px] font-mono uppercase tracking-widest mb-0.5 flex items-center gap-1.5" style={{ color: c }}>
              <span>{idx+1}.</span>
              <span>{exDef.muscle||'—'}</span>
            </div>
            <h2 className="font-display text-xl tracking-wider leading-tight break-words">{exDef.name}</h2>
            <div className="flex gap-2 mt-1.5 flex-wrap">
              <Pill color={c}>
                {target} séries
                {!isTime && repsRange && ` · ${repsRange} reps`}
              </Pill>
              {setsDone > 0 && <Pill color={isDone ? '#84cc16' : c}>{setsDone}/{target} ✓</Pill>}
            </div>
            {isCollapsed && (
              <div className="text-[10px] font-mono text-[#888] mt-1.5 truncate">{summary}</div>
            )}
          </div>
          <button onClick={()=>setShowActions(true)} className="text-[#888] hover:text-white p-1 flex-shrink-0">
            <Settings size={16} />
          </button>
        </div>

        {!isCollapsed && (exDef.notes || exLog.notes) && (
          <button onClick={()=>setShowNotes(true)} className="mt-3 w-full bg-[#0a0a0a] border-l-2 border-[#d4ff00] px-3 py-2 text-left">
            <div className="text-[9px] font-mono uppercase tracking-widest text-[#d4ff00] mb-1">Observações · toque</div>
            <p className="text-[11px] font-mono text-[#aaa] leading-relaxed truncate">{exDef.notes || exLog.notes}</p>
          </button>
        )}
      </div>

      {!isCollapsed && (
        <>
          <table className="set-table">
            <thead>
              <tr>
                <th className="col-num">#</th>
                {isTime ? (
                  <>
                    <th>Carga</th>
                    <th>Tempo</th>
                  </>
                ) : (
                  <>
                    <th>Carga</th>
                    <th>Reps{repsRange && <span className="ml-1 text-[#888] normal-case tracking-normal">({repsRange})</span>}</th>
                    <th>1RM</th>

                )}
                <th className="col-check">Feita</th>
                <th className="col-action"></th>
              </tr>
            </thead>
            <tbody>
              {sets.map((s, si) => (
                <SetRow key={si} si={si} set={s} exDef={exDef}
                  onUpdate={(patch)=>onUpdateSet(si, patch)}

                  onRemove={()=>onRemoveSet(si)} />

            </tbody>
          </table>

          <div className="px-4 py-2 border-b border-[#0d0d0d] bg-[#050505]">
            <button onClick={onAddSet}
              className="w-full py-2 text-[10px] font-mono uppercase tracking-widest text-[#666] border border-dashed border-[#1a1a1a] hover:border-[#333] hover:text-[#888] transition-colors flex items-center justify-center gap-1.5">
              <Plus size={12} /> Adicionar série extra
            </button>
          </div>
        </>
      )}

      <Modal open={showActions} onClose={()=>setShowActions(false)} title={exDef.name}
        footer={<Btn variant="ghost" onClick={()=>setShowActions(false)} full>Fechar</Btn>}>
        <button onClick={()=>{ setShowActions(false); onShowHistory(); }}
          className="w-full px-3 py-3 border border-[#1a1a1a] hover:border-[#333] text-left flex items-center gap-3">
          <HistoryIcon size={16} className="text-[#d4ff00]" />
          <div>
            <div className="font-mono text-sm text-white">Ver histórico deste exercício</div>
            <div className="text-[10px] font-mono text-[#666] mt-0.5">Últimas séries, treinos e datas</div>
          </div>
        </button>
        <button onClick={()=>{ setShowActions(false); onSubstitute(); }}
          className="w-full px-3 py-3 border border-[#1a1a1a] hover:border-[#333] text-left flex items-center gap-3">
          <Repeat size={16} className="text-[#d4ff00]" />
          <div>
            <div className="font-mono text-sm text-white">Substituir exercício</div>
            <div className="text-[10px] font-mono text-[#666] mt-0.5">Trocar por outro mantendo séries</div>
          </div>
        </button>
        <button onClick={()=>{ setShowActions(false); onRemove(); }}
          className="w-full px-3 py-3 border border-[#ff4757]/30 hover:bg-[#ff4757]/10 text-left flex items-center gap-3">
          <Trash2 size={16} className="text-[#ff4757]" />
          <div>
            <div className="font-mono text-sm text-[#ff4757]">Remover do treino</div>
            <div className="text-[10px] font-mono text-[#666] mt-0.5">Tira este exercício do treino atual</div>
          </div>
        </button>
        <div className="pt-2">
          <TextArea label="Anotação rápida deste exercício hoje"
            value={exLog.sessionNote||''} onChange={v=>onUpdateLog({sessionNote:v})}
            placeholder="Ex: 'última série caiu muito', 'ombro incomodando'..." rows={3} />
        </div>
      </Modal>

      <Modal open={showNotes} onClose={()=>setShowNotes(false)} title="Observações"
        footer={<Btn onClick={()=>setShowNotes(false)} full>Fechar</Btn>}>
        {exDef.notes && (
          <div className="bg-[#0a0a0a] border-l-2 border-[#d4ff00] px-3 py-3">
            <div className="text-[9px] font-mono uppercase tracking-widest text-[#d4ff00] mb-2">Observação fixa</div>
            <p className="text-sm font-mono text-white whitespace-pre-wrap leading-relaxed">{exDef.notes}</p>
          </div>
        )}
        {exLog.notes && (
          <div className="bg-[#0a0a0a] border-l-2 border-[#666] px-3 py-3">
            <div className="text-[9px] font-mono uppercase tracking-widest text-[#888] mb-2">Observação do treino</div>
            <p className="text-sm font-mono text-white whitespace-pre-wrap leading-relaxed">{exLog.notes}</p>
          </div>
        )}
      </Modal>
    </div>
  );
};

const SetRow = ({ si, set, exDef, onUpdate, onToggle, onRemove }) => {
  const onCellChange = (field, str) => {
    if (str === '') { onUpdate({ [field]: '' }); return; }
    if (field === 'reps' || field === 'time') {
      const n = parseInt(str);
      onUpdate({ [field]: isNaN(n) ? '' : n });
    } else {
      const n = parseFloat(str);
      onUpdate({ [field]: isNaN(n) ? '' : n });
    }
  };
  const completed = !!set.completed;
  const oneRM = exDef.type === 'weight' && set.weight !== '' && set.reps !== '' ? calc1RM(set.weight, set.reps) : 0;
  const isTime = exDef.type === 'time';

  const cellInput = (val, field, step='1') => (
    <input
      type="number"
      inputMode="decimal"
      step={step}
      min="0"
      value={val === '' || val == null ? '' : val}
      onChange={(e)=>onCellChange(field, e.target.value)}
      onFocus={(e)=>e.target.select()}
      placeholder="—"
      disabled={completed}
      className="cell-input"
    />
  );

  return (
    <tr className={completed ? 'completed' : ''}>
      <td className="col-num">{si+1}</td>
      {isTime ? (
        <>
          <td>{cellInput(set.weight, 'weight', '0.5')}</td>
          <td>{cellInput(set.time, 'time', '1')}</td>
        </>
      ) : (
        <>
          <td>{cellInput(set.weight, 'weight', '0.5')}</td>
          <td>{cellInput(set.reps, 'reps', '1')}</td>
          <td className="cell-1rm">{oneRM > 0 ? oneRM : '—'}</td>
        </>
      )}
      <td className="col-check">
        <CompletedCheckbox checked={completed} onChange={onToggle} />
      </td>
      <td className="col-action">
        <button onClick={onRemove} className="text-[#444] hover:text-[#ff4757] p-1" style={{display:'inline-flex'}}><X size={14} /></button>
      </td>
    </tr>
  );
};

const CompletedCheckbox = ({ checked, onChange }) => (
  <button type="button" onClick={onChange}
    className={`w-7 h-7 border transition-colors ${checked?'bg-[#d4ff00] border-[#d4ff00]':'bg-black border-[#333] hover:border-[#666]'}`}
    style={{display:'inline-flex', alignItems:'center', justifyContent:'center'}}>
    {checked && <Check size={16} strokeWidth={3} className="text-black" />}
  </button>
);

const ExerciseHistoryModal = ({ exerciseId, data, onClose }) => {
  const exDef = data.exercises.find(e=>e.id===exerciseId);
  const sessions = data.sessions
    .map(s => {
      const log = s.exercises.find(e => e.exerciseId === exerciseId);
      const sets = log ? (log.sets||[]).filter(x=>x.completed) : [];
      if (!sets.length) return null;
      return { session: s, sets, sessionNote: log.sessionNote };
    })
    .filter(Boolean)
    .slice(0, 8);

  return (
    <Modal open={true} onClose={onClose} title={(exDef && exDef.name) || 'Histórico'}
      footer={<Btn onClick={onClose} full>Fechar</Btn>}>
      {sessions.length === 0 ? (
        <p className="text-sm text-[#666] font-mono text-center py-6">Sem histórico para este exercício ainda.</p>
      ) : (
        <div className="space-y-3">
          {sessions.map((entry, i) => {
            const { session, sets, sessionNote } = entry;
            const max1RM = exDef && exDef.type === 'weight' ? Math.max(...sets.map(s=>s.oneRM||0)) : 0;
            return (
              <div key={i} className="border border-[#1a1a1a] p-3">
                <div className="flex items-baseline justify-between mb-0.5 gap-2">
                  <div className="font-display text-base tracking-wider truncate">{session.templateName || 'Treino livre'}</div>
                  {max1RM > 0 && <div className="text-[10px] font-mono text-[#d4ff00] flex-shrink-0">1RM {max1RM}kg</div>}
                </div>
                <div className="text-[10px] font-mono text-[#666] tracking-widest mb-2">{formatDateTime(session.date)}</div>
                <div className="space-y-0.5">
                  {sets.map((s, si) => (
                    <div key={si} className="flex items-center gap-3 text-xs font-mono">
                      <span className="text-[#666] w-5">{si+1}</span>
                      {exDef && exDef.type==='time' ? (
                        <span className="text-white">{s.weight?`${s.weight}kg · `:''}{s.time}s</span>
                      ) : (
                        <>
                          <span className="text-white">{s.weight}kg × {s.reps}</span>
                          {s.oneRM > 0 && <span className="text-[#888] ml-auto">1RM {s.oneRM}kg</span>}
                        </>
                      )}
                    </div>
                  ))}
                </div>
                {sessionNote && (
                  <div className="text-[10px] font-mono text-[#888] mt-2 leading-relaxed border-l-2 border-[#1a1a1a] pl-2">{sessionNote}</div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </Modal>
  );
};

const SummaryModal = ({ active, data, onConfirm, onCancel, onUpdateActive }) => {
  const [disposition, setDisposition] = useState(active.disposition || null);
  const [intensity, setIntensity] = useState(active.intensity || null);

  const initialDiff = useMemo(() => {
    if (!active.templateId) return null;
    const tpl = data.workouts.find(w=>w.id===active.templateId);
    if (!tpl) return null;
    const out = [];
    active.exercises.forEach(e => {
      const def = data.exercises.find(d=>d.id===e.exerciseId);
      const tplEx = tpl.exercises.find(t => t.exerciseId === e.exerciseId);
      if (!def || !tplEx) return;
      const tplNorm = normalizeTemplateExercise(tplEx, def);
      const refs = tplNorm.setRefs || [];
      const completed = (e.sets||[]).filter(s=>s.completed);
      const diffs = [];
      completed.forEach((s, idx) => {
        const ref = refs[idx];
        if (!ref) {
          diffs.push({ setIdx: idx, isExtra: true, ref: { weight:'', reps:'', time:'' }, actual: { weight: s.weight, reps: s.reps, time: s.time } });
          return;
        }
        const wDiff = (def.type === 'time' || def.type === 'weight') && Number(s.weight||0) !== Number(ref.weight||0);
        const rDiff = def.type !== 'time' && Number(s.reps||0) !== Number(ref.reps||0);
        const tDiff = def.type === 'time' && Number(s.time||0) !== Number(ref.time||0);
        if (wDiff || rDiff || tDiff) {
          diffs.push({ setIdx: idx, isExtra: false, ref: { weight: ref.weight, reps: ref.reps, time: ref.time }, actual: { weight: s.weight, reps: s.reps, time: s.time } });
        }
      });
      if (diffs.length) {
        out.push({ exerciseId: e.exerciseId, def, tplEx: tplNorm, completed, diffs });
      }
    });
    return out;
  }, [active.templateId, active.exercises, data.workouts, data.exercises]);

  const [applyByExercise, setApplyByExercise] = useState(() => {
    const m = {};
    if (initialDiff) initialDiff.forEach(d => { m[d.exerciseId] = false; });
    return m;
  });

  const totalSets = active.exercises.reduce((acc, e) => acc + ((e.sets&&e.sets.filter(s=>s.completed).length)||0), 0);
  const totalVolume = active.exercises.reduce((acc, e) => acc + (e.sets||[]).filter(s=>s.completed).reduce((a,s)=>a+(Number(s.weight)||0)*(Number(s.reps)||0),0), 0);

  const handleConfirm = () => {
    const extras = { disposition, intensity };
    if (!active.templateId || !initialDiff || initialDiff.length === 0) {
      onConfirm(null, extras); return;
    }
    const out = {};
    initialDiff.forEach(group => {
      if (!applyByExercise[group.exerciseId]) return;
      const completed = group.completed;
      const newRefs = completed.map(s => {
        if (group.def.type === 'time') return { weight: s.weight === '' ? '' : Number(s.weight)||0, reps: '', time: Number(s.time)||0 };
        return { weight: Number(s.weight)||0, reps: Number(s.reps)||0, time: '' };
      });
      out[group.exerciseId] = { setRefs: newRefs };
    });
    onConfirm(out, extras);
  };

  const renderRefVal = (ref, type) => {
    if (type === 'time') return `${ref.weight?`${ref.weight}kg · `:''}${ref.time||'—'}s`;
    return `${ref.weight===''?'—':ref.weight}kg × ${ref.reps===''?'—':ref.reps}`;
  };

  return (
    <Modal open={true} onClose={onCancel} title="Finalizar treino"
      footer={<>
        <Btn variant="ghost" onClick={onCancel} full>Voltar</Btn>
        <Btn variant="primary" onClick={handleConfirm} icon={Check} full>Salvar</Btn>
      </>}>
      <div className="grid grid-cols-3 gap-2 text-center">
        <div className="border border-[#1a1a1a] p-3">
          <div className="font-display text-2xl text-white">{formatTime(Math.floor((Date.now()-active.startedAt)/1000))}</div>
          <div className="text-[9px] font-mono uppercase tracking-widest text-[#666] mt-1">Tempo</div>
        </div>
        <div className="border border-[#1a1a1a] p-3">
          <div className="font-display text-2xl text-white">{totalSets}</div>
          <div className="text-[9px] font-mono uppercase tracking-widest text-[#666] mt-1">Séries</div>
        </div>
        <div className="border border-[#1a1a1a] p-3">
          <div className="font-display text-2xl text-[#d4ff00]">{Math.round(totalVolume)}</div>
          <div className="text-[9px] font-mono uppercase tracking-widest text-[#666] mt-1">Volume kg</div>
        </div>
      </div>

      <div>
        <div className="text-[10px] font-mono uppercase tracking-widest text-[#666] mb-2">Disposição</div>
        <ScaleSelector value={disposition} onChange={setDisposition} labels={DISP_LABELS} />
      </div>
      <div>
        <div className="text-[10px] font-mono uppercase tracking-widest text-[#666] mb-2">Intensidade</div>
        <ScaleSelector value={intensity} onChange={setIntensity} labels={RPE_LABELS} />
      </div>

      <TextArea label="Observações finais do treino" value={active.sessionNote||''}
        onChange={v=>onUpdateActive({...active, sessionNote:v})} placeholder="Como foi o treino?" rows={3} />

      {initialDiff && initialDiff.length > 0 && (
        <div className="space-y-2">
          <div className="text-[10px] font-mono uppercase tracking-widest text-[#666]">Mudanças detectadas vs. referência</div>
          <p className="text-[10px] font-mono text-[#666] leading-relaxed">
            Marque os exercícios que devem ter a referência atualizada com os novos valores.
          </p>
          {initialDiff.map(group => {
            const c = muscleColor(group.def.muscle);
            const willApply = applyByExercise[group.exerciseId];
            return (
              <div key={group.exerciseId} className="border border-[#1a1a1a] border-l-4 p-3 space-y-2" style={{ borderLeftColor: c, background: withAlpha(c, 0.05) }}>
                <div className="flex items-center justify-between gap-3">
                  <div className="font-mono text-sm text-white truncate flex-1">{group.def.name}</div>
                  <Toggle value={willApply} onChange={(v)=>setApplyByExercise(prev => ({...prev, [group.exerciseId]: v}))} />
                </div>
                <div className="space-y-1">
                  {group.diffs.map((d, di) => (
                    <div key={di} className="text-[10px] font-mono flex items-center gap-2">
                      <span className="text-[#666] w-6">#{d.setIdx+1}</span>
                      {d.isExtra ? (
                        <>
                          <span className="text-[#d4ff00]">EXTRA</span>
                          <span className="text-white ml-auto">{renderRefVal(d.actual, group.def.type)}</span>
                        </>
                      ) : (
                        <>
                          <span className="text-[#888] truncate">{renderRefVal(d.ref, group.def.type)}</span>
                          <span className="text-[#666]">→</span>
                          <span className="text-white truncate">{renderRefVal(d.actual, group.def.type)}</span>
                        </>
                      )}
                    </div>
                  ))}
                </div>
                {willApply && (
                  <div className="text-[9px] font-mono uppercase tracking-widest text-[#d4ff00]">
                    ✓ Referência será atualizada com {group.completed.length} séries
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {active.templateId && initialDiff && initialDiff.length === 0 && (
        <div className="border border-[#1a1a1a] p-3 text-center">
          <div className="text-[10px] font-mono uppercase tracking-widest text-[#666]">
            Todas as séries idênticas à referência. Nada a atualizar.
          </div>
        </div>
      )}
    </Modal>
  );
};

const sessionToTSV = (session, data) => {
  const dateStr = formatDateForExcel(session.date);
  const tname = session.templateName || 'Treino livre';
  const lines = [];
  session.exercises.forEach(e => {
    const def = data.exercises.find(d=>d.id===e.exerciseId);
    const exName = (def && def.name) || 'Exercício removido';
    const sets = (e.sets||[]).filter(s=>s.completed);
    const cells = [dateStr, tname, exName];
    for (let i = 0; i < 5; i++) {
      const s = sets[i];
      if (s) {
        const w = s.weight === '' || s.weight == null ? '' : String(s.weight).replace('.', ',');
        const r = s.reps === '' || s.reps == null ? '' : String(s.reps);
        const t = s.time === '' || s.time == null ? '' : String(s.time);
        if (def && def.type === 'time') {
          cells.push(w);
          cells.push(t);
        } else {
          cells.push(w);
          cells.push(r);
        }
      } else {
        cells.push(''); cells.push('');
      }
    }
    cells.push((e.sessionNote || '').replace(/\t/g,' ').replace(/\r?\n/g,' '));
    lines.push(cells.join('\t'));
  });
  return lines.join('\r\n');
};

const SessionDetail = ({ session, data, onBack, onDelete, toast }) => {
  const [confirmDel, setConfirmDel] = useState(false);
  const totalSets = session.exercises.reduce((a,e)=>a+((e.sets&&e.sets.filter(x=>x.completed).length)||0),0);
  const volume = session.exercises.reduce((a,e)=>a+(e.sets||[]).filter(x=>x.completed).reduce((b,x)=>b+(Number(x.weight)||0)*(Number(x.reps)||0),0),0);

  const copyTSV = async () => {
    const tsv = sessionToTSV(session, data);
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(tsv);
        toast('Copiado para a área de transferência');
      } else {
        const ta = document.createElement('textarea');
        ta.value = tsv; ta.style.position='fixed'; ta.style.left='-9999px';
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        toast('Copiado para a área de transferência');

  return (
    <div className="pb-24">

/* PROGRESS */
const ProgressView = ({ data }) => {
  const [selectedExId, setSelectedExId] = useState(null);
  const exerciseStats = useMemo(() => {
    const map = {};
    data.sessions.forEach(s => {
      s.exercises.forEach(e => {
        if (!map[e.exerciseId]) map[e.exerciseId] = [];
        const sets = (e.sets||[]).filter(x=>x.completed);
        if (!sets.length) return;
        const max1RM   = Math.max(...sets.map(x=>x.oneRM ||0));
        const maxW     = Math.max(...sets.map(x=>Number(x.weight)||0));
        const maxReps  = Math.max(...sets.map(x=>Number(x.reps) ||0));
        const maxTime  = Math.max(...sets.map(x=>Number(x.time) ||0));
        const volume   = sets.reduce((a,x)=>a+(Number(x.weight)||0)*(Number(x.reps)||0),0);
        map[e.exerciseId].push({
          date: s.date, dateStr: formatShort(s.date),
          templateName: s.templateName || 'Treino livre',
          sessionId: s.id,
          max1RM, maxW, maxReps, maxTime, volume,
          sets, setsCount: sets.length
        });
      });
    });
    Object.keys(map).forEach(k => map[k].sort((a,b)=>a.date-b.date));
    return map;
  }, [data.sessions]);

  if (data.sessions.length === 0) {
    return <div className="pb-24">
      <Header title="Progresso" subtitle="Evolução por exercício" />
      <EmptyState icon={BarChart3} title="Sem dados" hint="Faça alguns treinos para ver gráficos." />
    </div>;
  }

  if (selectedExId) {
    const def = data.exercises.find(e=>e.id===selectedExId);
    const stats = exerciseStats[selectedExId] || [];
    if (!def || !stats.length) {
      return <div className="pb-24">
        <Header title="Progresso" onBack={()=>setSelectedExId(null)} />
        <p className="px-4 py-6 text-[#666] font-mono text-sm">Sem dados para este exercício.</p>
      </div>;
    }
    const isTime = def.type==='time';
    const peak1RM = Math.max(...stats.map(s=>s.max1RM));
    const peakDate = (stats.find(s=>s.max1RM===peak1RM)||{}).dateStr;
    const peakW   = Math.max(...stats.map(s=>s.maxW));
    const peakReps= Math.max(...stats.map(s=>s.maxReps));
    const peakTime= Math.max(...stats.map(s=>s.maxTime));
    const peakVolume = Math.max(...stats.map(s=>s.volume));
    const c = muscleColor(def.muscle);

    return (
      <div className="pb-24">
        <Header title={def.name} subtitle={`${stats.length} sessões registradas`} onBack={()=>setSelectedExId(null)} />
        <div className="px-4 py-2 border-b border-[#1a1a1a] flex items-center gap-2" style={{ background: withAlpha(c, 0.08) }}>
          <span className="w-2 h-2" style={{ background: c }} />
          <span className="text-[10px] font-mono uppercase tracking-widest" style={{ color: c }}>{def.muscle||'—'}</span>
        </div>
        <div className="grid grid-cols-2 gap-px bg-[#1a1a1a] border-b border-[#1a1a1a]">
          {!isTime && (
            <div className="bg-black p-3">
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666]">Pico 1RM</div>
              <div className="font-display text-2xl text-[#d4ff00] mt-1">{peak1RM}kg</div>
              <div className="text-[10px] font-mono text-[#666] mt-0.5">{peakDate}</div>
            </div>
          )}
          {!isTime && (
            <div className="bg-black p-3">
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666]">Carga máx</div>
              <div className="font-display text-2xl text-white mt-1">{peakW}kg</div>
            </div>
          )}
          {!isTime && (
            <div className="bg-black p-3">
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666]">Reps máx</div>
              <div className="font-display text-2xl text-white mt-1">{peakReps}</div>
            </div>
          )}
          {isTime && (
            <div className="bg-black p-3">
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666]">Tempo máx</div>
              <div className="font-display text-2xl text-[#d4ff00] mt-1">{peakTime}s</div>
            </div>
          )}
          <div className="bg-black p-3">
            <div className="text-[9px] font-mono uppercase tracking-widest text-[#666]">Volume máx</div>
            <div className="font-display text-2xl text-white mt-1">{Math.round(peakVolume)}</div>
          </div>
        </div>
        {!isTime && <ChartCard title="1RM estimado"     data={stats} dataKey="max1RM"  suffix="kg" color={c} />}
        {!isTime && <ChartCard title="Carga máxima"     data={stats} dataKey="maxW"    suffix="kg" color={c} />}
        {!isTime && <ChartCard title="Repetições máximas" data={stats} dataKey="maxReps" suffix="" color={c} />}
        {isTime  && <ChartCard title="Tempo máximo"     data={stats} dataKey="maxTime" suffix="s" color={c} />}
        {!isTime && <ChartCard title="Volume total"     data={stats} dataKey="volume"  suffix="kg" color={c} />}

        <div className="px-4 py-3 border-t border-[#1a1a1a]">
          <div className="text-[10px] font-mono uppercase tracking-widest text-[#666] mb-3">Histórico detalhado</div>
          <div className="space-y-3">
            {[...stats].reverse().map((s,i) => (
              <div key={i} className="border border-[#1a1a1a] p-3">
                <div className="flex items-baseline justify-between mb-0.5 gap-2">
                  <div className="font-display text-base tracking-wider truncate">{s.templateName}</div>
                  <div className="text-[10px] font-mono text-[#666] flex-shrink-0">{formatDate(s.date)}</div>
                </div>
                <div className="text-[10px] font-mono text-[#666] tracking-widest mb-2 flex gap-3 flex-wrap">
                  {!isTime && <span className="text-[#d4ff00]">1RM máx {s.max1RM}kg</span>}
                  {!isTime && <span>Pico {s.maxW}kg × {s.maxReps}</span>}
                  {isTime && <span className="text-[#d4ff00]">Pico {s.maxTime}s</span>}
                  <span>{s.setsCount} séries</span>
                </div>
                <div className="space-y-0.5">
                  {s.sets.map((set, si) => (
                    <div key={si} className="flex items-center gap-3 text-xs font-mono">
                      <span className="text-[#666] w-5">{si+1}</span>
                      {isTime ? <span className="text-white">{set.weight?`${set.weight}kg · `:''}{set.time}s</span>
                        : (<><span className="text-white">{set.weight}kg × {set.reps}</span>{set.oneRM > 0 && <span className="text-[#888] ml-auto">1RM {set.oneRM}kg</span>}</>)}
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  const exsWithData = data.exercises.filter(e => exerciseStats[e.id] && exerciseStats[e.id].length);
  const groups = {};
  exsWithData.forEach(ex => {
    const m = ex.muscle || 'Sem grupo';
    if (!groups[m]) groups[m]=[];
    groups[m].push(ex);
  });
  const groupEntries = Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0],'pt-BR'));

  return (
    <div className="pb-24">
      <Header title="Progresso" subtitle={`${exsWithData.length} exercícios com dados`} />
      {groupEntries.map(([muscle, exs]) => {
        const c = muscleColor(muscle);
        return (
          <div key={muscle}>
            <div className="px-4 py-2 text-[10px] font-mono uppercase tracking-widest flex items-center gap-2 border-b border-[#1a1a1a]" style={{ color: c, background: withAlpha(c, 0.08) }}>
              <span className="w-2 h-2" style={{ background: c }} />
              {muscle}
            </div>
            {exs.map(ex => {
              const stats = exerciseStats[ex.id];
              const last = stats[stats.length-1];
              const first = stats[0];
              const delta1RM = ex.type==='weight' ? last.max1RM - first.max1RM : 0;
              const isPositive = delta1RM > 0;
              return (
                <button key={ex.id} onClick={()=>setSelectedExId(ex.id)}
                  className="w-full px-4 py-3 flex items-center gap-3 hover:bg-[#0a0a0a] text-left border-b border-[#0d0d0d] last:border-b-0 border-l-4"
                  style={{ borderLeftColor: c }}>
                  <div className="flex-1 min-w-0">
                    <div className="font-mono text-sm text-white truncate">{ex.name}</div>
                    <div className="text-[10px] font-mono text-[#666] mt-0.5">
                      {stats.length} sessões · {ex.type==='weight' ? `Pico 1RM ${Math.max(...stats.map(s=>s.max1RM))}kg`
                        : `Pico ${Math.max(...stats.map(s=>s.maxTime))}s`}
                    </div>
                  </div>
                  {ex.type==='weight' && stats.length > 1 && (
                    <div className={`text-xs font-mono ${isPositive?'text-[#d4ff00]':delta1RM<0?'text-[#ff4757]':'text-[#666]'}`}>
                      {isPositive?'+':''}{delta1RM.toFixed(1)}kg
                    </div>
                  )}
                  <ChevronRight size={14} className="text-[#444]" />
                </button>
              );
            })}
          </div>
        );
      })}
    </div>
  );
};

        <p>Para sincronizar com o Google Drive, você precisa criar um Client ID OAuth no Google Cloud Console (gratuito).</p>
        <p className="text-[#d4ff00]">⚠ Importante: o Google não permite OAuth com arquivos abertos via file://. Você precisa hospedar o treino.html num servidor (GitHub Pages, Netlify, etc) ou usar um servidor local.</p>
      </div>
      <div className="border border-[#1a1a1a] p-3 space-y-2">
        <div className="text-[10px] font-mono uppercase tracking-widest text-[#666]">Passo a passo</div>
        <ol className="text-[10px] font-mono text-[#aaa] leading-relaxed space-y-1" style={{listStyle:'decimal', paddingLeft:'1.2em'}}>
          <li>Acesse console.cloud.google.com e crie um projeto</li>
          <li>APIs e serviços → Biblioteca → ative "Google Drive API"</li>
          <li>Tela de consentimento OAuth → tipo Externo → preencha nome, email; adicione seu email em "usuários de teste"</li>
          <li>Credenciais → Criar credenciais → ID do cliente OAuth → Aplicativo da Web</li>
          <li>Em "Origens JavaScript autorizadas" adicione o domínio onde vai hospedar (ex: https://seu-usuario.github.io)</li>
          <li>Copie o Client ID e cole abaixo</li>
        </ol>
      </div>
      <Input label="Client ID" value={cid} onChange={setCid} placeholder="123abc.apps.googleusercontent.com" autoFocus />
    </Modal>
  );
};

/* CONFIG */
const ConfigView = ({ data, setData, toast }) => {
  const fileRef = useRef();
  const [importPreview, setImportPreview] = useState(null);
  const [confirmReplace, setConfirmReplace] = useState(false);
  const [confirmWipe, setConfirmWipe] = useState(false);
  const [confirmReplaceFromDrive, setConfirmReplaceFromDrive] = useState(false);
  const [drivePreview, setDrivePreview] = useState(null);
  const [driveBusy, setDriveBusy] = useState(false);
  const [driveSetup, setDriveSetup] = useState(false);
  const [config, setConfig] = useState(driveLoadConfig());
  const [authed, setAuthed] = useState(!!driveLoadToken());
  const [syncTimes, setSyncTimes] = useState(loadSyncTimes());
  const bumpSync = (key) => setSyncTimes(recordSyncTime(key));

  const handleSetClientId = (cid) => {
    const newCfg = { ...config, clientId: cid };
    setConfig(newCfg);
    driveSaveConfig(newCfg);
    setDriveSetup(false);
    if (cid) toast('Client ID salvo. Agora toque em "Conectar".'); else toast('Client ID removido.');
  };

  const ensureTokenClient = () => {
    if (!config.clientId) throw new Error('Configure o Client ID primeiro.');
    if (!tokenClient) {
      driveInitTokenClient(config.clientId, () => {});
    }
  };

  const driveConnect = async () => {
    try {
      setDriveBusy(true);
      ensureTokenClient();
      await driveRequestToken(true);
      setAuthed(true);
      toast('Conectado ao Google Drive');
    } catch (e) {
      console.error(e); toast('Falha ao conectar: ' + e.message, 'error');
    } finally { setDriveBusy(false); }
  };

  const driveDisconnect = () => {
    driveSaveToken(null);
    setAuthed(false);
    toast('Desconectado');
  };

  const driveSaveAction = async () => {
    try {
      setDriveBusy(true);
      ensureTokenClient();
      const token = await driveGetValidToken();
      const existing = await driveFindFile(token, DRIVE_FILE_NAME);
      const payload = { version: APP_VERSION, exportedAt: new Date().toISOString(), data };
      await driveUpload(token, JSON.stringify(payload, null, 2), existing && existing.id);
      bumpSync('driveSave');
      toast('Salvo no Drive');
    } catch (e) {
      console.error(e); toast('Erro ao salvar: ' + e.message, 'error');
    } finally { setDriveBusy(false); }
  };

  const driveLoadAction = async () => {
    try {
      setDriveBusy(true);
      ensureTokenClient();
      const token = await driveGetValidToken();
      const existing = await driveFindFile(token, DRIVE_FILE_NAME);
      if (!existing) { toast('Nenhum backup encontrado no Drive', 'error'); return; }
      const text = await driveDownload(token, existing.id);
      const parsed = JSON.parse(text);
      const payload = parsed.data || parsed;
      if (!payload || !Array.isArray(payload.exercises) || !Array.isArray(payload.workouts) || !Array.isArray(payload.sessions)) {
        throw new Error('Formato inválido');
      }
      setDrivePreview({ payload, modifiedTime: existing.modifiedTime });
      setConfirmReplaceFromDrive(true);
    } catch (e) {
      console.error(e); toast('Erro ao carregar: ' + e.message, 'error');
    } finally { setDriveBusy(false); }
  };

  const exportData = () => {
    try {
      const payload = { version: APP_VERSION, exportedAt: new Date().toISOString(), data };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const dt = new Date().toISOString().split('T')[0];
      a.href = url; a.download = `treino-backup-${dt}.json`;
      document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 100);
      bumpSync('fileExport');
      toast('Backup exportado.');
    } catch (e) { console.error(e); toast('Erro ao exportar.', 'error'); }
  };

  const handleFile = async (e) => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    try {
      const text = await f.text();
      const parsed = JSON.parse(text);
      const payload = parsed.data || parsed;
      if (!payload || !Array.isArray(payload.exercises) || !Array.isArray(payload.workouts) || !Array.isArray(payload.sessions)) {
        throw new Error('Formato inválido');
      }
      setImportPreview(payload);
      setConfirmReplace(true);
    } catch (err) { console.error(err); toast('Arquivo inválido.', 'error'); }
    e.target.value = '';
  };

  const doImport = () => {
    setData(importPreview);
    setConfirmReplace(false); setImportPreview(null);
    bumpSync('fileImport');
    toast('Dados importados.');
  };
  const doImportFromDrive = () => {
    if (drivePreview) setData(drivePreview.payload);
    setConfirmReplaceFromDrive(false); setDrivePreview(null);
    bumpSync('driveLoad');
    toast('Dados importados do Drive.');
  };
  const wipeAll = () => {
    setData({ exercises: [], workouts: [], sessions: [] });
    setConfirmWipe(false);
    toast('Dados removidos.');
  };

  const isFileProto = location.protocol === 'file:';

  return (
    <div className="pb-24">
      <Header title="Config" subtitle="Backup e ajustes" />
      <div className="p-4 space-y-4">
        <div>
          <div className="text-[10px] font-mono uppercase tracking-widest text-[#666] mb-2">Resumo</div>
          <div className="grid grid-cols-3 gap-px bg-[#1a1a1a] border border-[#1a1a1a]">
            <div className="bg-black p-3 text-center">
              <div className="font-display text-xl text-white">{data.exercises.length}</div>
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666] mt-1">Exerc</div>
            </div>
            <div className="bg-black p-3 text-center">
              <div className="font-display text-xl text-white">{data.workouts.length}</div>
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666] mt-1">Treinos</div>
            </div>
            <div className="bg-black p-3 text-center">
              <div className="font-display text-xl text-[#d4ff00]">{data.sessions.length}</div>
              <div className="text-[9px] font-mono uppercase tracking-widest text-[#666] mt-1">Sessões</div>
            </div>
          </div>
        </div>

        {/* DRIVE SECTION */}
        <div className="border border-[#d4ff00]/40 p-4 space-y-3">
          <div>
            <h3 className="font-display text-lg tracking-wider mb-1 text-[#d4ff00]">Google Drive</h3>
            <p className="text-[10px] font-mono text-[#666] leading-relaxed">
              Sincronize seus dados entre dispositivos via Google Drive. Os dados ficam num arquivo único <span className="text-[#aaa]">{DRIVE_FILE_NAME}</span> na sua conta.
            </p>
          </div>

          {isFileProto && (
            <div className="border border-[#ff4757]/40 bg-[#ff4757]/10 p-3 text-[10px] font-mono text-[#ff4757] leading-relaxed">
              ⚠ Você está abrindo o app via file://. O Google não permite login OAuth nesse modo. Hospede o arquivo num servidor (GitHub Pages, Netlify) para usar o Drive.
            </div>
          )}

          {!config.clientId ? (
            <Btn variant="accent" onClick={()=>setDriveSetup(true)} icon={Settings} full>Configurar Client ID</Btn>
          ) : (
            <>
              <div className="text-[10px] font-mono text-[#666] flex items-center justify-between gap-2">
                <span className="truncate">Client ID: {config.clientId.slice(0,16)}…</span>
                <button onClick={()=>setDriveSetup(true)} className="text-[#d4ff00] underline flex-shrink-0">trocar</button>
              </div>

              {!authed ? (
                <Btn variant="primary" onClick={driveConnect} icon={Cloud} disabled={driveBusy} full>
                  {driveBusy ? 'Conectando...' : 'Conectar ao Drive'}
                </Btn>
              ) : (
                <div className="space-y-2">
                  <div className="grid grid-cols-2 gap-2">
                    <div className="space-y-1">
                      <Btn variant="primary" onClick={driveSaveAction} icon={CloudUp} disabled={driveBusy}>Salvar</Btn>
                      <div className="text-[9px] font-mono text-[#666] text-center tracking-widest uppercase truncate">
                        {syncTimes.driveSave ? formatSyncTime(syncTimes.driveSave) : 'Nunca'}
                      </div>
                    </div>
                    <div className="space-y-1">
                      <Btn variant="ghost" onClick={driveLoadAction} icon={CloudDown} disabled={driveBusy}>Carregar</Btn>
                      <div className="text-[9px] font-mono text-[#666] text-center tracking-widest uppercase truncate">
                        {syncTimes.driveLoad ? formatSyncTime(syncTimes.driveLoad) : 'Nunca'}
                      </div>
                    </div>
                  </div>
                  <Btn variant="ghost" onClick={driveDisconnect} icon={LogOut} size="sm" full>Desconectar</Btn>
                </div>
              )}
            </>
          )}
        </div>

        <div className="border border-[#1a1a1a] p-4 space-y-3">
          <div>
            <h3 className="font-display text-lg tracking-wider mb-1">Exportar arquivo</h3>
            <p className="text-[10px] font-mono text-[#666] leading-relaxed">Baixa um JSON com todos os dados.</p>
          </div>
          <Btn icon={Download} onClick={exportData} variant="ghost" full>Exportar backup</Btn>
          <div className="text-[9px] font-mono text-[#666] text-center tracking-widest uppercase">
            Última: {syncTimes.fileExport ? formatSyncTime(syncTimes.fileExport) : 'Nunca'}
          </div>
        </div>
        <div className="border border-[#1a1a1a] p-4 space-y-3">
          <div>
            <h3 className="font-display text-lg tracking-wider mb-1">Importar arquivo</h3>
            <p className="text-[10px] font-mono text-[#666] leading-relaxed">Carrega um JSON e SUBSTITUI todos os dados atuais.</p>
          </div>
          <input ref={fileRef} type="file" accept="application/json,.json" className="hidden" onChange={handleFile} />
          <Btn icon={Upload} variant="ghost" onClick={()=>fileRef.current && fileRef.current.click()} full>Importar backup</Btn>
          <div className="text-[9px] font-mono text-[#666] text-center tracking-widest uppercase">
            Última: {syncTimes.fileImport ? formatSyncTime(syncTimes.fileImport) : 'Nunca'}
          </div>
        </div>
        <div className="border border-[#ff4757]/30 p-4 space-y-3">
          <div>
            <h3 className="font-display text-lg tracking-wider mb-1 text-[#ff4757]">Apagar tudo</h3>
            <p className="text-[10px] font-mono text-[#666] leading-relaxed">Remove permanentemente todos os dados locais.</p>
          </div>
          <Btn icon={Trash2} variant="danger" onClick={()=>setConfirmWipe(true)} full>Apagar todos os dados</Btn>
        </div>
        <div className="text-center text-[9px] font-mono text-[#444] tracking-widest pt-4">Versão {APP_VERSION}</div>
      </div>

      <DriveSetupModal open={driveSetup} currentClientId={config.clientId} onSave={handleSetClientId} onClose={()=>setDriveSetup(false)} />

      <Confirm open={confirmReplace} title="Substituir todos os dados?"
        message={importPreview ? `O arquivo contém ${importPreview.exercises.length} exercícios, ${importPreview.workouts.length} treinos e ${importPreview.sessions.length} sessões.` : ''}
        onConfirm={doImport} onCancel={()=>{setConfirmReplace(false); setImportPreview(null);}} danger />
      <Confirm open={confirmReplaceFromDrive} title="Substituir com dados do Drive?"
        message={drivePreview ? `Backup do Drive (modificado em ${new Date(drivePreview.modifiedTime).toLocaleString('pt-BR')}) contém ${drivePreview.payload.exercises.length} exercícios, ${drivePreview.payload.workouts.length} treinos e ${drivePreview.payload.sessions.length} sessões. Os dados locais serão substituídos.` : ''}
        onConfirm={doImportFromDrive} onCancel={()=>{setConfirmReplaceFromDrive(false); setDrivePreview(null);}} danger />
      <Confirm open={confirmWipe} title="Apagar tudo?"
        message="Você vai perder TODOS os dados locais. Esta ação não pode ser desfeita."
        onConfirm={wipeAll} onCancel={()=>setConfirmWipe(false)} danger />
    </div>
  );
};

/* BOTTOM NAV - flex dinâmico */
const BottomNav = ({ tab, onTab }) => {
  const tabs = [
    { id:'home',      label:'Treinar',   icon:Home },
    { id:'exercises', label:'Exerc',     icon:Dumbbell },
    { id:'history',   label:'Histórico', icon:HistoryIcon },
    { id:'progress',  label:'Progresso', icon:BarChart3 },
    { id:'config',    label:'Config',    icon:Settings },
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 bg-black border-t border-[#1a1a1a] z-30 safe-bottom bottom-nav">
      {tabs.map(t => {
        const IconC = t.icon; const sel = tab === t.id;
        return (
          <button key={t.id} onClick={()=>onTab(t.id)} style={{ color: sel ? '#d4ff00' : '#666' }}>
            <IconC size={18} strokeWidth={sel?2.4:1.6} />
            <span>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
};

/* APP */
function App() {
  const { data, setData, active, setActive } = useStorage();
  const [tab, setTab] = useState('home');
  const [editingWorkout, setEditingWorkout] = useState(null);
  const [viewingSession, setViewingSession] = useState(null);
  const [finishedSession, setFinishedSession] = useState(null);
  const { show: toast, Toast } = useToast();

  const goTab = useCallback((newTab) => {
    setViewingSession(null);
    setEditingWorkout(null);
    setTab(newTab);
  }, []);

  const startWorkout = (template) => {
    if (template.exercises.length === 0) return;
    const sessionId = uid();
    const session = {
      id: sessionId,
      templateId: template.id,
      templateName: template.name,
      notes: template.notes||'',
      sessionNote:'',
      date: Date.now(),
      startedAt: Date.now(),
      elapsed: 0,
      disposition: null,
      intensity: null,
      exercises: template.exercises.map(we => {
        const def = data.exercises.find(d=>d.id===we.exerciseId);
        const norm = normalizeTemplateExercise(we, def);
        const sets = def ? buildInitialSets(def, norm) : [];
        return {
          exerciseId: we.exerciseId,
          targetSets: norm.targetSets,
          targetRepsMin: norm.targetRepsMin,
          targetRepsMax: norm.targetRepsMax,
          notes: norm.notes,
          sessionNote:'',
          sets
        };
      })
    };
    setActive(session);
  };

  if (active) {
    return (
      <>
        <ActiveWorkout active={active} setActive={setActive} data={data} setData={setData}
          onFinish={(session) => { if (session) setFinishedSession(session); }} />
        {finishedSession && (
          <Modal open={true} onClose={()=>setFinishedSession(null)} title="Treino finalizado"
            footer={<Btn onClick={()=>setFinishedSession(null)} full>OK</Btn>}>
            <p className="text-sm font-mono text-[#aaa]">Salvo no histórico.</p>
          </Modal>
        )}
        {Toast}
      </>
    );
  }

  if (editingWorkout) {
    return (<>
      <WorkoutEditor workout={editingWorkout} data={data} setData={setData} onClose={()=>setEditingWorkout(null)} />
      {Toast}
    </>);
  }

  if (viewingSession) {
    return (
      <>
        <SessionDetail session={viewingSession} data={data} onBack={()=>setViewingSession(null)}
          onDelete={()=>{ setData(d=>({...d, sessions: d.sessions.filter(s=>s.id!==viewingSession.id)})); setViewingSession(null); }}
          toast={toast} />
        <BottomNav tab={tab} onTab={goTab} />
        {Toast}
      </>
    );
  }

  return (
    <>
      <div className="min-h-screen bg-black text-white">
        {tab==='home'      && <WorkoutsView data={data} onStart={startWorkout} onEdit={setEditingWorkout} />}
        {tab==='exercises' && <ExercisesView data={data} setData={setData} />}
        {tab==='history'   && <HistoryView   data={data} onSelect={setViewingSession} />}
        {tab==='progress'  && <ProgressView  data={data} />}
        {tab==='config'    && <ConfigView    data={data} setData={setData} toast={toast} />}
      </div>
      <BottomNav tab={tab} onTab={goTab} />
      {Toast}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
